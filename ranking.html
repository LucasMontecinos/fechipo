<style>
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--text:#e8e6e3;--muted:#6b7280;--gold:#d4a843;--red:#c41e3a;--green:#22c55e;--f:#e879a0;--m:#60a5fa}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;min-height:100vh}
.os{font-family:'Oswald',sans-serif}
a{color:var(--gold);text-decoration:none}

.header{background:linear-gradient(135deg,#0d0d15,#1a0a0f);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:12px}
.header img{height:40px}
.header h1{font-family:'Oswald';font-size:20px;font-weight:700;letter-spacing:2px;color:var(--gold)}
.header h1 em{color:var(--red);font-style:normal}
.back{font-size:13px;color:var(--muted)}

.box{max-width:1100px;margin:0 auto;padding:16px}

.title{text-align:center;margin-bottom:20px}
.title h2{font-family:'Oswald';font-size:30px;font-weight:700;letter-spacing:3px}
.title h2 em{color:var(--gold);font-style:normal}
.title p{color:var(--muted);font-size:13px;margin-top:4px}

.tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;flex-wrap:wrap}
.tb{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Oswald';font-size:12px;letter-spacing:.5px;cursor:pointer;white-space:nowrap;transition:.2s}
.tb.act{font-weight:600}
.tb.sf{border-left:3px solid var(--f)}
.tb.sm{border-left:3px solid var(--m)}
.tb.act.sf{background:var(--f);border-color:var(--f);color:#000}
.tb.act.sm{background:var(--m);border-color:var(--m);color:#000}

.stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:90px;text-align:center}
.sc .v{font-family:'Oswald';font-size:24px;font-weight:700;color:var(--gold)}
.sc .l{font-size:10px;color:var(--muted);margin-top:2px}

.cs{margin-bottom:20px}
.ch{font-family:'Oswald';font-size:15px;font-weight:600;letter-spacing:1px;padding:9px 14px;background:linear-gradient(90deg,rgba(196,30,58,.12),transparent);border-left:3px solid var(--red);margin-bottom:6px;border-radius:0 6px 6px 0;display:flex;align-items:center;gap:8px}
.ch .cn{font-size:10px;background:rgba(196,30,58,.3);color:#fff;padding:2px 8px;border-radius:10px}

.rt{width:100%;border-collapse:collapse;font-size:13px}
.rt th{text-align:left;padding:6px 8px;font-family:'Oswald';font-size:10px;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase}
.rt th.c{text-align:center;width:36px}
.rt th.n{text-align:center;width:50px}
.rt td{padding:6px 8px;border-bottom:1px solid rgba(30,30,46,.4)}
.rt td.c{text-align:center;font-family:'Oswald';font-weight:700;color:var(--gold)}
.rt td.n{text-align:center;font-family:'Oswald';font-weight:600}
.rt tr:hover{background:rgba(212,168,67,.04)}
.rt .p1 td.c{color:#ffd700;font-size:16px}
.rt .p2 td.c{color:#c0c0c0;font-size:15px}
.rt .p3 td.c{color:#cd7f32;font-size:14px}
.rt .cl{color:var(--muted);font-size:11px;display:block}
.rt .tc{color:var(--gold);font-weight:700;font-size:14px}
.rt .dc{color:var(--green);font-weight:600;font-size:11px}

.empty{text-align:center;padding:40px;color:var(--muted);font-style:italic}

@media(max-width:600px){
  .rt{font-size:11px}
  .rt th,.rt td{padding:4px 5px}
  .header h1{font-size:16px}
  .title h2{font-size:22px}
  .tb{font-size:10px;padding:6px 8px}
}
</style>
</head>

var TABS=[
{id:'cl_m',lb:'🏋️ Classic Masculino',s:'sm'},
{id:'cl_f',lb:'🏋️ Classic Femenino',s:'sf'},
{id:'eq_m',lb:'⚙️ Equipado Masculino',s:'sm'},
{id:'eq_f',lb:'⚙️ Equipado Femenino',s:'sf'},
{id:'bench_cl_m',lb:'💪 Bench Classic Masculino',s:'sm'},
{id:'bench_cl_f',lb:'💪 Bench Classic Femenino',s:'sf'},
{id:'bench_eq_m',lb:'💪 Bench Equipado Masculino',s:'sm'},
{id:'bench_eq_f',lb:'💪 Bench Equipado Femenino',s:'sf'}
];

var DO={'Sub Junior':0,'Junior':1,'Open':2,'Master I':3,'Master II':4};
var CUR='cl_m';

function cn(c){return parseFloat((c||'999').replace('+',''))}

function R(){
var E=D.filter(function(e){return e.tab===CUR&&e.tt>0&&e.p<99});
var ib=CUR.indexOf('bench')>=0;
var G={};
E.forEach(function(e){var k=e.c+'|'+e.d;if(!G[k])G[k]=[];G[k].push(e)});
var K=Object.keys(G).sort(function(a,b){
  var ca=a.split('|'),cb=b.split('|');
  if(cn(ca[0])!==cn(cb[0]))return cn(ca[0])-cn(cb[0]);
  return(DO[ca[1]]||9)-(DO[cb[1]]||9)
});

document.getElementById('st').innerHTML='<div class="stats"><div class="sc"><div class="v">'+E.length+'</div><div class="l">Atletas</div></div><div class="sc"><div class="v">'+K.length+'</div><div class="l">Categorías</div></div></div>';

if(!K.length){document.getElementById('ct').innerHTML='<div class="empty">Sin resultados en esta modalidad</div>';return}

var h='';
K.forEach(function(key){
  var p=key.split('|'),cat=p[0],div=p[1];
  var arr=G[key].sort(function(a,b){return a.p-b.p});

  h+='<div class="cs"><div class="ch"><span>'+cat+' kg — '+div+'</span><span class="cn">'+arr.length+'</span></div>';
  h+='<table class="rt"><thead><tr><th class="c">#</th><th>Atleta</th><th class="n">BW</th>';
  if(!ib)h+='<th class="n">SQ</th><th class="n">BP</th><th class="n">DL</th>';
  else h+='<th class="n">BP</th>';
  h+='<th class="n">Total</th><th class="n">GL Points</th></tr></thead><tbody>';

  arr.forEach(function(e){
    var cl=e.p===1?'p1':e.p===2?'p2':e.p===3?'p3':'';
    h+='<tr class="'+cl+'"><td class="c">'+e.p+'</td>';
    h+='<td><strong>'+e.n+'</strong><span class="cl">'+e.t+'</span></td>';
    h+='<td class="n">'+e.bw+'</td>';
    if(!ib){h+='<td class="n">'+e.sq+'</td><td class="n">'+e.bp+'</td><td class="n">'+e.dl+'</td>'}
    else{h+='<td class="n">'+e.bp+'</td>'}
    h+='<td class="n tc">'+e.tt+'</td>';
    h+='<td class="n dc">'+e.dt.toFixed(1)+'</td></tr>';
  });
  h+='</tbody></table></div>';
});
document.getElementById('ct').innerHTML=h;
}

function setTab(id){
  CUR=id;
  document.querySelectorAll('.tb').forEach(function(b){b.classList.toggle('act',b.dataset.t===id)});
  R();
}

var th='';
TABS.forEach(function(t){
  th+='<button class="tb '+t.s+(t.id===CUR?' act':'')+'" data-t="'+t.id+'" onclick="setTab(\''+t.id+'\')">'+t.lb+'</button>';
});
document.getElementById('tabs').innerHTML=th;
R();
</script>
