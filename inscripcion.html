.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover:not(:disabled){background:#a8182f}
.btn-green{background:var(--green);color:#fff}.btn-green:hover:not(:disabled){background:#1aa34a}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-outline:hover{border-color:var(--accent);color:var(--text)}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:'Oswald',sans-serif}

.input{width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;transition:border-color .2s}
.input:focus{border-color:var(--accent)}
.input.ok{border-color:var(--green)}
.input.err{border-color:#ef4444;background:rgba(239,68,68,.04)}
select.input{cursor:pointer}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(196,30,58,.05)}
.upload-zone.done{border-color:var(--green);border-style:solid;background:rgba(34,197,94,.05)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}

async function initFirebase() {
  try {
    const {initializeApp} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const {getFirestore, collection, addDoc, getDocs, getDoc, doc, updateDoc, setDoc, deleteDoc, query, orderBy, where, serverTimestamp, onSnapshot, runTransaction} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');

    const {getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');

    if (FIREBASE_CONFIG.apiKey === "TU_API_KEY_AQUI") {
      console.warn("Firebase no configurado. Usando modo demo.");
      return false;
    }

    const app = initializeApp(FIREBASE_CONFIG);
    db = getFirestore(app);
    storage = getStorage(app);
    authInstance = getAuth(app);

    // Expose functions globally
    window.FB = {collection, addDoc, getDocs, getDoc, doc, updateDoc, setDoc, deleteDoc, query, orderBy, where, serverTimestamp, onSnapshot, runTransaction, ref, uploadBytes, getDownloadURL, signInWithEmailAndPassword, signOut, onAuthStateChanged};
    firebaseReady = true;
    loadEventos();

    // React to auth changes — only users in `admins/{uid}` unlock the panel
    onAuthStateChanged(authInstance, async (user) => {
      if (!user) { state.adminAuth = false; if (state.view === 'admin') render(); return; }
      try {
        const adminDoc = await getDoc(doc(db, 'admins', user.uid));
        state.adminAuth = adminDoc.exists();
        if (!adminDoc.exists()) {
          await signOut(authInstance);
          alert('Acceso denegado: tu cuenta no está registrada como admin.');
        } else {
          loadInscripciones();
        }
      } catch(e) { console.error('[auth check]', e); state.adminAuth = false; }
      if (state.view === 'admin') render();
    });

    return true;
  } catch(e) {
    console.error("Firebase init error:", e);
    return false;
  }
}

// ══════════════════════════════════════════════
// HTML escape helper — defensa contra XSS en innerHTML
// ══════════════════════════════════════════════
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Sanitiza un string para guardar en DB: elimina caracteres HTML peligrosos
// y colapsa espacios. No reemplaza a esc() al renderizar; es defensa en capas.
function sanitizeInput(s) {
  if (s == null) return '';
  return String(s).replace(/[<>"'`]/g,'').replace(/\s+/g,' ').trim();
}

// ══════════════════════════════════════════════
// FORMATTING HELPERS
// ══════════════════════════════════════════════
function formatName(val) {
  if (!val) return '';
  return val.trim().split(/\s+/).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
}
function formatRut(val) {
  if (!val) return '';
  let r = val.replace(/[^0-9kK]/g, '').toUpperCase();
  if (r.length > 1 && !r.includes('-')) {
    r = r.slice(0, -1) + '-' + r.slice(-1);
  }
  return r;
}
// ── Validador RUT chileno (módulo 11) ──────────────────────────
// Devuelve {valid, dv, expected, msg}. Si valid=false, msg dice por qué.
function validateRut(val){
  if(!val) return {valid:false, msg:'RUT vacío'};
  const clean = val.replace(/[^0-9kK]/g,'').toUpperCase();
  if(clean.length < 2) return {valid:false, msg:'RUT muy corto'};
  if(clean.length > 9) return {valid:false, msg:'RUT muy largo'};
  const body = clean.slice(0,-1);
  const dv = clean.slice(-1);
  if(!/^\d+$/.test(body)) return {valid:false, msg:'Solo dígitos antes del DV'};
  // Cálculo módulo 11
  let sum = 0, mul = 2;
  for(let i = body.length - 1; i >= 0; i--){
    sum += parseInt(body[i],10) * mul;
    mul = mul === 7 ? 2 : mul + 1;
  }
  const r = 11 - (sum % 11);
  const expected = r === 11 ? '0' : (r === 10 ? 'K' : String(r));
  if(dv !== expected) return {valid:false, dv, expected, msg:'Dígito verificador incorrecto (esperado: '+expected+')'};
  return {valid:true, dv, expected};
}

// ══════════════════════════════════════════════
// ATHLETE DB & AUTO-CODE
// ══════════════════════════════════════════════
let athleteDB = [];
fetch('data.json').then(r => r.json()).then(d => { athleteDB = d; }).catch(() => {});

function findAthleteByRut(rut) {
  if (!rut) return null;
  const clean = rut.replace(/[^0-9kK]/g, '').toUpperCase();
  if (clean.length < 5) return null;
  return athleteDB.find(a => {
    const dbRut = (a.rut || '').replace(/[^0-9kK]/g, '').toUpperCase();
    return dbRut && dbRut === clean;
  }) || null;
}

function generateCode(rut, nombre) {
  if (!rut || !nombre) return '';
  const rutDigits = rut.replace(/[^0-9]/g, '');
  if (rutDigits.length < 4) return '';
  const prefix = rutDigits.slice(0, 4);
  const parts = nombre.trim().split(/\s+/).filter(w => w.length > 0);
  // First name + apellidos (skip second name if 4+ words)
  let initials = '';
  if (parts.length >= 3) {
    initials = parts[0].charAt(0) + parts[parts.length - 2].charAt(0) + parts[parts.length - 1].charAt(0);
  } else if (parts.length === 2) {
    initials = parts[0].charAt(0) + parts[1].charAt(0);
  } else {
    initials = parts[0].charAt(0);
  }
  initials = initials.toUpperCase();
  const year = new Date().getFullYear();
  return prefix + initials + '-' + year;
}

function autoFillCode() {
  const f = state.form;
  const rut = formatRut(f.rut);
  const nombre = formatName(f.nombre);
  if (!rut || !nombre) return;

  // Search DB
  const found = findAthleteByRut(rut);
  if (found && found.codigo) {
    f.codigo = found.codigo;
    f._codigoSource = 'db';
  } else {
    // Not in DB — generate new code
    const code = generateCode(rut, nombre);
    if (code) {
      f.codigo = code;
      f._codigoSource = 'new';
    }
  }
  // Update DOM directly
  const el = document.getElementById('codigoInput');
  const lb = document.getElementById('codigoLabel');
  if (el) {
    el.value = f.codigo;
    el.style.borderColor = f.codigo ? 'var(--gold)' : 'var(--border)';
  }
  if (lb) {
    lb.textContent = f._codigoSource === 'db' ? '✓ Atleta encontrado en base de datos' : f._codigoSource === 'new' ? 'Nuevo atleta — código generado automáticamente' : '';
    lb.style.color = f._codigoSource === 'db' ? 'var(--green)' : 'var(--orange, #f59e0b)';
  }
}

  eventoFormMode: 'create', // create | edit

// ── Firestore eventos ────────────────────────────────────────
async function loadEventos() {
  if (!firebaseReady) {
    // Without Firebase, show nothing — events only come from admin
    EVENTS = [];
    render();
    return;
  }
  try {
    if (!window._eventosListener) {
      window._eventosListener = window.FB.onSnapshot(
        window.FB.collection(db, 'eventos'),
        (snap) => {
          EVENTS = snap.docs.map(d => ({...d.data(), id: d.id}))
            .sort((a,b) => (a.date||'').localeCompare(b.date||''));
          render();
        }
      );
    }
  } catch(e) {
    console.warn('Eventos load error', e);
    EVENTS = [];
    render();
  }
}

function openEventsFromFirebase() {
  // Only show events explicitly marked as 'open' by admin
  return EVENTS.filter(e => e.status === 'open');
}

function render() {
  const app = document.getElementById('app');
  if (state.view === 'admin') { app.innerHTML = renderAdmin(); return; }
  if (state.view === 'confirm') { app.innerHTML = renderConfirm(); return; }
  if (state.view === 'edit_lookup') { app.innerHTML = renderEditLookup(); return; }
  if (state.view === 'edit') { app.innerHTML = renderEdit(); return; }
  app.innerHTML = renderForm();
}

      <tbody>`;

        <td style="font-size:11px">${esc(i.club==='Otro'?i.clubOtro:i.club)}</td>

        <td><span class="status-${esc(i.status)}" style="font-weight:700;font-size:11px;text-transform:uppercase">${i.status==='pending'?'⏳ Pendiente':i.status==='approved'?'✅ Aprobado':'❌ Rechazado'}</span></td>
        <td style="white-space:nowrap">
          ${i.status!=='approved'?`<button class="btn btn-green" style="padding:4px 8px;font-size:10px" onclick="updateStatus('${safeId}','approved')">✓</button>`:''}
          ${i.status!=='rejected'?`<button class="btn" style="padding:4px 8px;font-size:10px;background:var(--red);color:#fff" onclick="updateStatus('${safeId}','rejected')">✗</button>`:''}

        </td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
  }
  
  h += `</div>`;
  return h;
}

// ══════════════════════════════════════════════
// EDIT HANDLERS
// ══════════════════════════════════════════════
// La edición ya no es directa — el atleta envía una solicitud a
// `edit_requests` y el admin la revisa (valida el PIN contra
// `inscripciones_private`). Esto evita exponer el PIN en la colección
// pública de inscripciones.
async function lookupEdit() {
  const rut = formatRut(document.getElementById('editRut')?.value || '');
  const pin = document.getElementById('editPin')?.value || '';
  if (!rut || !pin) { state.error = 'Ingresa RUT y PIN'; render(); return; }
  const rutCheck = validateRut(rut);
  if (!rutCheck.valid) { state.error = 'RUT inválido: ' + rutCheck.msg; render(); return; }
  if (!/^\d{4}$/.test(pin)) { state.error = 'El PIN debe ser de 4 dígitos'; render(); return; }

  state.error = '';
  try {
    // Busca por RUT en la colección pública. El PIN ya no vive acá, así
    // que no validamos aquí — el admin lo verifica al aprobar.
    let candidates = [];
    if (firebaseReady) {
      const q = window.FB.query(window.FB.collection(db, 'inscripciones'), window.FB.where('rut', '==', rut));
      const snap = await window.FB.getDocs(q);
      snap.forEach(d => candidates.push({id: d.id, ...d.data()}));
    } else {
      candidates = demoGetAll().filter(i => formatRut(i.rut) === rut);
    }
    // Solo inscripciones activas (no rechazadas).
    candidates = candidates.filter(c => c.status !== 'rejected');
    if (!candidates.length) { state.error = 'No se encontró inscripción activa con ese RUT'; render(); return; }
    // Si hay varias, elegimos la más reciente por timestamp.
    candidates.sort((a,b) => (b.timestamp?.seconds||0) - (a.timestamp?.seconds||0));
    const found = candidates[0];

    state.editId = found.id;
    state.editDoc = found;
    state.form = {
      evento: found.evento || '',
      nombre: found.nombre || '',
      rut: found.rut || '',
      codigo: found.codigo || '',
      sexo: found.sexo || '',
      fechaNac: found.fechaNac || '',
      division: found.division || '',
      categoria: found.categoria || '',
      modalidad: found.modalidad || '',
      club: found.club || '',
      clubOtro: found.clubOtro || '',
      comuna: found.comuna || '',
      pin: pin, // del input, se usará al enviar la solicitud
      universidad: found.universidad || '',
    };
    state.view = 'edit';
    state.error = '';
    state.success = '';
    render();
  } catch(e) {
    state.error = 'Error buscando: ' + e.message;
    render();
  }
}

async function saveEdit() {
  state.submitting = true;
  state.error = '';
  state.success = '';
  render();

  try {
    const f = state.form;
    // Solo campos editables por el atleta. NO evento, status, flight,
    // sortOrder, rut, carnetURL, wadeURL, pin.
    const changes = {
      nombre: sanitizeInput(f.nombre.trim()),
      codigo: sanitizeInput(f.codigo.trim()),
      sexo: f.sexo,
      fechaNac: f.fechaNac,
      division: f.division,
      categoria: f.categoria,
      modalidad: f.modalidad,
      club: sanitizeInput(f.club),
      clubOtro: sanitizeInput(f.clubOtro),
      comuna: sanitizeInput(f.comuna),
      universidad: sanitizeInput(f.universidad || ''),
    };

    if (firebaseReady) {
      // Crea una solicitud de edición. El admin la revisa y aplica.
      await window.FB.addDoc(window.FB.collection(db, 'edit_requests'), {
        inscripcionId: state.editId,
        rut: f.rut,
        pin: f.pin,
        changes: changes,
        status: 'pending',
        ts: window.FB.serverTimestamp(),
      });
    } else {
      demoUpdate(state.editId, changes);
    }

    state.submitting = false;
    state.success = 'Tu solicitud de edición fue enviada. El organizador la revisará y se aplicarán los cambios si el PIN es correcto.';
    render();
  } catch(e) {
    state.error = 'Error al enviar solicitud: ' + e.message;
    state.submitting = false;
    render();
  }
}

// ══════════════════════════════════════════════
// HANDLERS
// ══════════════════════════════════════════════
function upd(key, val) { state.form[key] = val; }
function updR(key, val) { state.form[key] = val; render(); }

function selectEvent(id) { state.form.evento = id; render(); }

function nextStep() {
  state.error = '';
  // Validate current step
  const f = state.form;
  if (state.step === 0 && !f.evento) { state.error = 'Selecciona un evento'; render(); return; }
  if (state.step === 1) {
    if (!f.nombre || !f.rut || !f.sexo || !f.fechaNac || !f.club || !f.pin || f.pin.length !== 4) { state.error = 'Completa todos los campos obligatorios (incluye PIN de 4 dígitos)'; render(); return; }
  }
  if (state.step === 2) {
    if (!f.division || !f.categoria || !f.modalidad) { state.error = 'Completa todos los campos obligatorios'; render(); return; }
  }
  state.step = Math.min(state.step + 1, 3);
  render();
  window.scrollTo(0, 0);
}

function prevStep() { state.step = Math.max(state.step - 1, 0); render(); window.scrollTo(0, 0); }

function handleFile(input, type) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { state.error = 'Archivo demasiado grande (máx 5MB)'; render(); return; }
  if (type === 'carnet') { state.carnetFile = file; state.carnetName = file.name; }
  else { state.wadeFile = file; state.wadeName = file.name; }
  render();
}

async function submitForm() {
  state.submitting = true;
  state.error = '';
  render();

  try {
    const f = state.form;

    // ── Validación RUT (módulo 11) ──────────────────────
    const rutCheck = validateRut(f.rut);
    if(!rutCheck.valid){
      state.error = 'RUT inválido: ' + rutCheck.msg + '. Revisá el dígito verificador antes de enviar.';
      state.submitting = false; render(); return;
    }

    // ── Duplicate check ─────────────────────────────────
    if (firebaseReady) {
      const rutCleanCheck = f.rut.replace(/[^0-9kK]/gi,'').toUpperCase();
      const nameNorm = f.nombre.trim().toLowerCase().replace(/\s+/g,' ');
      const existing = state.inscripciones.filter(i => 
        i.evento === f.evento && i.status !== 'rejected'
      );
      const dupRut = existing.find(i => 
        i.rut && i.rut.replace(/[^0-9kK]/gi,'').toUpperCase() === rutCleanCheck
      );
      const dupName = existing.find(i => 
        i.nombre && i.nombre.trim().toLowerCase().replace(/\s+/g,' ') === nameNorm
      );
      if (dupRut) {
        state.error = `Ya existe una inscripción con ese RUT (${f.rut}) para este campeonato. Si necesitas modificarla, usa la opción "Editar mi inscripción".`;
        state.submitting = false; render(); return;
      }
      if (dupName) {
        state.error = `Ya existe una inscripción con ese nombre para este campeonato. Si es un error, contacta al organizador.`;
        state.submitting = false; render(); return;
      }
    }
    // ────────────────────────────────────────────────────
    
    // Datos PÚBLICOS (inscripciones): legibles por cualquiera en la nómina live.
    const publicEntry = {
      evento: f.evento,
      nombre: sanitizeInput(f.nombre),
      rut: sanitizeInput(f.rut),
      codigo: sanitizeInput(f.codigo),
      sexo: f.sexo,
      fechaNac: f.fechaNac,
      division: f.division,
      categoria: f.categoria,
      modalidad: f.modalidad,
      club: sanitizeInput(f.club),
      clubOtro: sanitizeInput(f.clubOtro),
      comuna: sanitizeInput(f.comuna),
      universidad: sanitizeInput(f.universidad || ''),
      carnetName: state.carnetName,
      wadeName: state.wadeName,
      status: 'pending',
    };

    // Datos PRIVADOS (inscripciones_private): solo admin.
    const privateEntry = {
      pin: f.pin,
    };

    if (firebaseReady) {
      // Upload files to Firebase Storage
      const ts = Date.now();
      const rutClean = f.rut.replace(/[^0-9kK]/g, '').toUpperCase();

      if (state.carnetFile) {
        const carnetRef = window.FB.ref(storage, `inscripciones/${f.evento}/${rutClean}_carnet_${ts}`);
        await window.FB.uploadBytes(carnetRef, state.carnetFile);
        privateEntry.carnetURL = await window.FB.getDownloadURL(carnetRef);
      }
      if (state.wadeFile) {
        const wadeRef = window.FB.ref(storage, `inscripciones/${f.evento}/${rutClean}_wada_${ts}`);
        await window.FB.uploadBytes(wadeRef, state.wadeFile);
        privateEntry.wadeURL = await window.FB.getDownloadURL(wadeRef);
      }

      publicEntry.timestamp = window.FB.serverTimestamp();
      privateEntry.ts = window.FB.serverTimestamp();

      // Transacción atómica: escribe ambos docs o ninguno. ID determinístico
      // `${evento}_${rutClean}` para pairear public/private y evitar duplicados.
      const docId = `${f.evento}_${rutClean}`;
      const inscRef = window.FB.doc(db, 'inscripciones', docId);
      const privRef = window.FB.doc(db, 'inscripciones_private', docId);
      try {
        await window.FB.runTransaction(db, async (tx) => {
          const existing = await tx.get(inscRef);
          if (existing.exists() && existing.data().status !== 'rejected') {
            throw new Error('DUPLICATE_RUT');
          }
          tx.set(inscRef, publicEntry);
          tx.set(privRef, privateEntry);
        });
      } catch(txErr) {
        if (txErr.message === 'DUPLICATE_RUT') {
          state.error = `Ya existe una inscripción con ese RUT (${f.rut}) para este campeonato. Usa "Editar mi inscripción" si necesitas modificarla.`;
          state.submitting = false; render(); return;
        }
        throw txErr;
      }
    } else {
      // Demo mode: aplana en un solo objeto para localStorage.
      demoSave({...publicEntry, ...privateEntry});
    }

    state.view = 'confirm';
    state.submitting = false;
    render();
    window.scrollTo(0, 0);
  } catch(e) {
    state.error = 'Error al enviar: ' + e.message;
    state.submitting = false;
    render();
  }
}

function resetForm() {
  state = {...state, view:'form', step:0, form:{evento:'',nombre:'',rut:'',codigo:'',sexo:'',fechaNac:'',division:'',categoria:'',modalidad:'',club:'',clubOtro:'',comuna:'',pin:'',universidad:''}, carnetFile:null, carnetName:'', wadeFile:null, wadeName:'', submitting:false, error:'', success:'', editDoc:null, editId:null};
  render();
}

function toggleAdmin() {
  if (state.view === 'admin') { state.view = 'form'; render(); return; }
  state.view = 'admin';
  render();
}

async function authAdmin() {
  const email = (document.getElementById('adminEmail')?.value || '').trim();
  const pass = document.getElementById('adminPass')?.value || '';
  state.error = '';
  if (!email || !pass) { state.error = 'Completa email y contraseña'; render(); return; }
  if (!firebaseReady || !authInstance) { state.error = 'Firebase no disponible'; render(); return; }
  try {
    await window.FB.signInWithEmailAndPassword(authInstance, email, pass);
    // onAuthStateChanged handler verifies admins/{uid} and sets state.adminAuth
  } catch(e) {
    let msg = 'Error: ' + e.message;
    if (e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found') msg = 'Email o contraseña incorrectos';
    else if (e.code === 'auth/too-many-requests') msg = 'Demasiados intentos. Espera unos minutos.';
    state.error = msg;
    render();
  }
}

async function logoutAdmin() {
  if (!confirm('¿Cerrar sesión de admin?')) return;
  try { await window.FB.signOut(authInstance); } catch(e) { console.warn(e); }
  state.adminAuth = false;
  state.view = 'form';
  render();
}

async function loadInscripciones() {
  if (firebaseReady) {
    try {
      // Start real-time listener if not already running
      if (!window._adminListener) {
        const q = window.FB.query(window.FB.collection(db, 'inscripciones'), window.FB.orderBy('timestamp', 'desc'));
        window._adminListener = window.FB.onSnapshot(q, (snap) => {
          state.inscripciones = snap.docs.map(d => ({id: d.id, ...d.data()}));
          // Only re-render if admin panel is visible
          if (state.view === 'admin') render();
        });
      }
      // Also do an immediate fetch for first load
      const q = window.FB.query(window.FB.collection(db, 'inscripciones'), window.FB.orderBy('timestamp', 'desc'));
      const snap = await window.FB.getDocs(q);
      state.inscripciones = snap.docs.map(d => ({id: d.id, ...d.data()}));
    } catch(e) { console.error(e); }
  } else {
    state.inscripciones = demoGetAll().reverse();
  }
  render();
}

async function approveAllPending() {
  const pending = state.inscripciones.filter(i => i.status === 'pending');
  if (!pending.length) { alert('No hay inscripciones pendientes'); return; }
  if (!confirm(`¿Aprobar ${pending.length} inscripción${pending.length !== 1 ? 'es' : ''} pendiente${pending.length !== 1 ? 's' : ''}?`)) return;
  if (firebaseReady) {
    try {
      await Promise.all(pending.map(i =>
        window.FB.updateDoc(window.FB.doc(db, 'inscripciones', i.id), {status: 'approved'})
      ));
      // listener will auto-update state.inscripciones
    } catch(e) { console.error(e); alert('Error: ' + e.message); }
  } else {
    pending.forEach(i => demoUpdate(i.id, {status: 'approved'}));
    state.inscripciones = demoGetAll().reverse();
    render();
  }
}
async function updateStatus(id, newStatus) {
  const realId = decodeURIComponent(id);
  if (firebaseReady) {
    try {
      await window.FB.updateDoc(window.FB.doc(db, 'inscripciones', realId), {status: newStatus});
    } catch(e) { console.error(e); }
  } else {
    demoUpdate(realId, {status: newStatus});
  }
  await loadInscripciones();
}

function exportNominas() {
  const approved = state.inscripciones.filter(i => i.status === 'approved');
  const byEvent = {};
  approved.forEach(i => {
    if (!byEvent[i.evento]) byEvent[i.evento] = [];
    byEvent[i.evento].push({
      nombre: i.nombre,
      rut: i.rut,
      sexo: i.sexo,
      dob: i.fechaNac,
      division: i.division,
      categoria: i.categoria,
      modalidad: i.modalidad,
      club: i.club === 'Otro' ? i.clubOtro : i.club,
      universidad: i.universidad || '',
    });
  });

  // Generate nominas.json format
  const nominas = { events: EVENTS.map(ev => ({
    name: ev.name,
    short: ev.name.replace('Campeonato ','').replace('Primer ',''),
    date: ev.date,
    closeDate: ev.closeDate,
    location: ev.location,
    organizer: ev.org,
    days: ev.date.split('-').reverse().join(' de '),
    athletes: byEvent[ev.id] || byEvent[ev.name] || [],
    extraCols: ev.id.includes('universitario') ? ['universidad'] : ['modalidad'],
  }))};

  const blob = new Blob([JSON.stringify(nominas, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'nominas.json';
  link.click();
  URL.revokeObjectURL(url);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
initFirebase().then(() => render());
</script>
</body>
</html>
