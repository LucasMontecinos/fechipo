<title>YourLift — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1628;--card:#11223B;--border:#1E3A5F;--text:#D4E1F0;--muted:#7A8FA6;--accent:#C41E3A;--blue:#1E5BA8;--gold:#D4A843;--green:#22c55e;--red:#ef4444;--orange:#f59e0b}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.os{font-family:'Oswald',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
input,select,button,textarea{font-family:inherit;outline:none}
.shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.side{background:#0d1b30;border-right:1px solid var(--border);padding:18px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{font-family:Oswald;font-size:20px;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.logo span{color:var(--accent)}
.user{font-size:11px;color:var(--green);margin-bottom:18px;padding:6px 10px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:6px}
.side-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 6px;font-family:Oswald}
.side-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;margin-bottom:2px}
.side-btn:hover{background:rgba(196,30,58,.08);color:var(--text)}
.side-btn.active{background:var(--accent);color:#fff}
.side-btn .icon{font-size:16px;width:22px;text-align:center}
.main{padding:24px;overflow-y:auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.h1{font-family:Oswald;font-size:24px;font-weight:700;letter-spacing:1px;margin-bottom:6px}
.h2{font-family:Oswald;font-size:18px;font-weight:700;letter-spacing:1px;margin-bottom:14px}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:20px}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:Oswald;font-size:12px;font-weight:700;letter-spacing:1px;transition:all .15s}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:#a01730}
.btn-b{background:var(--blue);color:#fff}
.btn-g{background:var(--green);color:#fff}
.btn-d{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-r{background:var(--red);color:#fff}
.btn-w{background:var(--gold);color:#000}
.inp{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px}
.inp:focus{border-color:var(--accent)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:10px 8px;color:var(--muted);font-family:Oswald;font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid var(--border)}
.tbl td{padding:8px;border-bottom:1px solid rgba(30,58,95,.3)}
.tbl tr:hover td{background:rgba(196,30,58,.04)}
.editable{cursor:pointer;color:var(--text);padding:3px 6px;border-radius:4px;display:inline-block}
.editable:hover{background:rgba(212,168,67,.15);color:var(--gold)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;font-family:Oswald;letter-spacing:.5px}
.b-g{background:rgba(34,197,94,.15);color:var(--green)}
.b-y{background:rgba(212,168,67,.15);color:var(--gold)}
.b-r{background:rgba(239,68,68,.15);color:var(--red)}
.b-b{background:rgba(30,91,168,.15);color:var(--blue)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--green);color:var(--text);padding:14px 22px;border-radius:10px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 24px rgba(0,0,0,.4);z-index:9999;animation:slideUp .3s ease}
.toast.err{border-color:var(--red)}
.toast button{background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-family:Oswald;font-size:11px;cursor:pointer;font-weight:700;letter-spacing:.5px}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:9998}
.modal-c{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:480px;width:90%;max-height:90vh;overflow-y:auto}
.modal-c h3{font-family:Oswald;font-size:18px;letter-spacing:1px;margin-bottom:16px;color:var(--text)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field select,.field input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px}
.modal-btns{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-c{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px;max-width:400px;width:90%}
.login-c h1{font-family:Oswald;font-size:26px;text-align:center;letter-spacing:2px;margin-bottom:6px}
.login-c h1 span{color:var(--accent)}
.login-c p{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .v{font-family:Oswald;font-size:26px;font-weight:700}
.stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.tag{display:inline-block;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:600;font-family:Oswald;letter-spacing:.5px;margin-right:4px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.search-box{display:flex;gap:8px;margin-bottom:14px}
.search-box input{flex:1}
@media(max-width:768px){.shell{grid-template-columns:1fr}.side{position:static;height:auto}.stat-grid{grid-template-columns:repeat(2,1fr)}.tbl{font-size:10px}.tbl th,.tbl td{padding:5px 4px}}
</style>
</head>

<script>
(function(){
  setTimeout(function(){
    var msg = document.getElementById('loadingMsg');
    var btn = document.getElementById('loadingBtn');
    if(msg && msg.textContent === 'Cargando...'){
      msg.textContent = 'Verificando sesión...';
    }
    if(btn) btn.style.display = 'block';
  }, 5000);

  setTimeout(function(){
    var app = document.getElementById('app');
    if(app && app.innerHTML.indexOf('Cargando') !== -1){
      app.innerHTML = '<div style="text-align:center;padding:60px;color:#C41E3A;font-family:Oswald">'
        + '<div style="font-size:32px;margin-bottom:12px">⚠️</div>'
        + '<div style="font-size:18px;letter-spacing:1px;margin-bottom:8px">Error al cargar</div>'
        + '<div style="font-size:13px;color:#7A8FA6;margin-bottom:20px">Prueba limpiar el caché del navegador (Ctrl+Shift+R).</div>'
        + '<button onclick="location.reload()" style="padding:10px 24px;border-radius:8px;border:none;background:#C41E3A;color:#fff;font-family:Oswald;font-size:14px;cursor:pointer">↻ Recargar</button>'
        + '</div>';
    }
  }, 12000);
})();
</script>

// ── Peer helpers ──
function _getPeerKey(a){
  const comps=[...(a.competencias||[])].filter(c=>c.sexo&&c.categoria&&c.resultado&&c.resultado.total>0).sort((x,y)=>(y.fecha||'').localeCompare(x.fecha||''));
  if(!comps.length)return null;
  const l=comps[0];
  const sex=(l.sexo||'').match(/mujer|fem/i)?'F':'M';
  const modal=(l.modalidad||'').toLowerCase().includes('equip')?'equipped':'classic';
  return sex+'|'+(l.categoria||'').trim()+'|'+(l.division||'Open').trim()+'|'+modal;
}
function _peerPerc(myTotal,key){const g=PEERS[key];if(!g)return null;const all=[...g.members.map(m=>m.total),myTotal].sort((a,b)=>b-a);const rank=all.indexOf(myTotal)+1;return{rank,n:all.length,pct:Math.round((1-rank/all.length)*100),g};}

const ST={user:null,adminInfo:null,view:'dashboard',data:null,nominas:null,inscripciones:[],auditLog:[],events:[],eventos:[],filterEv:'',search:'',filterLetter:'',eventoForm:null,eventoFormMode:'create',athleteProfile:null,pendingResults:0,competitionResults:[],editRequests:[],inscripcionesPrivate:{}};
window.ST=ST;

// HTML-escape helper — defensa contra XSS al inyectar datos en innerHTML
function esc(s){
  if(s==null)return'';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
window.esc=esc;

// Safety net — always show something after 5s
setTimeout(()=>{
  const app=document.getElementById('app');
  if(app&&(app.innerHTML.includes('Cargando')||app.innerHTML.trim()===''))
    {ST.user=null;render();}
},5000);

onAuthStateChanged(auth,async(u)=>{window._authFired=true;
  if(!u){ST.user=null;ST.adminInfo=null;render();return}
  try{
    const adminDoc=await getDoc(doc(db,'admins',u.uid));
    if(!adminDoc.exists()){
      await signOut(auth);
      ST.user=null;ST.adminInfo=null;
      alert('Acceso denegado.\nUID: '+u.uid+'\n\nAgrega este UID a Firestore → admins/'+u.uid+' con campo role:"superadmin"');
      render();return;
    }
    ST.user=u;
    ST.adminInfo=adminDoc.data();
    sessionStorage.setItem('fechipo_admin_session','1');
    loadAll(); // intentional: no await — render() called inside
  }catch(e){
    console.error('Auth error',e);
    ST.user=null;
    render();
  }
});

window.doLogin=async function(){
  const em=document.getElementById('lEm').value.trim();
  const pw=document.getElementById('lPw').value;
  const errEl=document.getElementById('loginErr');
  if(errEl){errEl.style.display='none';}
  if(!em||!pw){
    if(errEl){errEl.style.display='block';errEl.textContent='Completa email y contraseña';}
    return;
  }
  const btn=document.querySelector('[onclick*="doLogin"]');
  if(btn){btn.textContent='Ingresando...';btn.disabled=true;}
  try{
    await signInWithEmailAndPassword(auth,em,pw);
  }catch(e){
    console.error('[doLogin]',e.code,e.message);
    let msg='Error: '+e.message;
    if(e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'||e.code==='auth/user-not-found')msg='Email o contraseña incorrectos';
    else if(e.code==='auth/too-many-requests')msg='Demasiados intentos. Espera unos minutos.';
    else if(e.code==='auth/network-request-failed')msg='Sin conexión a internet';
    if(errEl){errEl.style.display='block';errEl.textContent=msg;}
  }finally{
    if(btn){btn.textContent='INGRESAR';btn.disabled=false;}
  }
}

window.doLogout=async function(){
  if(!confirm('¿Cerrar sesión?'))return;
  await signOut(auth);
  sessionStorage.removeItem('fechipo_admin_session');
  ST.user=null;ST.adminInfo=null;render();
}

// Crea una cuenta de entrenador: Firebase Auth user + doc coaches/{uid}.
// Usa una "secondary app" para no cerrar la sesión del admin actual.
// Uso desde la consola del navegador (tras login admin):
//   await createCoach('coach@yourlift.cl', 'Passw0rd!', 'Nombre Apellido', 'Nacional', '12345678')
window.createCoach=async function(email,password,nombre,grado,rut){
  if(!ST.user) throw new Error('Debes estar autenticado como admin.');
  if(!email||!password||!nombre) throw new Error('email, password y nombre son obligatorios.');
  if(password.length<8) throw new Error('La contraseña debe tener al menos 8 caracteres.');
  const secondary=initSecondaryApp(FB_CFG,'coachCreate_'+Date.now());
  const secondaryAuth=getAuth(secondary);
  try{
    const cred=await createUserWithEmailAndPassword(secondaryAuth,email,password);
    const uid=cred.user.uid;
    await setDoc(doc(db,'coaches',uid),{
      email:email.toLowerCase(),
      nombre,
      grado:grado||'',
      rut:rut||'',
      createdAt:serverTimestamp(),
      createdBy:ST.user.email
    });
    try{await signOut(secondaryAuth);}catch(_){}
    await logAction('coach_create','coaches/'+uid,null,{email,nombre,grado,rut});
    console.log('✓ Coach creado:',email,'UID:',uid);
    return uid;
  }catch(e){
    console.error('createCoach falló:',e.code||'',e.message);
    throw e;
  }
}

// DATA LOADING
// ═══════════════════════════════════════════
async function loadAll(){
  // Load data.json — non-blocking, dashboard degrades gracefully if missing
  try{
    const [dRes,nRes]=await Promise.all([
      fetch('data.json').then(r=>r.json()).catch(()=>[]),
      fetch('nominas.json').then(r=>r.json()).catch(()=>({events:[]}))
    ]);
    ST.data=Array.isArray(dRes)?dRes:[];
    ST.nominas=nRes||{events:[]};
  }catch(e){
    console.warn('[loadAll] JSON fetch failed:',e.message);
    ST.data=ST.data||[];
    ST.nominas=ST.nominas||{events:[]};
  }

  // Apply athlete_edits non-blocking
  try{
    const editsSnap=await getDocs(collection(db,'athlete_edits'));
    editsSnap.forEach(d=>{
      const ed=d.data();
      const a=(ST.data||[]).find(x=>x.codigo===ed.codigo);
      if(a){
        if(ed.nombre)a.nombre=ed.nombre;
        if(ed.club!==undefined)a.club=ed.club;
        if(ed.debut!==undefined)a.debut=ed.debut;
      }
    });
  }catch(e){console.warn('[loadAll] athlete_edits:',e.message);}

  // Load inscripciones — no orderBy to avoid index requirement
  try{
    const inscSnap=await getDocs(collection(db,'inscripciones'));
    ST.inscripciones=[];
    inscSnap.forEach(d=>ST.inscripciones.push({id:d.id,...d.data()}));
    ST.inscripciones.sort((a,b)=>(b.timestamp?.seconds||0)-(a.timestamp?.seconds||0));
  }catch(e){console.warn('[loadAll] inscripciones:',e.message);ST.inscripciones=[];}

  // Load inscripciones_private (campos sensibles: pin, carnetURL, wadeURL).
  // Solo admin puede leer. Se indexa por docId para merge rápido.
  try{
    const privSnap=await getDocs(collection(db,'inscripciones_private'));
    ST.inscripcionesPrivate={};
    privSnap.forEach(d=>{ST.inscripcionesPrivate[d.id]=d.data();});
  }catch(e){console.warn('[loadAll] inscripciones_private:',e.message);ST.inscripcionesPrivate={};}

  // Load edit_requests (solicitudes de edición pendientes de atletas).
  try{
    const reqSnap=await getDocs(collection(db,'edit_requests'));
    ST.editRequests=reqSnap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.ts?.seconds||0)-(a.ts?.seconds||0));
  }catch(e){console.warn('[loadAll] edit_requests:',e.message);ST.editRequests=[];}

  // Real-time listeners (non-blocking, set up once)
  if(!window._inscListener){
    try{
      window._inscListener=onSnapshot(collection(db,'inscripciones'),(snap)=>{
        ST.inscripciones=snap.docs.map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>(b.timestamp?.seconds||0)-(a.timestamp?.seconds||0));
        if(ST.view==='nominas'||ST.view==='dashboard'||ST.view==='approvals')render();
      },(e)=>console.warn('[listener] inscripciones:',e.message));
    }catch(e){console.warn('[loadAll] insc listener:',e.message);}
  }
  if(!window._privListener){
    try{
      window._privListener=onSnapshot(collection(db,'inscripciones_private'),(snap)=>{
        ST.inscripcionesPrivate={};
        snap.forEach(d=>{ST.inscripcionesPrivate[d.id]=d.data();});
      },(e)=>console.warn('[listener] inscripciones_private:',e.message));
    }catch(e){console.warn('[loadAll] priv listener:',e.message);}
  }
  if(!window._editReqListener){
    try{
      window._editReqListener=onSnapshot(collection(db,'edit_requests'),(snap)=>{
        ST.editRequests=snap.docs.map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>(b.ts?.seconds||0)-(a.ts?.seconds||0));
        if(ST.view==='editRequests'||ST.view==='dashboard')render();
      },(e)=>console.warn('[listener] edit_requests:',e.message));
    }catch(e){console.warn('[loadAll] edit_req listener:',e.message);}
  }
  if(!window._eventosListener){
    try{
      window._eventosListener=onSnapshot(collection(db,'eventos'),(snap)=>{
        ST.eventos=snap.docs.map(d=>{
          const e={...d.data(),id:d.id};
          // Default: récords activos. En "Universitario" arrancan apagados.
          if(typeof e.recordsEnabled!=='boolean'){
            e.recordsEnabled=!/universitar/i.test(e.name||'');
          }
          return e;
        }).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
        if(ST.view==='campeonatos'||ST.view==='dashboard')render();
      },(e)=>console.warn('[listener] eventos:',e.message));
    }catch(e){console.warn('[loadAll] eventos listener:',e.message);}
  }
  if(!window._resultsListener){
    try{
      window._resultsListener=onSnapshot(
        query(collection(db,'competition_results'),where('status','==','pending_merge')),
        (snap)=>{
          ST.pendingResults=snap.size;
          ST.competitionResults=snap.docs.map(d=>({id:d.id,...d.data()}));
          if(ST.pendingResults>0||ST.view==='mergeResults')render();
        },(e)=>console.warn('[listener] results:',e.message)
      );
    }catch(e){console.warn('[loadAll] results listener:',e.message);}
  }

  // Load eventos snapshot for campeonatos view
  try{
    const evSnap=await getDocs(collection(db,'eventos'));
    ST.eventos=evSnap.docs.map(d=>({...d.data(),id:d.id}))
      .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  }catch(e){console.warn('[loadAll] eventos:',e.message);ST.eventos=[];}

  // Audit log — non-blocking, no ordering (avoids index requirement)
  try{
    const logSnap=await getDocs(collection(db,'audit_log'));
    ST.auditLog=logSnap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,100);
  }catch(e){console.warn('[loadAll] audit_log:',e.message);ST.auditLog=[];}

  // Auto-close overdue nominations (non-blocking)
  setTimeout(()=>{try{autoCloseOverdueEventos();}catch(e){}},3000);
}

// TOAST WITH UNDO
// ═══════════════════════════════════════════
let toastTimer=null,pendingUndo=null;
function showToast(msg,undoFn=null,isError=false){
  if(toastTimer)clearTimeout(toastTimer);
  document.getElementById('toast')?.remove();
  const t=document.createElement('div');
  t.id='toast';t.className='toast'+(isError?' err':'');
  t.innerHTML=`<span>${isError?'⚠️':'✓'} ${msg}</span>`;
  if(undoFn){
    pendingUndo=undoFn;
    const b=document.createElement('button');b.textContent='DESHACER';b.onclick=()=>{pendingUndo();document.getElementById('toast')?.remove();pendingUndo=null};
    t.appendChild(b);
  }
  document.body.appendChild(t);
  toastTimer=setTimeout(()=>{t.remove();pendingUndo=null},5500);
}
window.showToast=showToast;

const FIELD_OPTS={
  sexo:['Hombre','Mujer'],
  division:['Sub Junior','Junior','Open','Master I','Master II','Master III','Master IV','Universitario','Debutantes'],
  modalidad:['Classic','Equipped','Bench Only Classic','Bench Only Equipped'],
  status:['pending','approved','rejected']
};

window.openEditModal=function(title,field,currentValue,onSave){
  const opts=FIELD_OPTS[field];
  const m=document.createElement('div');m.className='modal';
  let inner=`<div class="modal-c"><h3>${title}</h3><div class="field"><label>${field}</label>`;
  if(opts){
    inner+=`<select id="emInp">${opts.map(o=>`<option value="${o}" ${o===currentValue?'selected':''}>${o}</option>`).join('')}</select>`;
  }else{
    inner+=`<input type="text" id="emInp" value="${(currentValue||'').replace(/"/g,'&quot;')}">`;
  }
  inner+=`</div><div class="modal-btns"><button class="btn btn-d" onclick="this.closest('.modal').remove()">CANCELAR</button><button class="btn btn-p" id="emSave">GUARDAR</button></div></div>`;
  m.innerHTML=inner;
  document.body.appendChild(m);
  setTimeout(()=>document.getElementById('emInp').focus(),50);
  document.getElementById('emSave').onclick=async()=>{
    const v=document.getElementById('emInp').value;
    if(v===currentValue){m.remove();return}
    m.remove();
    await onSave(v);
  };
  m.onclick=(e)=>{if(e.target===m)m.remove()};
}

// IMPORT NOMINAS.JSON TO FIREBASE
// ═══════════════════════════════════════════
window.importNominaToFB=async function(eventName){
  const ev=ST.nominas.events?.find(e=>e.name===eventName);
  if(!ev){showToast('Evento no encontrado',null,true);return}
  if(!confirm(`Importar ${ev.athletes.length} atletas de "${eventName}" a Firebase?\n\nEsto los hará editables. Los duplicados (mismo RUT) se omiten.`))return;

  // Ensure the event doc exists in Firestore `eventos/` so public pages (index.html)
  // can show it. Use the event name as the doc id (same convention as inscripciones.evento).
  try{
    const existingEv=ST.eventos.find(e=>e.id===eventName||e.name===eventName);
    if(!existingEv){
      await setDoc(doc(db,'eventos',eventName),{
        id:eventName,
        name:eventName,
        date:ev.date||'',
        closeDate:ev.closeDate||'',
        location:ev.location||'',
        org:ev.organizer||'',
        days:ev.days||'',
        status:'open',
        extraCols:ev.extraCols||['modalidad'],
        createdAt:serverTimestamp(),
        updatedAt:serverTimestamp()
      },{merge:true});
      console.log('[import] Evento creado en Firestore:',eventName);
    }
  }catch(e){
    console.error('Error creando evento:',e);
    showToast('Error creando evento: '+(e.code||e.message),null,true);
    return;
  }

  // Get existing RUTs in Firebase for this event
  const existing=new Set(ST.inscripciones.filter(i=>i.evento===eventName).map(i=>(i.rut||'').replace(/[^0-9kK]/gi,'').toUpperCase()));
  
  let imported=0,skipped=0,errors=0,lastErr=null;
  for(const a of ev.athletes){
    const rutClean=(a.rut||'').replace(/[^0-9kK]/gi,'').toUpperCase();
    if(rutClean&&existing.has(rutClean)){skipped++;continue}
    try{
      await addDoc(collection(db,'inscripciones'),{
        nombre:a.nombre||'',
        rut:a.rut||'',
        sexo:a.sexo||'',
        fechaNac:a.dob||'',
        division:a.division||'',
        categoria:a.categoria||'',
        modalidad:a.modalidad||'',
        club:a.club||'',
        universidad:a.universidad||'',
        evento:eventName,
        status:a.status||'approved',
        timestamp:Date.now(),
        importedFromJson:true
      });
      imported++;
    }catch(e){
      errors++; lastErr=e;
      console.warn('Error importing',a.nombre,e);
    }
  }
  await logAction('import_nomina',eventName,null,`${imported} imported, ${skipped} skipped, ${errors} errors`);
  if(errors){
    showToast(`⚠️ ${imported} OK · ${skipped} dup · ${errors} ERR (${lastErr?.code||lastErr?.message||'desconocido'})`,null,true);
  } else {
    showToast(`Importado: ${imported} atletas (${skipped} duplicados omitidos)`);
  }
}

// Crea (o actualiza) el doc en `eventos/{eventName}` a partir de la metadata
// que vive en nominas.json. Útil para eventos cuyas inscripciones ya están en
// Firebase pero que nunca tuvieron doc de evento (ej. cargados antes de que
// existiera esta herramienta).
window.syncEventoFromJson=async function(eventName){
  const ev=ST.nominas.events?.find(e=>e.name===eventName);
  if(!ev){showToast('Evento no encontrado en nominas.json',null,true);return}
  const existing=ST.eventos.find(e=>e.id===eventName||e.name===eventName);
  const msg=existing
    ? `Actualizar metadata de "${eventName}" desde nominas.json?`
    : `Crear el evento "${eventName}" en Firestore con la metadata de nominas.json?\n\nDespués vas a poder editar fechas/ubicación/organizador desde Campeonatos.`;
  if(!confirm(msg))return;
  try{
    const docId=existing?.id||eventName;
    const data={
      id:docId,
      name:eventName,
      date:ev.date||'',
      closeDate:ev.closeDate||'',
      location:ev.location||'',
      org:ev.organizer||ev.org||'',
      days:ev.days||'',
      status:existing?.status||'open',
      extraCols:ev.extraCols||['modalidad'],
      updatedAt:serverTimestamp()
    };
    if(!existing)data.createdAt=serverTimestamp();
    await setDoc(doc(db,'eventos',docId),data,{merge:true});
    await logAction(existing?'sync_evento_meta':'create_evento_from_json',docId,null,eventName);
    showToast(existing?'✓ Metadata actualizada':'✅ Evento creado — ya editable en Campeonatos');
  }catch(e){
    console.error(e);
    showToast('Error: '+(e.code||e.message),null,true);
  }
}

window.editAthlete=async function(cod,field){

  const cur=a[field]||'';
  openEditModal(`Editar ${field} de ${a.nombre}`,field,cur,async(nv)=>{

    const old=cur;
    const oldCod=a.codigo;
    a[field]=nv;
    try{
      // If codigo changed, delete old doc and create new one
      if(field==='codigo'){
        const oldDocId=oldCod.replace(/[^a-zA-Z0-9_-]/g,'_');
        try{await deleteDoc(doc(db,'athlete_edits',oldDocId))}catch(e){}
      }
      const docId=a.codigo.replace(/[^a-zA-Z0-9_-]/g,'_');
      await setDoc(doc(db,'athlete_edits',docId),{codigo:a.codigo,nombre:a.nombre,club:a.club||'',debut:a.debut||'',ts:Date.now()});
      await logAction('edit_athlete',`${oldCod}.${field}`,old,nv,{nombre:a.nombre});
      render();
      showToast(`${field} actualizado: ${a.nombre}`,async()=>{
        a[field]=old;
        if(field==='codigo'){
          const newDocId=nv.replace(/[^a-zA-Z0-9_-]/g,'_');
          try{await deleteDoc(doc(db,'athlete_edits',newDocId))}catch(e){}
        }
        const rDocId=a.codigo.replace(/[^a-zA-Z0-9_-]/g,'_');
        await setDoc(doc(db,'athlete_edits',rDocId),{codigo:a.codigo,nombre:a.nombre,club:a.club||'',debut:a.debut||'',ts:Date.now()});
        await logAction('undo_edit_athlete',`${a.codigo}.${field}`,nv,old,{nombre:a.nombre});
        render();showToast('Cambio revertido');
      });
    }catch(e){console.error(e);a[field]=old;render();showToast('Error: '+e.message,null,true)}
  });
}

// EDIT REQUESTS (solicitudes de edición de atletas)
// ═══════════════════════════════════════════
// El atleta crea un doc en edit_requests con RUT+PIN+cambios. Acá el admin
// valida el PIN contra inscripciones_private y aplica los cambios.
window.approveEditRequest=async function(reqId){
  reqId=decodeURIComponent(reqId);
  const req=ST.editRequests.find(r=>r.id===reqId);if(!req)return;
  const priv=ST.inscripcionesPrivate[req.inscripcionId];
  if(!priv){
    if(!confirm(`No encontramos el doc privado para ${req.inscripcionId}. ¿Aplicar los cambios SIN validar el PIN? (úsalo solo si verificaste la identidad por otro medio)`))return;
  }else if(priv.pin!==req.pin){
    if(!confirm(`El PIN enviado (${req.pin}) NO coincide con el registrado. ¿Aplicar igual los cambios? (úsalo solo si verificaste la identidad por otro medio)`))return;
  }
  try{
    // Aplicar cambios al doc público (solo campos permitidos).
    const allowed=['nombre','codigo','sexo','fechaNac','division','categoria','modalidad','club','clubOtro','comuna','universidad'];
    const updates={};
    for(const k of allowed){if(req.changes&&req.changes[k]!==undefined)updates[k]=req.changes[k];}
    if(Object.keys(updates).length){
      await updateDoc(doc(db,'inscripciones',req.inscripcionId),updates);
    }
    await deleteDoc(doc(db,'edit_requests',reqId));
    await logAction('approve_edit_request',req.inscripcionId,JSON.stringify(updates).substring(0,200),'applied',{rut:req.rut});
    showToast('✓ Solicitud aplicada');
  }catch(e){showToast('Error: '+e.message,null,true)}
}

window.rejectEditRequest=async function(reqId){
  reqId=decodeURIComponent(reqId);
  const req=ST.editRequests.find(r=>r.id===reqId);if(!req)return;
  if(!confirm(`¿Rechazar la solicitud de edición de ${req.rut}?`))return;
  try{
    await deleteDoc(doc(db,'edit_requests',reqId));
    await logAction('reject_edit_request',req.inscripcionId,req.rut,'rejected');
    showToast('Solicitud rechazada');
  }catch(e){showToast('Error: '+e.message,null,true)}
}

// Helper de migración one-shot: copia pin/carnetURL/wadeURL de inscripciones
// viejas a inscripciones_private y limpia el doc público. Correr UNA VEZ
// desde consola tras deploy de reglas nuevas:
//   await migrateToPrivateCollection()
window.migrateToPrivateCollection=async function(){
  if(!ST.user) throw new Error('Debes estar autenticado como admin.');
  let migrated=0,skipped=0,errors=0;
  for(const ins of ST.inscripciones){
    const priv={};
    if(ins.pin)priv.pin=String(ins.pin);
    if(ins.carnetURL)priv.carnetURL=ins.carnetURL;
    if(ins.wadeURL)priv.wadeURL=ins.wadeURL;
    if(!Object.keys(priv).length){skipped++;continue;}
    priv.ts=serverTimestamp();
    try{
      // Escribir doc privado (merge para no pisar si ya existe).
      await setDoc(doc(db,'inscripciones_private',ins.id),priv,{merge:true});
      // Limpiar campos sensibles del doc público.
      const cleanup={};
      if(ins.pin!==undefined)cleanup.pin=deleteField();
      if(ins.carnetURL!==undefined)cleanup.carnetURL=deleteField();
      if(ins.wadeURL!==undefined)cleanup.wadeURL=deleteField();
      await updateDoc(doc(db,'inscripciones',ins.id),cleanup);
      migrated++;
    }catch(e){errors++;console.warn('migrate fail',ins.id,e.message);}
  }
  await logAction('migrate_private',null,null,`migrated=${migrated} skipped=${skipped} errors=${errors}`);
  console.log(`Migración: ${migrated} movidos, ${skipped} omitidos (sin campos sensibles), ${errors} errores.`);
  return {migrated,skipped,errors};
}

// ═══════════════════════════════════════════
window.sortNominaByEvent=async function(eventoId){
  const list=ST.inscripciones.filter(i=>i.evento===eventoId&&i.status!=='rejected');
  if(!list.length){showToast('No hay atletas',null,true);return}
  if(!confirm('Esto reordenará la nómina (hombres por categoría, luego mujeres). ¿Continuar?'))return;
  const wt=a=>parseFloat(String(a.categoria||'999').replace(/[^0-9.]/g,''))||999;
  const isM=a=>a.sexo==='Hombre'||a.sexo==='Masculino'||a.sexo==='M';
  list.sort((a,b)=>{
    const ma=isM(a),mb=isM(b);
    if(ma!==mb)return ma?-1:1;
    return wt(a)-wt(b);
  });
  // Update sortOrder field for each
  let order=1;
  for(const ins of list){
    try{
      await updateDoc(doc(db,'inscripciones',ins.id),{sortOrder:order});
      order++;
    }catch(e){console.warn('sort update fail',e)}
  }
  await logAction('sort_nomina',eventoId,null,`${list.length} athletes`);
  showToast(`Nómina ordenada: ${list.length} atletas`);
}

window.exportOPL=function(eventoId){

    (!eventoId||i.evento===eventoId)&&i.status==='approved'
  );
  if(!list.length){showToast('Sin inscripciones aprobadas para exportar',null,true);return;}
  // OPL CSV format: Name,Sex,Event,Equipment,Age,AgeClass,BirthYearClass,Division,
  // BodyweightKg,WeightClassKg,Squat1Kg,...,TotalKg,Place,Federation,Date,MeetCountry,MeetState,MeetTown,MeetName
  const today=new Date().toISOString().slice(0,10);
  const evName=eventoId?(ST.eventos.find(e=>e.id===eventoId)?.name||eventoId):'FECHIPO 2026';
  const header='Name,Sex,Event,Equipment,Age,AgeClass,BirthYearClass,Division,BodyweightKg,WeightClassKg,Squat1Kg,Squat2Kg,Squat3Kg,Bench1Kg,Bench2Kg,Bench3Kg,Deadlift1Kg,Deadlift2Kg,Deadlift3Kg,TotalKg,Place,Federation,Date,MeetCountry,MeetState,MeetTown,MeetName';
  const rows=list.map(i=>{
    const sex=i.sexo==='Hombre'||i.sexo==='Masculino'||i.sexo==='M'?'M':'F';
    const modal=(i.modalidad||'').toLowerCase();
    const event=modal.includes('bench')?'B':'SBD';
    const equip=modal.includes('equip')?'Single-ply':'Raw';
    const catKg=parseFloat((i.categoria||'').replace(/[^0-9.+]/g,''))||'';
    let age='';
    if(i.fechaNac){try{const b=new Date(i.fechaNac);age=Math.floor((new Date()-b)/365.25/86400000);}catch(e){}}
    const div=(i.division||'Open').replace('Sub-Junior','Sub-Juniors').replace('Junior','Juniors').replace('Open','Open').replace('Master I','Masters 1').replace('Master II','Masters 2').replace('Master III','Masters 3').replace('Master IV','Masters 4');
    return [i.nombre,'',sex,event,equip,age||'','','',div,'',catKg,'','','','','','','','','','','','','CHL','RM','',evName].join(',');
  });
  const csv=[header,...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download='OPL_'+((eventoId||'fechipo').replace(/[^a-zA-Z0-9]/g,'_'))+'_'+today+'.csv';
  a.click();
  showToast('✅ CSV OPL exportado — '+list.length+' atletas');
};

window.assignFlight=async function(insId,flight){
  insId=decodeURIComponent(insId);
  const ins=ST.inscripciones.find(x=>x.id===insId);if(!ins)return;
  const old=ins.flight||'';
  try{
    await updateDoc(doc(db,'inscripciones',insId),{flight});
    await logAction('assign_flight',insId,old,flight,{nombre:ins.nombre});
    showToast(`${ins.nombre} → Vuelo ${flight}`,async()=>{
      await updateDoc(doc(db,'inscripciones',insId),{flight:old});
      await logAction('undo_flight',insId,flight,old,{nombre:ins.nombre});
      showToast('Vuelo revertido');
    });
  }catch(e){showToast('Error: '+e.message,null,true)}
}

function renderDashboard(){
  const D=ST.data,I=ST.inscripciones;
  const YEARS=['2017','2018','2019','2020','2021','2022','2023','2024','2025','2026'];
  const isSA=ST.adminInfo?.role==='superadmin'||ST.adminInfo?.bootstrap||false;

  // ── SVG CHART HELPERS ───────────────────────────────────
  function barChart(series,opts={}){
    const {w=480,h=140,pad=36,gap=3,labelY=true,yLabel='',title=''}=opts;
    const allVals=series.flatMap(s=>s.data);
    const maxV=Math.max(...allVals,1);
    const barW=Math.floor((w-pad*2)/(series[0].data.length*(series.length+gap)));
    const groupW=(series.length*barW)+(gap*barW);
    const labels=opts.labels||series[0].data.map((_,i)=>i);
    let svg=`<svg viewBox="0 0 ${w} ${h+40}" style="width:100%;max-width:${w}px">`;
    // Y gridlines
    [0,25,50,75,100].forEach(pct=>{
      const y=pad+(h-pad*2)*(1-pct/100);
      const val=Math.round(maxV*pct/100);
      svg+=`<line x1="${pad}" y1="${y}" x2="${w-10}" y2="${y}" stroke="rgba(100,140,200,.15)" stroke-width="0.5" stroke-dasharray="3,3"/>`;
      if(labelY&&pct%50===0)svg+=`<text x="${pad-4}" y="${y+4}" text-anchor="end" font-size="9" fill="rgba(120,140,170,.7)">${val}</text>`;
    });
    // Bars
    labels.forEach((lbl,gi)=>{
      const gx=pad+gi*groupW;
      series.forEach((s,si)=>{
        const v=s.data[gi]||0;
        const bh=Math.max((v/maxV)*(h-pad*2),2);
        const x=gx+si*barW+si*1;
        const y=pad+(h-pad*2)-bh;
        svg+=`<rect x="${x}" y="${y}" width="${barW-1}" height="${bh}" fill="${s.color}" rx="2" opacity="0.88"/>`;
        if(bh>14)svg+=`<text x="${x+barW/2-0.5}" y="${y+bh-4}" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">${v}</text>`;
      });
      svg+=`<text x="${gx+groupW/2-barW/2}" y="${h+14}" text-anchor="middle" font-size="9" fill="rgba(160,180,210,.8)">${lbl}</text>`;
    });
    // Legend
    if(series.length>1){
      let lx=pad;
      series.forEach(s=>{
        svg+=`<rect x="${lx}" y="${h+22}" width="10" height="10" fill="${s.color}" rx="2"/>`;
        svg+=`<text x="${lx+13}" y="${h+31}" font-size="9" fill="rgba(160,180,210,.9)">${s.label||''}</text>`;
        lx+=s.label?s.label.length*6+20:30;
      });
    }
    svg+=`</svg>`;
    return svg;
  }

  function miniBar(val,max,color='var(--blue)',h=8){
    const pct=Math.min(Math.round(val/Math.max(max,1)*100),100);
    return `<div style="background:rgba(30,58,95,.3);border-radius:3px;height:${h}px;overflow:hidden"><div style="background:${color};height:100%;width:${pct}%;border-radius:3px;transition:width .4s"></div></div>`;
  }

  // ── DATA EXTRACTION ───────────────────────────────────────
  // Debuts per year
  const debutByYear={};
  YEARS.forEach(y=>debutByYear[y]=0);
  D.forEach(a=>{const m=String(a.debut||'').match(/20\d\d/);if(m&&debutByYear[m[0]]!==undefined)debutByYear[m[0]]++;});

  // Participations per year (unique athletes who competed)
  const partByYear={};
  YEARS.forEach(y=>partByYear[y]=new Set());
  D.forEach(a=>{(a.competencias||[]).forEach(c=>{const m=(c.evento||'').match(/20\d\d/);if(m&&partByYear[m[0]])partByYear[m[0]].add(a.codigo);});});

  // New vs returning per year
  const newByYear={},retByYear={};
  YEARS.forEach(y=>{newByYear[y]=0;retByYear[y]=0;});
  const firstYear={};
  D.forEach(a=>{
    const yrs=[...new Set((a.competencias||[]).map(c=>(c.evento||'').match(/20\d\d/)?.[0]).filter(Boolean))].sort();
    if(yrs.length){firstYear[a.codigo]=yrs[0];if(newByYear[yrs[0]]!==undefined)newByYear[yrs[0]]++;}
  });
  D.forEach(a=>{
    (a.competencias||[]).forEach(c=>{
      const yr=(c.evento||'').match(/20\d\d/)?.[0];
      if(yr&&retByYear[yr]!==undefined&&firstYear[a.codigo]&&firstYear[a.codigo]!==yr)retByYear[yr]++;
    });
  });

  // Divisions per year
  const divByYear={'2024':{},'2025':{},'2026':{}};
  D.forEach(a=>{(a.competencias||[]).forEach(c=>{
    const yr=(c.evento||'').match(/20\d\d/)?.[0];
    if(yr&&divByYear[yr]&&c.division){divByYear[yr][c.division]=(divByYear[yr][c.division]||0)+1;}
  });});
  const allDivs=[...new Set(Object.values(divByYear).flatMap(o=>Object.keys(o)))].sort();
  const topDivs=allDivs.sort((a,b)=>{
    const tot=(divByYear['2025'][b]||0)+(divByYear['2026'][b]||0)-(divByYear['2025'][a]||0)-(divByYear['2026'][a]||0);
    return tot;
  }).slice(0,7);

  // Weight categories per year
  const catByYear={'2024':{},'2025':{},'2026':{}};
  D.forEach(a=>{(a.competencias||[]).forEach(c=>{
    const yr=(c.evento||'').match(/20\d\d/)?.[0];
    if(yr&&catByYear[yr]&&c.categoria){
      const cat=(c.categoria||'').replace(/[^0-9+]/g,'');
      if(cat)catByYear[yr][cat]=(catByYear[yr][cat]||0)+1;
    }
  });});
  const allCats=[...new Set(Object.values(catByYear).flatMap(o=>Object.keys(o)))].sort((a,b)=>parseInt(a)-parseInt(b));

  // Modality
  const modalByYear={'2024':{},'2025':{},'2026':{}};
  D.forEach(a=>{(a.competencias||[]).forEach(c=>{
    const yr=(c.evento||'').match(/20\d\d/)?.[0];
    if(yr&&modalByYear[yr]&&c.modalidad){
      const m=c.modalidad.toLowerCase().includes('equip')?'Equipado':'Classic';
      modalByYear[yr][m]=(modalByYear[yr][m]||0)+1;
    }
  });});

  // Club HHI
  const clubCounts={};D.forEach(a=>{if(a.club)clubCounts[a.club]=(clubCounts[a.club]||0)+1;});
  const total=D.length||1;
  const hhiRaw=Object.values(clubCounts).reduce((s,n)=>s+(n/total*100)**2,0);
  const hhi=Math.round(hhiRaw);
  const hhiLabel=hhi<1000?'Competitivo':hhi<2500?'Moderado':'Concentrado';

  // Retention cohort
  const a24=new Set(),a25=new Set(),a26=new Set();
  D.forEach(a=>{(a.competencias||[]).forEach(c=>{
    const yr=(c.evento||'').match(/20\d\d/)?.[0];
    if(yr==='2024')a24.add(a.codigo);
    if(yr==='2025')a25.add(a.codigo);
    if(yr==='2026')a26.add(a.codigo);
  });});
  const ret2425=[...a24].filter(c=>a25.has(c)).length;
  const ret2526=[...a25].filter(c=>a26.has(c)).length;
  const ret2426=[...a24].filter(c=>a26.has(c)).length;
  const ret25pct=a24.size?Math.round(ret2425/a24.size*100):0;
  const ret26pct=a25.size?Math.round(ret2526/a25.size*100):0;
  const ret26_24pct=a24.size?Math.round(ret2426/a24.size*100):0;
  const churn25=100-ret25pct, churn26=100-ret26pct;

  // CAGR (2021-2025)
  const base=partByYear['2021'].size||1;
  const curr=partByYear['2025'].size||1;
  const cagr=((Math.pow(curr/base,1/4)-1)*100).toFixed(1);

  // Avg time to first comp (debut vs first competition year)
  // Gender per year
  const sexByYear={'2024':{M:0,F:0},'2025':{M:0,F:0},'2026':{M:0,F:0}};
  D.forEach(a=>{(a.competencias||[]).forEach(c=>{
    const yr=(c.evento||'').match(/20\d\d/)?.[0];
    if(yr&&sexByYear[yr]&&c.sexo){
      const s=(c.sexo==='Hombre'||c.sexo==='Masculino'||c.sexo==='M')?'M':'F';
      sexByYear[yr][s]++;
    }
  });});
  const pctF24=sexByYear['2024'].M+sexByYear['2024'].F?Math.round(sexByYear['2024'].F/(sexByYear['2024'].M+sexByYear['2024'].F)*100):0;
  const pctF25=sexByYear['2025'].M+sexByYear['2025'].F?Math.round(sexByYear['2025'].F/(sexByYear['2025'].M+sexByYear['2025'].F)*100):0;
  const pctF26=sexByYear['2026'].M+sexByYear['2026'].F?Math.round(sexByYear['2026'].F/(sexByYear['2026'].M+sexByYear['2026'].F)*100):0;

  // Bomb-out rate by year
  const bombByYear={'2024':{ok:0,bomb:0},'2025':{ok:0,bomb:0},'2026':{ok:0,bomb:0}};
  D.forEach(a=>{(a.competencias||[]).forEach(c=>{
    const yr=(c.evento||'').match(/20\d\d/)?.[0];
    if(yr&&bombByYear[yr]&&c.resultado&&c.resultado.total!==undefined){
      if(c.resultado.total===0)bombByYear[yr].bomb++;else bombByYear[yr].ok++;
    }
  });});
  const bombRate=yr=>{const b=bombByYear[yr];const t=b.ok+b.bomb;return t?((b.bomb/t)*100).toFixed(1):'—';};

  // Projection: linear regression on yearly participations
  const yrsNum=[2021,2022,2023,2024,2025].filter(y=>partByYear[String(y)]?.size>0);
  const vals=yrsNum.map(y=>partByYear[String(y)].size);
  const n=yrsNum.length;
  const xMean=yrsNum.reduce((s,y)=>s+y,0)/n;
  const yMean=vals.reduce((s,v)=>s+v,0)/n;
  const slope=yrsNum.reduce((s,y,i)=>s+(y-xMean)*(vals[i]-yMean),0)/yrsNum.reduce((s,y)=>s+(y-xMean)**2,0);
  const intercept=yMean-slope*xMean;
  const proj2026=Math.round(intercept+slope*2026);
  const proj2027=Math.round(intercept+slope*2027);

  // Inscriptions operational
  const totalInsc=I.length;
  const pending=I.filter(i=>i.status==='pending').length;
  const approved=I.filter(i=>i.status==='approved').length;
  const now=Date.now();
  const stale=I.filter(i=>{if(i.status!=='pending')return false;const ts=i.timestamp?.seconds?i.timestamp.seconds*1000:(i.timestamp||now);return now-ts>48*3600000;}).length;
  const avgApprovalHours=I.filter(i=>i.status==='approved'&&i.timestamp&&i.approvedAt).reduce((s,i,_,arr)=>{
    const ms=(i.approvedAt?.seconds||0)*1000-(i.timestamp?.seconds||0)*1000;return s+ms/arr.length/3600000;
  },0).toFixed(1);

  const clubs=[...new Set(D.map(a=>a.club).filter(Boolean))];
  const totalAthletes=D.length;
  const withComp=D.filter(a=>a.competencias?.length>0).length;
  const allEvents=[...new Set(D.flatMap(a=>(a.competencias||[]).map(c=>c.evento)))];
  const totalComps=D.reduce((s,a)=>s+(a.competencias?.length||0),0);
  const avgComps=(withComp?totalComps/withComp:0).toFixed(1);

  // Build HTML
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:4px">
    <div><div class="h1" style="margin-bottom:0">Dashboard KPI</div>

      +'<div><div style="font-size:13px;font-weight:600">'+c.name+'</div>'
      +'<div style="background:rgba(30,58,95,.3);border-radius:2px;height:3px;width:'+bw+'%;margin-top:3px"></div></div></div></td>'
      +'<td style="text-align:center;font-family:Oswald;font-size:15px">'+c.n+'</td>'
      +'<td style="text-align:center;font-family:Oswald;font-size:15px;color:var(--blue)">'+c.a26+'</td>'
      +'<td style="text-align:center;font-family:Oswald;font-size:15px;color:var(--gold)">'+(c.avg||'—')+'</td>'
      +'<td style="text-align:center;font-family:Oswald;font-size:13px;color:var(--muted)">'+(c.top||'—')+'</td>'
      +'<td style="text-align:center;font-family:Oswald;font-size:15px;color:'+bc+'">'+c.bomb+'%</td>'
      +'<td style="text-align:center;font-family:Oswald;font-size:15px;color:'+rtc+'">'+(c.ret>0?c.ret+'%':'—')+'</td>'
      +'<td style="text-align:center;font-family:Oswald;font-size:15px;color:'+(c.n26>0?'var(--green)':'var(--muted)')+'">'+(c.n26||'—')+'</td>'
      +'</tr>';
  }).join('')}
  </tbody></table></div>`;
  } else {
    h+=`<div class="card" style="background:rgba(212,168,67,.05);border:1px solid rgba(212,168,67,.2);padding:20px;text-align:center"><div style="font-family:Oswald;font-size:13px;letter-spacing:2px;color:var(--gold);margin-bottom:8px">📊 ANÁLISIS AVANZADO</div><div style="font-size:13px;color:var(--muted)">El análisis de crecimiento, cohorte, divisiones y concentración de mercado está disponible solo para <strong style="color:var(--gold)">Superadmin</strong>.</div></div>`;
  }
  return h;
}

function renderNominas(){
  // Combine Firebase inscriptions events + nominas.json events
  const fbEvents=[...new Set(ST.inscripciones.map(i=>i.evento))].filter(Boolean);
  const jsonEvents=(ST.nominas.events||[]).map(e=>e.name);
  const allEvents=[...new Set([...fbEvents,...jsonEvents])];
  if(!ST.filterEv&&allEvents.length)ST.filterEv=allEvents[0];
  
  const inFirebase=fbEvents.includes(ST.filterEv);
  const jsonEv=ST.nominas.events?.find(e=>e.name===ST.filterEv);
  const hasEventoDoc=ST.eventos.some(e=>e.id===ST.filterEv||e.name===ST.filterEv);
  const needsMetaSync=!!jsonEv && !hasEventoDoc;
  
  let filtered;
  if(inFirebase){
    filtered=ST.inscripciones.filter(i=>i.evento===ST.filterEv&&i.status!=='rejected');
    filtered.sort((a,b)=>(a.sortOrder||999)-(b.sortOrder||999));
  }else if(jsonEv){
    filtered=jsonEv.athletes.map((a,idx)=>({...a,id:'json_'+idx,_json:true}));
  }else{
    filtered=[];
  }
  
  return `
    <div class="h1">Nóminas</div>
    <p class="subtitle">Edita inscripciones · ${filtered.length} atletas en evento seleccionado</p>
    <div class="search-box">
      <select class="inp" onchange="ST.filterEv=this.value;render()">
        ${allEvents.map(e=>{
          const isFB=fbEvents.includes(e);
          return `<option value="${e}" ${ST.filterEv===e?'selected':''}>${isFB?'🔴 ':'📄 '}${e}${isFB?' (LIVE)':' (JSON)'}</option>`;
        }).join('')}
      </select>
      ${inFirebase?`<button class="btn btn-b" onclick="sortNominaByEvent('${ST.filterEv}')">⇅ ORDENAR</button>`:''}
      ${!inFirebase&&jsonEv?`<button class="btn btn-g" onclick="importNominaToFB('${ST.filterEv.replace(/'/g,"\\'")}')">📥 IMPORTAR A FIREBASE</button>`:''}
      ${inFirebase&&needsMetaSync?`<button class="btn btn-g" onclick="syncEventoFromJson('${ST.filterEv.replace(/'/g,"\\'")}')" title="Crea el doc en eventos/ con la metadata de nominas.json — habilita la edición de fechas desde Campeonatos">📌 SINCRONIZAR METADATA</button>`:''}
    </div>
    ${!inFirebase&&jsonEv?'<div class="card" style="background:rgba(212,168,67,.08);border-color:rgba(212,168,67,.3);padding:12px 16px;margin-bottom:12px"><span style="color:var(--gold);font-size:12px">⚠️ Esta nómina viene de nominas.json (estática). Para editarla en tiempo real, importarla a Firebase.</span></div>':''}
    ${inFirebase&&needsMetaSync?'<div class="card" style="background:rgba(212,168,67,.08);border-color:rgba(212,168,67,.3);padding:12px 16px;margin-bottom:12px"><span style="color:var(--gold);font-size:12px">⚠️ Las inscripciones están en Firebase pero falta el doc de evento en <code>eventos/</code>. Sin eso no podés editar fecha/cierre/ubicación desde <b>Campeonatos</b>. Tocá <b>📌 SINCRONIZAR METADATA</b>.</span></div>':''}
    <div class="card" style="padding:0;overflow-x:auto">
      <table class="tbl">
        <tr><th>#</th><th>Nombre</th><th>Sexo</th><th>División</th><th>Cat.</th><th>Modalidad</th><th>Club</th><th>Estado</th><th></th></tr>
        ${filtered.map((i,idx)=>{
          const editable=!i._json;
          const click=(f)=>editable?`onclick="editInsc('${i.id}','${f}')"`:'';
          const cls=editable?'editable':'';
          const sid=encodeURIComponent(i.id||'');
          return `<tr>
            <td style="color:var(--muted);font-family:Oswald">${idx+1}</td>
            <td>${esc(i.nombre)}<br><span style="font-size:9px;color:var(--muted)">${esc(i.rut||'')}</span></td>
            <td><span class="${cls}" ${click('sexo')}>${esc(i.sexo||'?')}</span></td>
            <td><span class="${cls}" ${click('division')}>${esc(i.division||'—')}</span></td>
            <td><span class="${cls}" ${click('categoria')}>${esc(i.categoria||'—')}</span></td>
            <td><span class="${cls}" ${click('modalidad')}>${esc(i.modalidad||'—')}</span></td>
            <td><span class="${cls}" ${click('club')} style="display:inline-flex;align-items:center;gap:5px">${window.clubLogoImg?window.clubLogoImg(i.club,18,'background:var(--bg);padding:1px;'):''}${esc(i.club||'—')}</span></td>
            <td><span class="badge ${i.status==='approved'?'b-g':i.status==='pending'?'b-y':'b-r'}">${esc(i.status||'approved')}</span></td>
            <td>${editable?`<button onclick="deleteInsc('${sid}')" style="background:transparent;border:1px solid rgba(239,68,68,.3);color:var(--red);padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;font-family:Oswald" title="Eliminar">✕</button>`:''}</td>

function renderEditRequests(){
  const reqs=ST.editRequests||[];
  const rows=reqs.map(r=>{
    const ins=ST.inscripciones.find(x=>x.id===r.inscripcionId);
    const priv=ST.inscripcionesPrivate[r.inscripcionId];
    const rid=encodeURIComponent(r.id);
    const pinOK=priv?(priv.pin===r.pin):null;
    const pinBadge=pinOK===true
      ?`<span style="background:rgba(34,197,94,.15);color:#22c55e;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700">PIN ✓</span>`
      :pinOK===false
        ?`<span style="background:rgba(239,68,68,.15);color:#ef4444;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700">PIN ✗</span>`
        :`<span style="background:rgba(160,160,160,.15);color:var(--muted);padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700">sin privado</span>`;
    const d=r.ts?new Date(r.ts.seconds?r.ts.seconds*1000:r.ts):null;
    const changes=r.changes||{};
    const changesHtml=Object.keys(changes).map(k=>{
      const cur=ins?ins[k]:undefined;
      const nv=changes[k];
      const same=String(cur||'')===String(nv||'');
      return `<div style="padding:2px 0;${same?'opacity:.5':''}"><span style="color:var(--muted);font-size:10px">${esc(k)}:</span> <span style="text-decoration:${same?'none':'line-through'};color:var(--muted);font-size:11px">${esc(String(cur||'—'))}</span> → <span style="color:${same?'var(--muted)':'var(--gold)'};font-size:11px;font-weight:600">${esc(String(nv||'—'))}</span></div>`;
    }).join('');
    return `<tr>
      <td style="font-size:10px;color:var(--muted)">${d?d.toLocaleString('es-CL'):'—'}</td>
      <td>${esc(ins?ins.nombre:'(?)')}<br><span style="font-size:9px;color:var(--muted)">${esc(r.rut||'')}</span></td>
      <td style="font-size:10px">${esc(ins?ins.evento:r.inscripcionId)}</td>
      <td>${pinBadge}<div style="font-size:10px;color:var(--muted);margin-top:2px">enviado: ${esc(r.pin||'')}</div></td>
      <td style="font-size:11px;max-width:340px">${changesHtml||'<span style="color:var(--muted);font-size:10px">sin cambios</span>'}</td>
      <td>
        <button class="btn btn-g" style="padding:5px 10px;font-size:10px" onclick="approveEditRequest('${rid}')">✓ APROBAR</button>
        <button class="btn btn-r" style="padding:5px 10px;font-size:10px;margin-top:4px" onclick="rejectEditRequest('${rid}')">✗ RECHAZAR</button>
      </td>
    </tr>`;
  }).join('');
  return `
    <div class="h1">Solicitudes de edición</div>
    <p class="subtitle">${reqs.length} solicitudes pendientes · el PIN se valida contra inscripciones_private</p>
    <div class="card" style="padding:0;overflow-x:auto">
      <table class="tbl">
        <tr><th>Fecha</th><th>Atleta</th><th>Evento</th><th>PIN</th><th>Cambios propuestos</th><th>Acción</th></tr>
        ${rows}
      </table>
      ${reqs.length===0?'<div class="empty">No hay solicitudes pendientes 🎉</div>':''}
    </div>`;
}

function renderCronograma(){
  // Source events from BOTH eventos/ collection and inscripciones, so that
  // events imported to Firebase but without inscripciones still appear.
  const evNames=new Set();
  (ST.eventos||[]).filter(e=>e.status!=='archived').forEach(e=>evNames.add(e.name||e.id));
  ST.inscripciones.forEach(i=>i.evento&&evNames.add(i.evento));
  const events=[...evNames];
  if(!ST.filterEv&&events.length)ST.filterEv=events[0];
  if(events.length&&!events.includes(ST.filterEv))ST.filterEv=events[0];
  const filtered=ST.inscripciones.filter(i=>i.evento===ST.filterEv&&i.status==='approved');
  const flights=['A','B','C','D','E','F'];
  // Find event ID for public cronograma.html link
  const evObj=(ST.eventos||[]).find(e=>e.name===ST.filterEv||e.id===ST.filterEv);
  const publicLinkId=encodeURIComponent(evObj?.id||ST.filterEv||'');
  return `
    <div class="h1">Cronograma — Asignación de vuelos</div>
    <p class="subtitle">Asigna atletas a vuelos · ${filtered.length} aprobados en evento</p>
    <div class="card" style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px">

        ${events.length===0?'<option>— Sin campeonatos —</option>':events.map(e=>`<option value="${esc(e)}" ${ST.filterEv===e?'selected':''}>${esc(e)}</option>`).join('')}
      </select>
      ${publicLinkId?`<a href="cronograma.html?evento=${publicLinkId}" target="_blank" class="btn btn-o" style="padding:6px 12px;font-size:11px;text-decoration:none">📅 Abrir vista pública</a>`:''}
    </div>
    <div class="card" style="padding:0;overflow-x:auto">
      <table class="tbl">
        <tr><th>#</th><th>Nombre</th><th>Cat.</th><th>Sexo</th><th>Vuelo asignado</th></tr>
        ${filtered.map((i,idx)=>{const sid=encodeURIComponent(i.id||'');return `<tr>
          <td style="color:var(--muted)">${idx+1}</td>
          <td>${esc(i.nombre)}</td>
          <td><span class="badge b-y">${esc(i.categoria||'?')}</span></td>
          <td>${esc((i.sexo||'?').substring(0,1))}</td>
          <td>${flights.map(f=>`<button onclick="assignFlight('${sid}','${f}')" style="background:${i.flight===f?'var(--accent)':'transparent'};color:${i.flight===f?'#fff':'var(--muted)'};border:1px solid var(--border);padding:4px 9px;border-radius:5px;font-family:Oswald;font-size:11px;font-weight:700;cursor:pointer;margin-right:3px">${f}</button>`).join('')}</td>
        </tr>`;}).join('')}
      </table>
      ${filtered.length===0?'<div class="empty">Sin atletas aprobados en este campeonato</div>':''}
    </div>`;
}

function renderLivecast(){
  // Source events from BOTH eventos/ collection and inscripciones.
  const evMap=new Map();
  (ST.eventos||[]).filter(e=>e.status!=='archived').forEach(e=>{
    const label=e.name||e.id;
    evMap.set(label,{label,id:e.id,name:e.name});
  });
  ST.inscripciones.forEach(i=>{
    if(i.evento&&!evMap.has(i.evento)){
      const m=(ST.eventos||[]).find(e=>e.id===i.evento||e.name===i.evento);
      evMap.set(i.evento,{label:i.evento,id:m?.id||i.evento,name:m?.name||i.evento});

  const events=[...evMap.values()];
  return `

window.newEvento = function(){
  ST.eventoForm = {id:'',name:'',date:'',closeDate:'',location:'',org:'',days:'',status:'open',extraCols:['modalidad'],recordsEnabled:true};
  ST.eventoFormMode = 'create';
  render();
};

window.editEvento = function(id){
  const ev = ST.eventos.find(e=>e.id===id);
  if(!ev)return;
  ST.eventoForm = {...ev};
  ST.eventoFormMode = 'edit';
  render();
};

window.saveEvento = async function(){
  const isNew = ST.eventoFormMode === 'create';
  const id  = isNew ? (document.getElementById('ef_id').value||'').trim().replace(/\s+/g,'_') : ST.eventoForm.id;
  const name = (document.getElementById('ef_name').value||'').trim();
  const status = document.getElementById('ef_status').value;
  const date   = document.getElementById('ef_date').value;
  const closeDate = document.getElementById('ef_closeDate').value;
  const location  = document.getElementById('ef_location').value.trim();
  const org       = document.getElementById('ef_org').value.trim();
  const days      = document.getElementById('ef_days').value.trim();
  const extra     = document.getElementById('ef_extra').value;
  const recordsEnabled = document.getElementById('ef_recordsEnabled').checked;

  if(!id || !name){ showToast('ID y nombre son obligatorios', null, true); return; }
  if(isNew && ST.eventos.find(e=>e.id===id)){ showToast('Ya existe un campeonato con ese ID', null, true); return; }

  const data = {id, name, date, closeDate, location, org, days, status,
    extraCols: [extra], recordsEnabled, updatedAt: serverTimestamp()};
  if(isNew) data.createdAt = serverTimestamp();

  try{
    await setDoc(doc(db,'eventos',id), data, {merge:true});
    await logAction(isNew?'create_evento':'update_evento', id, null, name);
    showToast(isNew?'✅ Campeonato creado — ya visible en inscripciones y nómina':'✅ Cambios guardados');
    ST.eventoForm = null;
    render();
  }catch(e){ showToast('Error: '+e.message, null, true); console.error(e); }
};

window.copyPublicLink = function(id, btn){
  const base = location.origin + location.pathname.replace(/[^/]+$/, '');
  const url = base + 'livecast.html?evento=' + encodeURIComponent(id);
  const ok = ()=>{
    if(btn){
      const t=btn.textContent;
      btn.textContent='✓ Copiado — pegalo en WhatsApp';
      btn.style.color='var(--green)';
      btn.style.borderColor='var(--green)';
      setTimeout(()=>{btn.textContent=t;btn.style.color='var(--gold)';btn.style.borderColor='rgba(212,168,67,.4)'},2200);
    }
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(ok).catch(()=>prompt('Copia este link:',url));
  } else {
    prompt('Copia este link:',url);
  }
};

window.closeNomina = async function(id){
  const ev = ST.eventos.find(e=>e.id===id);
  if(!ev) return;
  const insc = ST.inscripciones.filter(i=>i.evento===id);
  const pending = insc.filter(i=>i.status==='pending').length;
  const msg = pending > 0
    ? `⚠️ Hay ${pending} inscripción${pending!==1?'es':''} pendiente${pending!==1?'s':''}. Al cerrar la nómina quedarán como rechazadas.\n\n¿Cerrar igualmente?`
    : `¿Cerrar la nómina de "${ev.name}"?\nNo se aceptarán nuevas inscripciones.`;
  if(!confirm(msg)) return;
  try{
    await setDoc(doc(db,'eventos',id),{status:'closed',closedAt:serverTimestamp()},{merge:true});
    if(pending > 0){
      await Promise.all(insc.filter(i=>i.status==='pending').map(i=>
        updateDoc(doc(db,'inscripciones',i.id),{status:'rejected'})
      ));
    }
    await logAction('close_nomina', id, 'open', 'closed');
    showToast('🔒 Nómina cerrada — '+ev.name);
    ST.eventoForm = null;
    render();
  }catch(e){ showToast('Error: '+e.message, null, true); }
};

window.archiveEvento = async function(id){
  if(!confirm('¿Archivar este campeonato? Seguirá visible en el historial pero no en inscripciones.')) return;
  try{
    await setDoc(doc(db,'eventos',id),{status:'archived',updatedAt:serverTimestamp()},{merge:true});
    await logAction('archive_evento', id, null, 'archived');
    showToast('🗄 Campeonato archivado');
    ST.eventoForm = null;
    render();
  }catch(e){ showToast('Error: '+e.message, null, true); }
};

// Auto-close overdue nominations (runs on loadAll)
async function autoCloseOverdueEventos(){
  const today = new Date().toISOString().slice(0,10);
  const overdue = ST.eventos.filter(ev => ev.status==='open' && ev.closeDate && ev.closeDate < today);
  for(const ev of overdue){
    try{
      await setDoc(doc(db,'eventos',ev.id),{status:'closed',closedAt:serverTimestamp(),autoClosedAt:today},{merge:true});
      await logAction('auto_close_nomina', ev.id, 'open', 'closed', {reason:'closeDate passed'});
      console.log('[Admin] Auto-closed:', ev.name);
    }catch(e){ console.warn('Auto-close failed for', ev.id, e); }
  }
}

window.createAdmin = async function(){
  const nombre = document.getElementById('naNombre').value.trim();
  const email  = document.getElementById('naEmail').value.trim().toLowerCase();
  const pass   = document.getElementById('naPass').value;
  const role   = document.getElementById('naRole').value;
  const errEl  = document.getElementById('naError');
  errEl.style.display = 'none';

  if(!nombre||!email||!pass){ errEl.style.display='block'; errEl.textContent='Completa todos los campos'; return; }
  if(pass.length < 6){ errEl.style.display='block'; errEl.textContent='La contraseña debe tener al menos 6 caracteres'; return; }

  const btn = document.querySelector('#naError + button')||document.querySelector('[onclick="createAdmin()"]');
  if(btn){ btn.disabled=true; btn.textContent='Creando...'; }

  try{
    // Use secondary app instance so we don't log out the current superadmin
    const secondaryApp = initSecondaryApp(FB_CFG, 'admin_creator_'+Date.now());
    const {getAuth:getSecAuth, createUserWithEmailAndPassword:createSecUser} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    const secondaryAuth = getSecAuth(secondaryApp);

    const cred = await createSecUser(secondaryAuth, email, pass);
    const newUID = cred.user.uid;

    // Sign out from secondary immediately
    const {signOut:signOutSec,deleteUser} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    await signOutSec(secondaryAuth);

    // Write to Firestore admins collection
    await setDoc(doc(db,'admins',newUID),{
      uid: newUID,
      email,
      nombre,
      role,
      createdBy: ST.user.email,
      createdAt: new Date().toISOString()
    });

    await logAction('create_admin', email, null, role, {nombre, createdBy:ST.user.email});
    showToast('✅ Admin creado: '+nombre+' ('+email+')');

    // Clear form
    ST.adminForm = {};
    await refreshAdmins();

  }catch(e){
    errEl.style.display='block';
    if(e.code==='auth/email-already-in-use'){
      errEl.textContent = 'Ese correo ya tiene una cuenta en Firebase. Puedes agregarlo manualmente a Firestore con su UID.';
    } else {
      errEl.textContent = 'Error: '+e.message;
    }
    console.error('createAdmin error', e);
  }finally{
    if(btn){ btn.disabled=false; btn.textContent='Crear cuenta'; }
  }
};

window.revokeAdmin = async function(uid, nombre){
  if(!confirm('¿Revocar acceso de admin a '+nombre+'?\nSu cuenta de Firebase se mantiene pero ya no podrá entrar al panel.')) return;
  try{
    await deleteDoc(doc(db,'admins',uid));
    await logAction('revoke_admin', uid, nombre, 'revoked', {by:ST.user.email});
    showToast('🔒 Acceso revocado: '+nombre);
    await refreshAdmins();
  }catch(e){ showToast('Error: '+e.message, null, true); }
};

window.refreshAdmins = async function(){
  await loadAdminsList();
  if(ST.view==='admins') render();
};

function renderAthleteProfile(){
  const a = ST.data?.find(x=>x.codigo===ST.athleteProfile);
  if(!a) return '<div class="h1">Atleta no encontrado</div>';

  const bl = a.bestLifts||{};
  const allComps = a.competencias||[];
  const withResults = allComps.filter(c=>c.resultado&&c.resultado.total>0);
  const sorted = [...withResults].sort((x,y)=>(y.fecha||y.evento||'').localeCompare(x.fecha||x.evento||''));

  // Sex
  const sexRaw = [...allComps].sort((x,y)=>(y.fecha||'').localeCompare(x.fecha||'')).find(c=>c.sexo)?.sexo||'';
  const isFem = sexRaw.match(/mujer|fem/i);

  // Churn
  const lastFecha = allComps.filter(c=>c.fecha).sort((x,y)=>y.fecha.localeCompare(x.fecha))[0]?.fecha||null;
  const monthsSince = lastFecha?Math.floor((Date.now()-new Date(lastFecha))/(1000*60*60*24*30.4)):null;
  const churnRisk = monthsSince&&monthsSince>14;

  // GL history
  const lastModal=(sorted[0]?.modalidad||'').toLowerCase().includes('equip')?'equipped':'classic';
  const glHistory = [...withResults]
    .filter(c=>{
      const m=(c.modalidad||'').toLowerCase().includes('equip')?'equipped':'classic';
      return m===lastModal&&(c.resultado?.glp||c.resultado?.gl);
    })
    .sort((x,y)=>(x.fecha||x.evento||'').localeCompare(y.fecha||y.evento||''));

  // Peer comparison
  const peerKey = _getPeerKey(a);
  const peer = peerKey&&bl.total?_peerPerc(bl.total,peerKey):null;
  const pg = peer?.g;

  // Active inscriptions
  const activeInsc = ST.inscripciones.filter(i=>{
    if(i.status==='rejected')return false;
    return (i.nombre||'').toLowerCase().trim()===(a.nombre||'').toLowerCase().trim()||(i.codigo&&i.codigo===a.codigo);
  });

  const initials = a.nombre.split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();

  let h = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
    <button onclick="ST.athleteProfile=null;go('athletes')" style="background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0;font-family:DM Sans">← Atletas</button>
    <span style="color:var(--border)">|</span>
    <span style="font-size:12px;color:var(--muted)">${a.codigo}</span>
  </div>`;

  // ── Header card ──────────────────────────────────────────
  h+=`<div class="card" style="border-left:4px solid var(--accent);margin-bottom:14px">
    <div style="display:flex;gap:14px;align-items:flex-start">
      <div style="width:64px;height:64px;border-radius:12px;background:var(--bg);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <span class="os" style="font-size:24px;font-weight:700;color:var(--muted)">${initials}</span>
      </div>
      <div style="flex:1;min-width:0">
        <div class="os" style="font-size:22px;font-weight:700;letter-spacing:1px">${a.nombre}</div>
        <div style="font-size:13px;color:var(--gold);font-family:Oswald">${a.codigo}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">
          RUT: <strong style="color:var(--text)">${a.rut||'—'}</strong>
          &nbsp;·&nbsp; Club: <strong style="color:var(--text)">${a.club||'—'}</strong>
          &nbsp;·&nbsp; Debut: <strong style="color:var(--text)">${a.debut||'—'}</strong>
        </div>
        ${churnRisk?`<div style="margin-top:8px;padding:7px 11px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:7px;font-size:11px;color:var(--gold)">⚡ Sin competir ${monthsSince} meses — posible churn</div>`:''}
        <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
          ${sexRaw?`<span class="tag ${isFem?'b-r':'b-b'}">${isFem?'♀ Mujer':'♂ Hombre'}</span>`:''}

          ${withResults.length?`<span class="tag b-g">${withResults.length} resultado${withResults.length!==1?'s':''}</span>`:''}

        </div>
      </div>
      <button onclick="editAthlete('${a.codigo.replace(/'/g,"\\'")}','nombre')" style="padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;flex-shrink:0">✏️ Editar</button>
    </div>
  </div>`;

  // ── PRs ──────────────────────────────────────────────────
  if(bl.sq||bl.bp||bl.dl||bl.total){
    h+=`<div class="card" style="margin-bottom:14px"><div class="h2">Mejores marcas personales</div>

  }

  if(glHistory.length>1){
    const W=460,H=90,PX=8,PY=8;
    const gls=glHistory.map(c=>c.resultado.glp||c.resultado.gl||0);
    const maxG=Math.max(...gls),minG=Math.min(...gls.filter(v=>v>0));
    const catPalette=['#D4A843','#3B82F6','#22C55E','#F59E0B','#C41E3A','#A78BFA','#F472B6'];
    const uniqueCats=[...new Set(glHistory.map(c=>(c.categoria||'').trim()).filter(Boolean))];
    const catColor=c=>{const i=uniqueCats.indexOf((c||'').trim());return i>=0?catPalette[i%catPalette.length]:'#D4A843'};
    const pts=glHistory.map((c,i)=>{
      const x=PX+i*(W-PX*2)/(glHistory.length-1);
      const y=PY+(H-PY*2)*(1-(gls[i]-minG)/Math.max(maxG-minG,1));
      return{x,y,v:gls[i],ev:c.evento||'',fecha:c.fecha||'',cat:(c.categoria||'').trim()};
    });
    const poly=pts.map(p=>p.x+','+p.y).join(' ');
    const area=PX+','+H+' '+poly+' '+pts[pts.length-1].x+','+H;
    h+=`<div class="card" style="margin-bottom:14px"><div class="h2">Evolución GL Points</div>
      <svg viewBox="0 0 ${W} ${H+22}" style="width:100%;max-width:${W}px">
        <defs><linearGradient id="gg2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#D4A843" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#D4A843" stop-opacity="0.02"/>
        </linearGradient></defs>
        <polygon points="${area}" fill="url(#gg2)"/>
        <polyline points="${poly}" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4.5" fill="${catColor(p.cat)}" stroke="var(--card)" stroke-width="2"/>
          <text x="${p.x}" y="${p.y-8}" text-anchor="middle" font-size="9" fill="rgba(212,168,67,.9)" font-family="Oswald" font-weight="700">${p.v}</text>
          <text x="${p.x}" y="${H+16}" text-anchor="middle" font-size="8" fill="rgba(120,143,166,.7)">${(p.ev.match(/20\d\d/)||[''])[0]}</text>`).join('')}
      </svg>
      ${uniqueCats.length>1?`<div style="display:flex;flex-wrap:wrap;gap:6px 12px;justify-content:center;font-size:10px;color:var(--muted);margin-top:6px;padding-top:8px;border-top:1px solid rgba(30,58,95,.3)">
        ${uniqueCats.map(cat=>`<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:50%;background:${catColor(cat)};display:inline-block"></span>${cat}</span>`).join('')}
      </div>`:''}
    </div>`;
  }

  // ── Peer comparison ───────────────────────────────────────
  if(peer&&pg){
    const pctColor=peer.pct>=75?'var(--green)':peer.pct>=50?'var(--gold)':'var(--accent)';
    const keyParts=peerKey.split('|');
    const peerLabel=(keyParts[0]==='F'?'Mujer':'Hombre')+' · '+keyParts[1]+' kg · '+keyParts[2];
    const maxT=pg.members[0]?.total||1;
    h+=`<div class="card" style="margin-bottom:14px"><div class="h2">Comparativa en categoría</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px">${peerLabel} · ${pg.n} atletas en el grupo</div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
            <span style="color:var(--muted)">Posición</span>
            <span style="font-weight:700;color:${pctColor}">Top ${100-peer.pct}% · #${peer.rank} de ${peer.n}</span>
          </div>
          <div style="background:rgba(30,58,95,.4);border-radius:6px;height:10px;overflow:hidden">
            <div style="background:${pctColor};height:100%;width:${Math.max(peer.pct,4)}%;border-radius:6px"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:3px">
            <span>Mín</span><span>Prom ${pg.avg}</span><span>Top ${pg.top}</span>
          </div>
        </div>
        <div style="text-align:center;min-width:54px">
          <div class="os" style="font-size:28px;font-weight:700;color:${pctColor}">${peer.pct}°</div>
          <div style="font-size:9px;color:var(--muted)">PERCENTIL</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">

          <div style="background:var(--bg);border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:9px;color:var(--muted);margin-bottom:2px">${lbl}</div>

      </div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:6px;font-family:Oswald;letter-spacing:1px">TOP DE LA CATEGORÍA</div>
      ${pg.members.map((m,i)=>{
        const isMe=m.codigo===a.codigo;

        const col=isMe?'var(--accent)':i===0?'var(--gold)':'var(--blue)';
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
          <span style="font-size:10px;font-family:Oswald;color:${isMe?'var(--accent)':'var(--muted)'};min-width:14px">${i+1}</span>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px">
              <span style="font-weight:${isMe?700:400};color:${isMe?'var(--accent)':'var(--text)'}">${m.nombre}${isMe?' ← este atleta':''}</span>

            </div>
          </div>
        </div>`;
      }).join('')}

  }

  // ── Active inscriptions ───────────────────────────────────
  if(activeInsc.length){

          <div style="font-weight:600;font-size:13px">${evName}</div>

  // ── Competition history ───────────────────────────────────
  if(sorted.length){
    h+=`<div class="card"><div class="h2">Historial de competencias (${sorted.length})</div>`;
    sorted.forEach((c,ci)=>{
      const r=c.resultado||{};
      const prevTotal=sorted[ci+1]?.resultado?.total||0;
      const delta=prevTotal?r.total-prevTotal:null;
      const glVal=r.glp||r.gl||null;
      h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(30,58,95,.3)">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.evento}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${c.division||'—'} · ${c.categoria||'—'}${c.modalidad?' · '+c.modalidad:''}</div>
          ${c.fecha?`<div style="font-size:10px;color:var(--muted)">${c.fecha}</div>`:''}
          <div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:4px">
            ${r.sq?`<span style="font-size:9px;background:rgba(59,130,246,.1);color:var(--blue);padding:1px 5px;border-radius:3px">SQ ${r.sq}</span>`:''}
            ${r.bp?`<span style="font-size:9px;background:rgba(245,158,11,.1);color:var(--orange);padding:1px 5px;border-radius:3px">BP ${r.bp}</span>`:''}
            ${r.dl?`<span style="font-size:9px;background:rgba(34,197,94,.1);color:var(--green);padding:1px 5px;border-radius:3px">DL ${r.dl}</span>`:''}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:12px">
          <div class="os" style="font-size:19px;font-weight:700;color:var(--gold)">${r.total} kg</div>
          ${delta!==null?`<div style="font-size:11px;font-weight:700;color:${delta>0?'var(--green)':delta<0?'var(--red)':'var(--muted)'}">${delta>0?'+':''}${delta} kg</div>`:''}
          ${glVal?`<div style="font-size:10px;color:var(--muted)">GL ${glVal}${r.pos?' · #'+r.pos:''}</div>`:''}
        </div>
      </div>`;
    });
    h+=`</div>`;
  }

  return h;
}

// IPF GL coefficients (same as livecast)
const _GL_COEFS = {
  'cl_M':[1236.25115,1449.21864,0.01644],'cl_F':[758.63878,949.31382,0.02435],
  'eq_M':[1734.77461,2016.88442,0.01513],'eq_F':[1082.96783,1483.20778,0.02097],
  'bench_cl_M':[327.89535,586.52174,0.02564],'bench_cl_F':[225.04394,330.66667,0.02694],
  'bench_eq_M':[588.86016,755.03316,0.02239],'bench_eq_F':[260.66000,391.00000,0.02800],
};
function _glKey(m,s){const eq=(m||'').toLowerCase().includes('equip');const bench=(m||'').toLowerCase().includes('bench')&&!(m||'').toLowerCase().includes('powerlifting');const sex=(s||'').match(/mujer|fem|f/i)?'F':'M';return(bench?(eq?'bench_eq_':'bench_cl_'):(eq?'eq_':'cl_'))+sex;}
