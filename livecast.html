<title>YourLift LiveCast</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1628;--card:#11223B;--border:#1E3A5F;--text:#D4E1F0;--muted:#7A8FA6;--accent:#C41E3A;--blue:#1E5BA8;--gold:#D4A843;--green:#22c55e;--red:#ef4444;--orange:#f59e0b}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,button{font-family:inherit;outline:none}
.os{font-family:'Oswald',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseRed{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade{animation:fadeIn .3s ease}
.shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.side{background:#0d1b30;border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{padding:20px;overflow-y:auto}
.logo{font-family:'Oswald';font-size:20px;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.logo span{color:var(--accent)}
.side-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:20px 0 8px;font-family:'Oswald'}
.side-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;font-family:'DM Sans';margin-bottom:2px}
.side-btn:hover{background:rgba(196,30,58,.08);color:var(--text)}
.side-btn.active{background:var(--accent);color:#fff}
.side-btn .icon{font-size:16px;width:22px;text-align:center}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.inp{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px}
.inp:focus{border-color:var(--accent)}
.inp-sm{padding:6px 4px;font-size:12px;text-align:center;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);width:100%}
.inp-sm:focus{border-color:var(--accent)}
.inp-sm.expired{border-color:var(--red)!important;background:rgba(239,68,68,.1)!important}
.inp-sm.countdown{border-color:var(--orange)!important;background:rgba(245,158,11,.08)!important}
.btn{padding:10px 20px;border-radius:8px;border:none;font-weight:600;font-size:13px;cursor:pointer;font-family:'Oswald';letter-spacing:1px;text-transform:uppercase;transition:all .15s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-r{background:var(--accent);color:#fff}.btn-g{background:var(--green);color:#fff}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-o:hover{border-color:var(--accent);color:var(--text)}
.flight-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:'Oswald';color:#fff}
.att{text-align:center;padding:5px 3px;border-radius:5px;font-weight:700;font-family:'Oswald';font-size:12px;min-width:46px;cursor:pointer;display:inline-block}
.att-g{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.att-n{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);text-decoration:line-through}
.att-p{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.att-e{background:transparent;color:var(--muted);border:1px solid rgba(30,58,95,.3)}
.plate{display:inline-flex;align-items:center;justify-content:center;font-family:'Oswald';font-weight:700;border-radius:3px;margin:0 1px;color:#fff}
.sb-wrap{background:var(--bg);min-height:100vh}
.sb-top{display:flex;justify-content:space-between;align-items:center;padding:12px 30px;background:linear-gradient(90deg,var(--accent),#8B1525);color:#fff}
.sb-body{display:grid;grid-template-columns:1fr 380px;min-height:calc(100vh - 56px)}
@media(max-width:900px){.shell{grid-template-columns:1fr}.side{display:none}.sb-body{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="R"></div>
<script src="clubs.js"></script>
<script src="https://cdn.jsdelivr.net/npm/obs-websocket-js@5/dist/obs-ws.min.js"></script>
<script>

let DATA={phase:'setup',events:[],event:null,athletes:[],lift:'sq',round:0,flight:'A',timer:60,timerOn:false,changeTimers:{},lotsGenerated:false};

// ══════════════════════════════════════════════
// TRANSMISSION WIDGETS (?tx=<widget>)
// Standalone widgets for OBS Browser Sources. Read-only.
// ══════════════════════════════════════════════
const TX_URL=new URLSearchParams(location.search);
const TX_MODE=TX_URL.get('tx')||null; // 'profile' | 'scoreboard' | 'leaderboard' | 'lbauto' | 'slam' | 'timer' | 'lights' | 'ceremony' | null
if(TX_MODE){
  const css=document.createElement('style');
  css.textContent=`
    html,body{background:transparent!important;overflow:hidden!important;margin:0}
    body.tx-opaque{background:linear-gradient(135deg,#0A1628 0%,#0E1F3A 50%,#0A1628 100%)!important}
    #R{display:none!important}
    #txWidget{position:fixed;inset:0;font-family:'Oswald',sans-serif;color:#fff}
    @keyframes txSlideRight{from{transform:translateX(-40px);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes txSlideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes txSlideDown{from{transform:translateY(-40px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes txFade{from{opacity:0}to{opacity:1}}
    @keyframes txScaleIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes txGrowLine{from{transform:scaleY(0);transform-origin:top}to{transform:scaleY(1);transform-origin:top}}
    @keyframes txGrowLineH{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1);transform-origin:left}}
    @keyframes txSlamIn{0%{transform:scale(.4) rotate(-8deg);opacity:0;letter-spacing:30px}55%{transform:scale(1.15) rotate(0);opacity:1;letter-spacing:8px}75%{transform:scale(.95)}100%{transform:scale(1);letter-spacing:8px}}
    @keyframes txSlamOut{from{transform:scale(1);opacity:1}to{transform:scale(1.6);opacity:0;filter:blur(8px)}}
    @keyframes txSlamFlash{0%,100%{background:rgba(0,0,0,0)}40%{background:rgba(0,0,0,.45)}}
    @keyframes txLightOn{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes txTimerPulse{0%,100%{opacity:1}50%{opacity:.55}}
    @keyframes txScoreboardCycle{0%{transform:translateY(110%);opacity:0}3%{transform:translateY(0);opacity:1}97%{transform:translateY(0);opacity:1}100%{transform:translateY(110%);opacity:0}}
    @keyframes txLbCycle{0%{transform:scale(.92);opacity:0}5%{transform:scale(1);opacity:1}95%{transform:scale(1);opacity:1}100%{transform:scale(1.04);opacity:0;filter:blur(4px)}}
    @keyframes txRecordSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    @keyframes txRecordIn{0%{transform:scale(0) rotate(-180deg);opacity:0}60%{transform:scale(1.15) rotate(20deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
    @keyframes txRecordOut{from{transform:scale(1);opacity:1}to{transform:scale(.6);opacity:0}}
    .txCascade>*{animation:txSlideRight .55s cubic-bezier(.2,.8,.2,1) backwards}
    .txCascade>*:nth-child(1){animation-delay:.15s}
    .txCascade>*:nth-child(2){animation-delay:.32s}
    .txCascade>*:nth-child(3){animation-delay:.49s}
    .txCascade>*:nth-child(4){animation-delay:.66s}
    .txCascade>*:nth-child(5){animation-delay:.83s}
    .txCascade>*:nth-child(6){animation-delay:1.0s}
    .txCascade>*:nth-child(7){animation-delay:1.17s}
    .txCascade>*:nth-child(8){animation-delay:1.34s}
    .txCascade>*:nth-child(9){animation-delay:1.51s}
    .txCascade>*:nth-child(10){animation-delay:1.68s}
    .txCascade>*:nth-child(11){animation-delay:1.85s}
    .txCascade>*:nth-child(12){animation-delay:2.02s}
  `;
  document.head.appendChild(css);
  const ready=()=>{
    if(TX_MODE==='profile'||TX_MODE==='leaderboard')document.body.classList.add('tx-opaque');
    const d=document.createElement('div');d.id='txWidget';document.body.appendChild(d);
    // Sin placeholder: queda transparente hasta que llegan los datos.
  };
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',ready);else ready();
  // Replay de animación cuando la escena de OBS se activa (sin recargar).
  // Funciona con OBS Browser Source y al volver al tab en navegador normal.
  window.txReplay=function(){
    if(typeof _txLastLifter!=='undefined')_txLastLifter=null;
    if(typeof renderTxWidget==='function')renderTxWidget();
  };
  window.addEventListener('obsSourceActiveChanged',e=>{if(e&&e.detail&&e.detail.active)window.txReplay()});
  window.addEventListener('obsSourceVisibleChanged',e=>{if(e&&e.detail&&e.detail.visible)window.txReplay()});
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)window.txReplay()});
}

// ══════════════════════════════════════════════
// ADMIN CREDENTIALS — Editar aquí para cambiar accesos
// ══════════════════════════════════════════════
// Admin credentials managed via Firebase Auth (admin.html → Firebase Console)
// ══════════════════════════════════════════════

let isAdmin=false;
// ══════════════════════════════════════════════
// FIREBASE REAL-TIME SYNC
// ══════════════════════════════════════════════
const FB_CFG={apiKey:"AIzaSyA21IHMus2bklPLJm7ExRrVJJL9bzLhyp4",authDomain:"fechipo-db-13148.firebaseapp.com",projectId:"fechipo-db-13148",storageBucket:"fechipo-db-13148.firebasestorage.app",messagingSenderId:"551573388751",appId:"1:551573388751:web:5fcc377a8d595378ab26ba"};
let fbDB=null,fbReady=false,fbUnsub=null,_fbSyncing=false,_fbLastWrite=0,fbAuth=null;
// Event ID → name mapping (must match inscripcion.html EVENTS)
let LIVE_EVENTS={'regional_centro_2026':'Campeonato Regional Centro FECHIPO 2026','universitario_2026':'Primer Campeonato Nacional Universitario FECHIPO 2026','Campeonato_de_debutantes':'Campeonato de Debutantes'};
let _liveUnsub=null; // Firestore listener for current event athletes

async function initFB(){
  try{
    const{initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const fb=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const authMod=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    const app=initializeApp(FB_CFG);fbDB=fb.getFirestore(app);
    fbAuth=authMod.getAuth(app);
    window._fb=fb;window._fbAuth=authMod;fbReady=true;
    // Keep LIVE_EVENTS in sync with Firestore eventos
    fb.onSnapshot(fb.collection(fbDB,'eventos'),(snap)=>{
      const evs={};
      window.LIVE_EVENT_META=window.LIVE_EVENT_META||{};
      snap.docs.forEach(d=>{
        const e=d.data();
        if(e.status==='archived')return;
        evs[d.id]=e.name;
        // Default récords activos; en "Universitario" arrancan apagados.
        const recordsEnabled=(typeof e.recordsEnabled==='boolean')
          ? e.recordsEnabled
          : !/universitar/i.test(e.name||'');
        window.LIVE_EVENT_META[d.id]={name:e.name,recordsEnabled};
        // Sync flag al evento activo
        if(DATA.event&&(DATA.event.id===d.id||DATA.event.name===e.name)){
          DATA.event.recordsEnabled=recordsEnabled;
        }
      });
      if(Object.keys(evs).length)LIVE_EVENTS=evs;
      if(DATA.phase==='setup'&&DATA.events.length>0)R();
    });
    // Check if already logged in (session persists)
    authMod.onAuthStateChanged(fbAuth,(u)=>{
      if(u){
        // Verify this user is an admin in Firestore
        fb.getDoc(fb.doc(fbDB,'admins',u.uid)).then(snap=>{
          if(snap.exists()){
            isAdmin=true;
            console.log('[LiveCast] Admin session detected:',u.email);
          } else {
            isAdmin=false;
            console.log('[LiveCast] Logged in but not admin:',u.email);
          }
          R();
        }).catch(()=>{isAdmin=true;R();}); // fallback: trust auth
      } else {
        if(isAdmin){isAdmin=false;DATA.phase='results';R();}
      }
    });
    console.log('[FB] Firebase ready');
    if(DATA.event)startFBSync();
    // If redirected back from admin.html after login
    if(sessionStorage.getItem('livecast_return')){
      sessionStorage.removeItem('livecast_return');
    }
  }catch(e){console.warn('[FB] Init failed',e)}
}
function fbDocId(){
  if(!DATA.event)return null;
  return(DATA.event.name||'comp').replace(/[^a-zA-Z0-9]/g,'_').substring(0,60);
}
async function syncToFB(){
  if(!fbReady||!isAdmin||_fbSyncing)return;
  const id=fbDocId();if(!id)return;
  _fbLastWrite=Date.now();
  try{
    const ref=window._fb.doc(fbDB,'livecast_sync',id);
    await window._fb.setDoc(ref,{
      event:DATA.event,athletes:JSON.stringify(DATA.athletes),
      lift:DATA.lift,round:DATA.round,flight:DATA.flight,
      changeTimers:JSON.stringify(DATA.changeTimers),lotsGenerated:DATA.lotsGenerated||false,
      timer:DATA.timer,timerOn:DATA.timerOn,
      ts:Date.now()
    });
  }catch(e){console.warn('[FB] Sync write error',e)}

function _normCat(s){const m=(s||'').match(/(\d+\+?)/);return m?m[1]:s;}
function _normDiv(d){
  const v=(d||'').toLowerCase().replace(/[\s\-_]/g,'');
  if(v.startsWith('sub'))return 'Sub-Junior';
  if(v.startsWith('junior'))return 'Junior';
  if(v.startsWith('open'))return 'Open';
  if(v.includes('master4')||v.includes('masteriv'))return 'Master IV';
  if(v.includes('master3')||v.includes('masteriii'))return 'Master III';
  if(v.includes('master2')||(v.includes('masterii')&&!v.includes('iii')))return 'Master II';

function setAtt(id,l,r,val){
  const a=DATA.athletes.find(x=>x.id===id);if(!a)return;
  const w=parseFloat(val)||0;
  // Block if change timer has expired for this attempt
  const key=id+'_'+l+'_'+r;
  const ct=DATA.changeTimers[key];
  if(ct&&ct.expired){
    showToastLC('\u23F0 Tiempo de cambio expirado para '+a.name+' '+LIFT_S[l]+(r+1)+' — requiere aprobación del jurado');
    // Restore previous value in the input
    const el=document.getElementById('ct_'+key);
    if(el)el.value=a.att[l][r].w||'';
    return;
  }
  if(w>0){
    // Rule: each attempt must be ≥ all previous attempts (successful or not)
    for(let prev=r-1;prev>=0;prev--){
      const p=a.att[l][prev];
      if(p.w>0&&w<p.w){
        showToastLC('\u26A0\uFE0F '+a.name+': intento '+(r+1)+' ('+w+'kg) menor al intento '+(prev+1)+' ('+p.w+'kg) — bloqueado');
        const el=document.getElementById('ct_'+key);
        if(el)el.value=a.att[l][r].w||'';
        return;
      }
    }
    // Warn if weight seems unusually small vs category (< 50% of cat number)
    const catKg=parseFloat((a.cat||'').replace(/[^0-9.]/g,''))||0;
    if(catKg>0&&w<catKg*0.3){
      if(!confirm('\u26A0\uFE0F El peso '+w+'kg parece muy bajo para la categoría '+a.cat+'. ¿Confirmar igualmente?')){
        const el=document.getElementById('ct_'+key);
        if(el)el.value=a.att[l][r].w||'';
        return;
      }
    }
  }
  a.att[l][r].w=w;
  if(DATA.changeTimers[key])delete DATA.changeTimers[key];
  save();
}

function setResult(id,l,r,res){
  const a=DATA.athletes.find(x=>x.id===id);if(!a)return;a.att[l][r].r=res;
  if(r<2){
    const key=id+'_'+l+'_'+(r+1);
    // Solo arrancar el change timer si el próximo intento NO tiene peso declarado.
    // Si el operador ya cargó el peso antes de marcar este intento, no hay que
    // pedirle que lo declare otra vez ni hacer sonar la alarma a los 60s.
    if(!a.att[l][r+1]||!a.att[l][r+1].w){
      DATA.changeTimers[key]={remaining:60,expired:false};
      startCT(key);
    } else if(DATA.changeTimers[key]){
      delete DATA.changeTimers[key];
    }
  }
  if(a.att[l].every(x=>x.r==='n'))a.bombed=true;
  DATA.timer=60;DATA.timerOn=false;clearInterval(mainTI);mainTI=null;
  // Record alert: check if this good lift breaks a national record
  if(res==='g')checkRecord(a,l,r);
  // Reset judge lights for next athlete
  if(judgeMode)resetJudgeLights();
  saveNow();R();
  // Auto-advance: if liftQueue is now empty, round is done
  const snapLift=DATA.lift,snapRound=DATA.round;
  if(liftQueue().length===0){
    showToastLC('✅ Ronda completada — avanzando en 3s…');
    setTimeout(()=>{if(DATA.lift===snapLift&&DATA.round===snapRound)advanceLift();},3000);
  }
}

  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3500);

function startJudgeListener(){
  if(!fbReady)return;
  if(judgeUnsub){judgeUnsub();judgeUnsub=null}
  // Also listen for timer-start signals from judge panel
  let _timerListenerFirst=true;
  window._fb.onSnapshot(window._fb.doc(fbDB,'timer_control','current'),(snap)=>{
    if(!snap.exists())return;
    const d=snap.data();
    // First snapshot: just record current ts to ignore stale signals already in Firestore
    if(_timerListenerFirst){
      _timerListenerFirst=false;
      if(d.ts)_lastTimerSignal=d.ts;
      return;
    }
    if(d.action==='start'&&d.ts&&d.ts>_lastTimerSignal){
      _lastTimerSignal=d.ts;
      if(!DATA.timerOn)startTimer();
    }
  });
  judgeUnsub=window._fb.onSnapshot(window._fb.doc(fbDB,'judge_decisions','current'),(snap)=>{
    if(!snap.exists())return;
    const d=snap.data();
    judgeLights={izq:d.izq||null,central:d.central||null,der:d.der||null};
    // Check if all 3 judges voted
    if(judgeLights.izq&&judgeLights.central&&judgeLights.der){
      // Determine result by majority
      const votes=[judgeLights.izq,judgeLights.central,judgeLights.der];
      const goods=votes.filter(v=>v==='white').length;
      const result=goods>=2?'g':'n';
      // Auto-apply result to current athlete
      const queue=liftQueue();
      if(queue.length>0){
        const cur=queue[0];
        setTimeout(()=>{
          setResult(cur.id,DATA.lift,DATA.round,result);
        },2000); // 2s delay to show lights before advancing
      }
    }
    R();
  });
}

function _inscToAthlete(ins, j, flightMap){
  const name=ins.nombre||'';
  const fl=flightMap&&flightMap[name]?flightMap[name]:(ins.flight||'A');
  const rawMod=(ins.modalidad||'').toLowerCase();
  const mod=rawMod.includes('equipado')||rawMod.includes('equipped')?'equipped':'classic';
  const catRaw=ins.categoria||'';
  const catNum=catRaw.match(/(\d+\+?)/)?catRaw.match(/(\d+\+?)/)[1]:catRaw;
  return{
    id:j,lot:j+1,name,rut:ins.rut||'',sex:ins.sexo||'',
    cat:catNum,div:ins.division||'',club:ins.club==='Otro'?ins.clubOtro:ins.club||'',
    uni:ins.universidad||'',mod,bw:0,flight:fl,rackSQ:'',rackBP:'',
    bombed:false,weighedIn:false,
    att:{sq:[{w:0,r:null},{w:0,r:null},{w:0,r:null}],
         bp:[{w:0,r:null},{w:0,r:null},{w:0,r:null}],
         dl:[{w:0,r:null},{w:0,r:null},{w:0,r:null}]}
  };
}

function _mergeFirebaseAthletes(fbAthletes){
  // Merge: update existing athletes by name/rut, add new ones, remove deleted
  let changed=false;
  // Helper: matchea atleta local con uno de Firestore (por RUT primero, luego nombre)
  const matches=(local,fa)=>(fa.rut&&local.rut&&local.rut.replace(/[^0-9kK]/g,'')===fa.rut.replace(/[^0-9kK]/g,''))||local.name===fa.name;

  fbAthletes.forEach((fa,j)=>{
    const existing=DATA.athletes.find(a=>matches(a,fa));
    if(!existing){
      // New athlete — only add if competition not started
      if(DATA.phase==='manage'||DATA.phase==='setup'){
        const newId=DATA.athletes.length?Math.max(...DATA.athletes.map(a=>a.id))+1:0;
        DATA.athletes.push({...fa,id:newId,lot:newId+1});
        changed=true;
      }
    }else{
      // Update flight if changed in Firestore
      if(fa.flight&&fa.flight!==existing.flight){existing.flight=fa.flight;changed=true;}
    }
  });

  // ── DETECCIÓN DE BORRADOS ─────────────────────────────────────
  // Atletas locales que ya no existen en Firestore (admin los eliminó)
  const stale=DATA.athletes.filter(local=>!fbAthletes.some(fa=>matches(local,fa)));
  if(stale.length){
    // Atletas con datos ya cargados (peso, intentos, resultados) — no auto-borrar
    const hasData=a=>a.bw>0||['sq','bp','dl'].some(l=>(a.att?.[l]||[]).some(x=>x.w>0||x.r));
    const safeToRemove=stale.filter(a=>!hasData(a));
    const withData=stale.filter(hasData);
    // Borrado automático de los que no tienen datos
    if(safeToRemove.length){
      const ids=new Set(safeToRemove.map(a=>a.id));
      DATA.athletes=DATA.athletes.filter(a=>!ids.has(a.id));
      changed=true;
      showToastLC('🗑️ '+safeToRemove.length+' atleta'+(safeToRemove.length>1?'s':'')+' eliminado'+(safeToRemove.length>1?'s':'')+' (borrados desde admin)');
    }
    // Aviso sobre los que tienen datos — el operador decide manualmente
    if(withData.length){
      console.warn('[LC] Atletas con datos pero borrados del admin:',withData.map(a=>a.name));
      showToastLC('⚠️ '+withData.length+' atleta'+(withData.length>1?'s':'')+' borrado'+(withData.length>1?'s':'')+' del admin pero con datos cargados acá. Revisá Atletas & Pesaje y borralo'+(withData.length>1?'s':'')+' a mano si corresponde.');
    }
  }
  if(changed){save();R();}
}

function loadLiveAthletes(ev){
  // Stop previous listener
  if(_liveUnsub){_liveUnsub();_liveUnsub=null;}
  // Find event ID from name
  const evId=Object.keys(LIVE_EVENTS).find(k=>LIVE_EVENTS[k]===ev.name)||null;
  if(!evId){
    console.warn('[LiveCast] No Firestore ID for event:',ev.name);
    return;
  }
  // Load saved flight assignments from cronograma
  const cronoKey='fechipo_crono_'+(ev.name||'').replace(/\s+/g,'_');
  let flightMap=null;
  try{const saved=localStorage.getItem(cronoKey);if(saved){const d=JSON.parse(saved);if(d.map)flightMap=d.map}}catch(e){}

  const q=window._fb.query(
    window._fb.collection(fbDB,'inscripciones'),
    window._fb.where('evento','==',evId),
    window._fb.where('status','in',['approved','pending'])
  );

  _liveUnsub=window._fb.onSnapshot(q,(snap)=>{
    const fbAthletes=snap.docs
      .map(d=>({...d.data(),id:d.id}))
      .sort((a,b)=>(a.timestamp?.seconds||0)-(b.timestamp?.seconds||0))
      .map((ins,j)=>_inscToAthlete(ins,j,flightMap));

    if(!fbAthletes.length)return; // no Firestore data — keep nominas.json data

    if(DATA.phase==='setup'){
      // Full replace: Firestore is source of truth during setup
      DATA.athletes=fbAthletes.map((a,j)=>({...a,id:j,lot:j+1}));
      const firstFlight=[...new Set(DATA.athletes.map(a=>a.flight))].sort()[0]||'A';
      DATA.flight=firstFlight;
      save();R();
      showToastLC('\uD83D\uDD34 Nómina en vivo: '+fbAthletes.length+' atletas desde Firestore');
    }else{
      // During competition: only merge new approvals, don't touch existing
      _mergeFirebaseAthletes(fbAthletes);
    }
  });
}
function overrideResult(id,l,r,res){
  const a=DATA.athletes.find(x=>x.id===id);if(!a)return;
  // Toggle: clicking same result clears it
  a.att[l][r].r=(a.att[l][r].r===res)?null:res;
  // Recalculate bomb-out: bombed only if ALL 3 attempts are 'n'
  a.bombed=a.att.sq.every(x=>x.r==='n')&&a.att.bp.every(x=>x.r==='n')&&a.att.dl.every(x=>x.r==='n');
  // Lighter bomb-out: if all attempts of a single lift are 'n' → bombed
  a.bombed=a.att.sq.every(x=>x.r==='n')||a.att.bp.every(x=>x.r==='n')||a.att.dl.every(x=>x.r==='n');
  saveNow();R();
}

        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
    }
    if(!window.jspdf?.jsPDF?.prototype?.autoTable){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js';
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
    }

    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    const PW=297,PH=210;

    // ── Color palette ────────────────────────────────────
    const C={
      bg:[8,22,40],        // dark navy
      header:[196,30,58],  // FECHIPO red
      gold:[212,168,67],
      green:[22,163,74],
      red:[220,38,38],
      muted:[120,143,166],
      border:[30,58,95],
      rowAlt:[13,30,54],
      white:[255,255,255],
      lightGray:[230,235,242]
    };

    // ── Build data ───────────────────────────────────────
    const all=DATA.athletes.map(a=>({
      ...a,
      total:totalOf(a),
      gl:calcGL(totalOf(a),a.bw,a.sex)
    }));

    // Best Lifter per division (highest GL)
    const divGL={};
    all.filter(a=>a.total>0).forEach(a=>{
      const d=a.div||'Sin Div';
      if(!divGL[d]||a.gl>divGL[d].gl)divGL[d]={id:a.id,gl:a.gl};
    });

    // Group by sex+cat, sort females first then by cat weight
    const catGroups={};
    all.forEach(a=>{
      const k=(a.sex||'?')+'\u001F'+(a.cat||'?');
      if(!catGroups[k])catGroups[k]=[];
      catGroups[k].push(a);
    });
    Object.values(catGroups).forEach(arr=>arr.sort((a,b)=>b.total-a.total));

    const catKeys=Object.keys(catGroups).sort((a,b)=>{
      const [sa,na_]= a.split('\u001F');
      const [sb,nb_]= b.split('\u001F');
      const isMa=sa==='Hombre'||sa==='M'||sa==='Masculino';
      const isMb=sb==='Hombre'||sb==='M'||sb==='Masculino';
      if(isMa!==isMb)return isMa?1:-1;
      const na=parseFloat(na_.replace(/[^0-9.]/g,''))||999;
      const nb=parseFloat(nb_.replace(/[^0-9.]/g,''))||999;
      return na-nb;
    });

    // ── Helpers ──────────────────────────────────────────
    function attCell(at){
      if(!at.w)return{text:'—',color:C.muted};
      if(at.r==='g')return{text:String(at.w),color:C.green};
      if(at.r==='n')return{text:String(at.w),color:C.red,strike:true};
      return{text:String(at.w),color:C.muted};
    }
    function isBL(a){return divGL[a.div||'Sin Div']?.id===a.id&&a.total>0;}

    // ── Draw page background ─────────────────────────────
    function drawPageBg(){
      doc.setFillColor(...C.bg);
      doc.rect(0,0,PW,PH,'F');
    }

    // ── Draw event header (first time only) ─────────────
    let isFirstPage=true;
    function drawHeader(){
      // Red accent bar
      doc.setFillColor(...C.header);
      doc.rect(0,0,PW,12,'F');
      // FECHIPO title
      doc.setTextColor(...C.white);
      doc.setFont('helvetica','bold');
      doc.setFontSize(11);
      doc.text('FECHIPO',8,8.5);
      // Event name center
      doc.setFont('helvetica','normal');
      doc.setFontSize(9);
      const evName=(DATA.event?.name||'Campeonato FECHIPO').toUpperCase();
      doc.text(evName,PW/2,8.5,{align:'center'});
      // Date right
      doc.setFontSize(8);
      doc.text(new Date().toLocaleDateString('es-CL'),PW-8,8.5,{align:'right'});
      // Subtitle bar
      doc.setFillColor(...C.rowAlt);
      doc.rect(0,12,PW,7,'F');
      doc.setTextColor(...C.gold);
      doc.setFont('helvetica','bold');
      doc.setFontSize(8);
      doc.text('ACTA OFICIAL DE RESULTADOS — POWERLIFTING CHILE',PW/2,17,{align:'center'});
    }

    // ── Render one category section ──────────────────────
    let curY=0;

    function renderCategory(catKey){
      const [sex,cat]=catKey.split('\u001F');
      const athletes=catGroups[catKey];
      if(!athletes||!athletes.length)return;

      // Rank only athletes with total>0
      let rank=1;
      athletes.forEach(a=>{a._rank=a.total>0?rank++:null;});

      const isFem=sex==='Mujer'||sex==='Femenino'||sex==='F';
      const sexSymbol=isFem?'\u2640':'\u2642';
      const sexLabel=isFem?'FEMENINO':'MASCULINO';

      // Auto-split to new page if no room (need at least 30mm for header + 1 row)
      const neededH=22+(athletes.length*7)+4;
      if(curY>0&&curY+neededH>PH-8){
        doc.addPage();
        drawPageBg();
        drawHeader();
        curY=22;
      }

      // Category header band
      doc.setFillColor(...C.border);
      doc.rect(8,curY,PW-16,8,'F');
      doc.setTextColor(...C.gold);
      doc.setFont('helvetica','bold');
      doc.setFontSize(9);
      doc.text(sexSymbol+' '+sexLabel+' — '+cat,12,curY+5.5);
      doc.setTextColor(...C.muted);
      doc.setFont('helvetica','normal');
      doc.setFontSize(7.5);
      doc.text(athletes.length+' atletas',PW-12,curY+5.5,{align:'right'});
      curY+=10;

      // Build table
      const cols=[
        {header:'Pos',w:8},{header:'Atleta',w:42},{header:'Club',w:28},{header:'BW',w:11},
        {header:'SQ1',w:13},{header:'SQ2',w:13},{header:'SQ3',w:13},
        {header:'BP1',w:13},{header:'BP2',w:13},{header:'BP3',w:13},
        {header:'DL1',w:13},{header:'DL2',w:13},{header:'DL3',w:13},
        {header:'Total',w:14},{header:'GL',w:13},{header:'BL',w:8}
      ];

      // Column header row
      let cx=8;
      doc.setFillColor(20,38,68);
      doc.rect(8,curY,PW-16,6,'F');
      doc.setTextColor(...C.muted);
      doc.setFont('helvetica','bold');
      doc.setFontSize(6.5);
      cols.forEach(col=>{
        doc.text(col.header,cx+col.w/2,curY+4,{align:'center'});
        cx+=col.w;
      });
      curY+=6;

      // Data rows
      athletes.forEach((a,ri)=>{
        const rowH=7;
        // Alternate row bg
        doc.setFillColor(...(ri%2===0?C.bg:C.rowAlt));
        doc.rect(8,curY,PW-16,rowH,'F');

        const bl=isBL(a);

        const cells=[
          {text:a._rank?String(a._rank):'DNF',color:a._rank<=3?C.gold:C.white,bold:!!a._rank},
          {text:a.name,color:C.white,bold:false,maxW:40},
          {text:(a.club||'—').substring(0,20),color:C.muted,bold:false},
          {text:a.bw?String(a.bw):'—',color:C.muted,bold:false},
          attCell(a.att.sq[0]),attCell(a.att.sq[1]),attCell(a.att.sq[2]),
          attCell(a.att.bp[0]),attCell(a.att.bp[1]),attCell(a.att.bp[2]),
          attCell(a.att.dl[0]),attCell(a.att.dl[1]),attCell(a.att.dl[2]),
          {text:a.total?String(a.total):'—',color:C.white,bold:true},
          {text:a.gl?String(a.gl):'—',color:C.gold,bold:true},
          {text:bl?'\u2605':'',color:C.gold,bold:true}
        ];

        cx=8;
        cells.forEach((cell,ci)=>{
          const col=cols[ci];
          doc.setTextColor(...cell.color);
          doc.setFont('helvetica',cell.bold?'bold':'normal');
          doc.setFontSize(cell.bold?7:6.5);
          let txt=cell.text;
          // Truncate long text
          if(cell.maxW&&doc.getTextWidth(txt)>cell.maxW){
            while(txt.length>1&&doc.getTextWidth(txt+'…')>cell.maxW-1)txt=txt.slice(0,-1);
            txt+='…';
          }
          // Strikethrough for no-lift
          const ty=curY+rowH/2+2;
          doc.text(txt,cx+col.w/2,ty,{align:'center'});
          if(cell.strike&&cell.text!=='—'){
            doc.setDrawColor(...cell.color);
            doc.setLineWidth(0.3);
            const tw=doc.getTextWidth(txt);
            doc.line(cx+col.w/2-tw/2,ty-1,cx+col.w/2+tw/2,ty-1);
          }
          cx+=col.w;
        });

        // Bottom separator line
        doc.setDrawColor(...C.border);
        doc.setLineWidth(0.15);
        doc.line(8,curY+rowH,PW-8,curY+rowH);

        curY+=rowH;
      });
      curY+=4; // gap between categories
    }

    // ── First page ───────────────────────────────────────
    drawPageBg();
    drawHeader();
    curY=22;

    // Render all categories
    catKeys.forEach(k=>renderCategory(k));

    // ── Best Lifter summary page ─────────────────────────
    doc.addPage();
    drawPageBg();
    doc.setFillColor(...C.header);
    doc.rect(0,0,PW,12,'F');
    doc.setTextColor(...C.white);
    doc.setFont('helvetica','bold');
    doc.setFontSize(11);
    doc.text('BEST LIFTER',PW/2,8.5,{align:'center'});
    doc.setFillColor(...C.rowAlt);
    doc.rect(0,12,PW,7,'F');
    doc.setTextColor(...C.gold);
    doc.setFontSize(8);
    doc.text('MEJORES ATLETAS POR DIVISIÓN — GL POINTS',PW/2,17,{align:'center'});

    let blY=26;
    const blEntries=Object.entries(divGL).map(([div,info])=>{
      const a=all.find(x=>x.id===info.id);
      return{div,a};
    }).filter(e=>e.a&&e.a.total>0).sort((a,b)=>a.div.localeCompare(b.div));

    if(blEntries.length){
      const blCols=[
        {header:'División',w:30},{header:'Atleta',w:50},{header:'Club',w:35},
        {header:'Cat.',w:20},{header:'SQ',w:18},{header:'BP',w:18},{header:'DL',w:18},
        {header:'Total',w:18},{header:'GL',w:18}
      ];
      let bcx=20;
      doc.setFillColor(20,38,68);
      doc.rect(20,blY,PW-40,6,'F');
      doc.setTextColor(...C.muted);
      doc.setFont('helvetica','bold');
      doc.setFontSize(7);
      blCols.forEach(col=>{doc.text(col.header,bcx+col.w/2,blY+4,{align:'center'});bcx+=col.w;});
      blY+=6;

      blEntries.forEach((e,ri)=>{
        const {div,a}=e;
        const rowH=8;
        doc.setFillColor(...(ri%2===0?C.bg:C.rowAlt));
        doc.rect(20,blY,PW-40,rowH,'F');
        // Gold star glow: draw star background
        doc.setFillColor(...C.gold);
        doc.setFontSize(10);
        bcx=20;
        const cells=[
          {text:div,color:C.gold,bold:true},
          {text:a.name,color:C.white,bold:true},
          {text:(a.club||'—').substring(0,22),color:C.muted},
          {text:a.cat,color:C.muted},
          {text:String(bestOf(a,'sq')||'—'),color:C.green},
          {text:String(bestOf(a,'bp')||'—'),color:C.green},
          {text:String(bestOf(a,'dl')||'—'),color:C.green},
          {text:String(a.total),color:C.white,bold:true},
          {text:String(a.gl),color:C.gold,bold:true}
        ];
        cells.forEach((cell,ci)=>{
          const col=blCols[ci];
          doc.setTextColor(...cell.color);
          doc.setFont('helvetica',cell.bold?'bold':'normal');
          doc.setFontSize(cell.bold?8:7);
          doc.text(cell.text,bcx+col.w/2,blY+rowH/2+2,{align:'center'});
          bcx+=col.w;
        });
        doc.setDrawColor(...C.border);
        doc.setLineWidth(0.15);
        doc.line(20,blY+rowH,PW-20,blY+rowH);
        blY+=rowH;
      });
    }else{
      doc.setTextColor(...C.muted);
      doc.setFontSize(9);
      doc.text('Sin totales registrados',PW/2,blY+16,{align:'center'});
    }

    // ── Footer on all pages ──────────────────────────────
    const totalPages=doc.internal.getNumberOfPages();
    for(let i=1;i<=totalPages;i++){
      doc.setPage(i);
      doc.setFillColor(...C.bg);
      doc.rect(0,PH-8,PW,8,'F');
      doc.setDrawColor(...C.border);
      doc.setLineWidth(0.3);
      doc.line(8,PH-8,PW-8,PH-8);
      doc.setTextColor(...C.muted);
      doc.setFont('helvetica','normal');
      doc.setFontSize(6.5);
      doc.text('FECHIPO — Federaci\u00f3n Chilena de Powerlifting',8,PH-3);
      doc.text('Documento generado autom\u00e1ticamente por YourLift',PW/2,PH-3,{align:'center'});
      doc.text('P\u00e1g. '+i+'/'+totalPages,PW-8,PH-3,{align:'right'});
    }

    // ── Save ─────────────────────────────────────────────
    const evShort=(DATA.event?.short||DATA.event?.name||'campeonato').replace(/\s+/g,'_');
    doc.save('Acta_'+evShort+'_Vuelo'+DATA.flight+'.pdf');

  }catch(err){
    console.error('PDF error',err);
    alert('Error al generar PDF: '+err.message);
  }finally{
    if(btn){btn.disabled=false;btn.textContent='\uD83D\uDCCB Generar Acta PDF';}
  }
}

function exportJSON(){const r=rankings();const blob=new Blob([JSON.stringify(r.map((a,i)=>({rank:i+1,nombre:a.name,rut:a.rut,sexo:a.sex,division:a.div,categoria:a.cat,bw:a.bw,club:a.club,sq:bestOf(a,'sq'),bp:bestOf(a,'bp'),dl:bestOf(a,'dl'),total:a.total,gl:a.gl})),null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);const l=document.createElement('a');l.href=u;l.download='resultados.json';l.click()}

function txLookupFull(a){
  if(!a||!DB_FULL?.length)return null;
  const r=(a.rut||'').replace(/[.\s]/g,'');
  if(r)return DB_FULL.find(x=>(x.rut||'').replace(/[.\s]/g,'')===r)||null;
  const nrm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const n=nrm(a.name);
  return DB_FULL.find(x=>nrm(x.nombre)===n)||null;
}
function txAge(dob){
  if(!dob)return null;
  let y,m,d;
  if(/^\d{4}-\d{2}-\d{2}/.test(dob)){[y,m,d]=dob.slice(0,10).split('-').map(Number)}
  else if(/^\d{2}\/\d{2}\/\d{4}/.test(dob)){const p=dob.split('/');d=+p[0];m=+p[1];y=+p[2]}
  else return null;
  const now=new Date();let age=now.getFullYear()-y;
  if(now.getMonth()+1<m||(now.getMonth()+1===m&&now.getDate()<d))age--;
  return age>0&&age<100?age:null;
}
function txYearsCompeting(full){
  if(!full?.competencias?.length)return null;
  const years=full.competencias.map(c=>{
    const f=c.fecha||c.evento||'';
    const m=f.match(/20\d{2}/);return m?+m[0]:null;
  }).filter(Boolean);
  if(!years.length&&full.debut){const m=(full.debut+'').match(/20\d{2}/);if(m)years.push(+m[0])}
  if(!years.length)return null;
  const min=Math.min(...years);const cur=new Date().getFullYear();
  return Math.max(1,cur-min+1);
}
function txPB(full,lift){
  if(!full?.competencias?.length)return null;
  const key=lift==='sq'?'sq':lift==='bp'?'bp':lift==='dl'?'dl':'total';
  let best=0;
  full.competencias.forEach(c=>{const v=+(c.resultado?.[key]||0);if(v>best)best=v});
  return best||null;
}
function txDivShort(div){return(div||'').replace('Sub Junior','SJR').replace('Sub-Junior','SJR').replace('Subjunior','SJR').replace('Junior','JR').replace('Open','OPN').replace('Master I','M1').replace('Master II','M2').replace('Master III','M3').replace('Master IV','M4')}
function txCatNum(cat){const m=(cat||'').match(/([+\-]?\d+\.?\d*)/);return m?m[1]:''}

function renderTxWidget(){

  if(TX_MODE==='lights'){c.innerHTML=renderTxLights();return true}
  // Boot gate: el resto de widgets necesitan que llegue el snapshot de Firestore.

  if(!DATA.athletes||DATA.athletes.length===0){c.innerHTML='';return true}

  if(TX_MODE==='ceremony'){renderTxCeremony(c);return true}

  const cur=liftQueue()[0];

//   1) Detecta nuevo levantador → PROFILE fullscreen (profileMs)
//   2) → SCOREBOARD bottom-left + TIMER top-right (scoreboardMs)
//      • SLAM top-left por slamMs cuando llega resultado (no cambia de estado)
//   3) → IDLE (transparente) hasta el próximo levantador
//
// 🛠 PARA MODIFICAR LOS TIEMPOS, edita la línea de abajo (en milisegundos):
//    profileMs:     duración del perfil fullscreen
//    scoreboardMs:  duración del scoreboard bottom-left ← acá lo subís
//    slamMs:        duración del flash GOOD/NO LIFT en la esquina
const TX_CEREMONY={profileMs:5000,scoreboardMs:30000,slamMs:2000,recordMs:7000};

let _txCerStateAt=0;
let _txCerLastLifter=null;

function _txCerStartRecordListener(){
  if(_txCerRecordUnsub||!fbReady||!window._fb)return;
  try{
    _txCerRecordUnsub=window._fb.onSnapshot(window._fb.doc(fbDB,'livecast_record','current'),(snap)=>{
      if(!snap.exists())return;
      const d=snap.data();if(!d||!d.ts)return;
      if(d.ts===_txCerRecordSeenTs)return;
      _txCerRecordSeenTs=d.ts;
      _txCerRecordUntil=Date.now()+TX_CEREMONY.recordMs;
      _txCerRecordData=d;
      _txCerLastSig=null;
      if(typeof renderTxWidget==='function')renderTxWidget();

  const tm=document.getElementById('cerTimer');

  tm.textContent=String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0');

function renderTxCeremony(container){
  const c=container||document.getElementById('txWidget');
  if(!c)return;
  _txCerStartRecordListener();
  const cur=liftQueue()[0];

  // ── Detectar nuevo levantador → PROFILE ───────────────────
  if(cur && cur.id!==_txCerLastLifter){
    _txCerLastLifter=cur.id;
    _txCerSetState('profile');
    setTimeout(()=>{if(typeof renderTxWidget==='function')renderTxWidget()},TX_CEREMONY.profileMs+200);
  }

  // ── Detectar resultado nuevo (transición null → g/n) → SLAM corner ─
  if(_txCerSeenResults===null){
    _txCerSeenResults={};
    DATA.athletes.forEach(a=>LIFTS.forEach(l=>(a.att&&a.att[l]||[]).forEach((att,i)=>{_txCerSeenResults[a.id+'-'+l+'-'+i]=att.r||null;})));
  } else {
    DATA.athletes.forEach(a=>LIFTS.forEach(l=>(a.att&&a.att[l]||[]).forEach((att,i)=>{
      const k=a.id+'-'+l+'-'+i;
      const prev=_txCerSeenResults[k];
      const now=att.r||null;
      if((prev==null)&&(now==='g'||now==='n')){
        _txCerSlamUntil=Date.now()+TX_CEREMONY.slamMs;
        _txCerSlamType=now;
        setTimeout(()=>{if(typeof renderTxWidget==='function')renderTxWidget()},TX_CEREMONY.slamMs+100);
      }
      _txCerSeenResults[k]=now;
    })));
  }

  // ── Transiciones por tiempo ───────────────────────────────
  const elapsed=Date.now()-_txCerStateAt;
  if(_txCerState==='profile'&&elapsed>TX_CEREMONY.profileMs){
    _txCerSetState('scoreboard');
    setTimeout(()=>{if(typeof renderTxWidget==='function')renderTxWidget()},TX_CEREMONY.scoreboardMs+200);
  } else if(_txCerState==='scoreboard'&&elapsed>TX_CEREMONY.scoreboardMs){
    _txCerSetState('idle');
  }

  // ── Signature para evitar re-render por timer (anti-flicker) ─
  // El timer se actualiza in-place via #cerTimer, NO disparar re-render por DATA.timer.
  const slamActive=Date.now()<_txCerSlamUntil;
  const recordActive=Date.now()<_txCerRecordUntil&&_txCerRecordData;
  const sig=_txCerState+'|'+(cur?cur.id+'|'+cur.cat+'|'+(cur.att?.[DATA.lift]||[]).map(a=>a.w+'-'+(a.r||'')).join(','):'')
    +'|'+DATA.lift+'|'+DATA.round+'|'+DATA.flight
    +'|'+(slamActive?_txCerSlamType+'-'+_txCerSlamUntil:'_')
    +'|'+(recordActive?'rec-'+_txCerRecordUntil:'_');
  if(sig===_txCerLastSig){
    _txCerUpdateTimer(); // solo actualizar el timer si no cambió nada estructural
    return;
  }
  _txCerLastSig=sig;

  // ── Build HTML según estado ───────────────────────────────
  let html='';
  if(_txCerState==='profile'&&cur){
    html+='<div style="position:fixed;inset:0">'+renderTxProfile(cur)+'</div>';
  } else if(_txCerState==='scoreboard'&&cur){
    html+=_renderTxCerScoreboardBL(cur);
    html+=_renderTxCerTimerCorner();
  }
  // SLAM top-left (overlay encima de todo)
  if(slamActive&&_txCerSlamType){
    html+=_renderTxCerSlamCorner(_txCerSlamType);
  }
  // RECORD NACIONAL badge — top-left, gira mientras dura
  if(recordActive){
    html+=_renderTxCerRecordBadge(_txCerRecordData);
  }
  c.innerHTML=html;
  _txCerUpdateTimer();
}

// ─── DIRECTOR direct OBS WS (widget independiente) ─────────────
// Cuando el widget se abre con ?tx=director&obsWs=localhost:4455&obsPwd=secret,
// se conecta SOLO a OBS WebSocket (no necesita panel admin ni Firestore para
// el director state). Stream Deck → OBS → Widget directo.
let _widgetObsWs=null;
function _widgetStartDirectObsListener(){
  if(_widgetObsWs)return;
  if(TX_MODE!=='director')return;
  if(!window.OBSWebSocket)return;
  const obsWsParam=TX_URL.get('obsWs');
  if(!obsWsParam)return;
  const obsPwd=TX_URL.get('obsPwd')||'';
  const url='ws://'+obsWsParam;
  _widgetObsWs=new window.OBSWebSocket();
  _widgetObsWs.connect(url,obsPwd).then(()=>{
    console.log('[Widget] OBS WS connected directly:',url);
  }).catch(e=>{
    console.error('[Widget] OBS WS connection failed:',e);
    _widgetObsWs=null;
  });
  _widgetObsWs.on('CustomEvent',d=>{
    _widgetHandleDirectObsEvent(d);
  });
  _widgetObsWs.on('ConnectionClosed',()=>{
    _widgetObsWs=null;
    setTimeout(_widgetStartDirectObsListener,3000); // reintento auto
  });
}
function _widgetHandleDirectObsEvent(d){
  if(!d)return;
  if(!_txDirState)_txDirState={...TX_DIR_DEFAULT};
  const action=d.action;
  const mark=()=>{ _txDirLastSig=null; if(typeof renderTxWidget==='function')renderTxWidget(); };
  if(action==='toggle'&&d.component){
    const c=_txDirState[d.component]||{};
    const isOn=c.active&&(!c.until||c.until>Date.now());
    _txDirState[d.component]=Object.assign({},c,{active:!isOn,until:0});
    mark();return;
  }
  if(action==='slam'&&d.type){
    _txDirState.slam={active:true,until:Date.now()+2000,type:d.type};
    mark();return;
  }
  if(action==='hideAll'){
    ['profile','scoreboard','leaderboard','timer','slam'].forEach(k=>{
      _txDirState[k]=Object.assign({},_txDirState[k]||{},{active:false,until:0});
    });
    if(_txDirState.breakTimer)_txDirState.breakTimer={active:false,startedAt:0,durationSec:0,label:'',pausedAt:0};
    mark();return;
  }
  if(action==='showLb'&&d.cat){
    _txDirState.leaderboard={active:true,until:0,cat:d.cat};
    mark();return;
  }
  if(action==='breakStart'){
    const m=d.minutes||10, s=d.seconds||0;
    const durationSec=m*60+s;
    if(durationSec<=0)return;
    _txDirState.breakTimer={active:true,startedAt:Date.now(),durationSec,label:d.label||'',pausedAt:0};
    mark();return;
  }
  if(action==='breakStop'){
    _txDirState.breakTimer={active:false,startedAt:0,durationSec:0,label:'',pausedAt:0};
    mark();return;
  }
  if(action==='breakAdd'&&typeof d.seconds==='number'){
    const bt=_txDirState.breakTimer;
    if(!bt||!bt.active)return;
    bt.durationSec=Math.max(1,(bt.durationSec||0)+d.seconds);
    mark();return;
  }
}

  if(_txDirUnsub)return;
  if(!fbReady||!window._fb){
    if(!_txDirPoll)_txDirPoll=setInterval(()=>{if(fbReady&&window._fb){clearInterval(_txDirPoll);_txDirPoll=null;_txStartDirectorListener()}},300);
    return;
  }
  try{
    _txDirUnsub=window._fb.onSnapshot(window._fb.doc(fbDB,'livecast_director','current'),(snap)=>{
      if(snap.exists()){
        const d=snap.data();
        _txDirState=Object.assign({},TX_DIR_DEFAULT,d.show||{});
      } else {
        _txDirState={...TX_DIR_DEFAULT};
      }
      _txDirLastSig=null;

    });
  }catch(e){console.warn('[TX] director listen',e)}
}
function _txDirActive(comp){
  const c=_txDirState&&_txDirState[comp];
  if(!c||!c.active)return false;
  if(c.until>0&&Date.now()>=c.until)return false;
  return true;
}
function _txDirScheduleHide(){
  // Re-render automático cuando el componente con menor `until` expire
  if(!_txDirState)return;
  const now=Date.now();
  let next=Infinity;
  Object.values(_txDirState).forEach(c=>{
    if(c&&c.active&&c.until>0&&c.until>now&&c.until<next)next=c.until;
  });
  if(next!==Infinity){setTimeout(()=>{if(typeof renderTxWidget==='function')renderTxWidget()},next-now+50);}
}
function renderTxDirector(container){
  const c=container||document.getElementById('txWidget');
  if(!c)return;
  _txStartDirectorListener();
  _widgetStartDirectObsListener();
  if(!_txDirState){c.innerHTML='';return}
  const cur=liftQueue()[0];
  const showProf=_txDirActive('profile');
  const showSb=_txDirActive('scoreboard');
  const showLb=_txDirActive('leaderboard');
  const showTm=_txDirActive('timer');
  const showSlam=_txDirActive('slam');
  // Break timer: activo si tiene `active=true` y aún hay tiempo (o pausado)
  const bt=_txDirState.breakTimer||{};
  const showBreak=!!bt.active&&bt.startedAt>0&&bt.durationSec>0;
  // Signature p/ evitar flicker por timer cada 1s
  const sig=[showProf,showSb,showLb,showTm,showSlam,showBreak].join('|')
    +'|'+(cur?cur.id+'|'+(cur.att?.[DATA.lift]||[]).map(a=>a.w+'-'+(a.r||'')).join(','):'')
    +'|'+DATA.lift+'|'+DATA.round+'|'+DATA.flight
    +'|'+(_txDirState.leaderboard?.cat||'')+'|'+(_txDirState.slam?.type||'')
    +'|'+(_txDirState.profile?.until||0)+'|'+(_txDirState.scoreboard?.until||0)+'|'+(_txDirState.leaderboard?.until||0)+'|'+(_txDirState.slam?.until||0)
    +'|bt-'+(bt.startedAt||0)+'-'+(bt.durationSec||0)+'-'+(bt.pausedAt||0)+'-'+(bt.label||'');
  if(sig===_txDirLastSig){
    // Updates in-place sin re-render para evitar flicker
    const tm=document.getElementById('cerTimer');
    if(tm){
      const t=Math.max(0,DATA.timer||0);
      tm.textContent=String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0');
      tm.style.color=DATA.timerOn&&t<=10?'#ef4444':DATA.timerOn&&t<=30?'#f59e0b':'#fff';
    }
    // Break timer: actualizar el conteo cada segundo sin tocar innerHTML
    const btEl=document.getElementById('dirBreakDisplay');
    if(btEl&&showBreak){
      const elapsed=bt.pausedAt?(bt.pausedAt-bt.startedAt):(Date.now()-bt.startedAt);
      const rem=Math.max(0,Math.ceil((bt.durationSec*1000-elapsed)/1000));
      const m=Math.floor(rem/60),s=rem%60;
      btEl.textContent=m+':'+(s<10?'0':'')+s;
      btEl.style.color=rem<=10?'#ef4444':rem<=30?'#f59e0b':'#fff';
      // Si terminó, forzar re-render para que se vacíe (fin de break)
      if(rem<=0){_txDirLastSig=null;renderTxDirector(c);return}
    }
    return;
  }
  _txDirLastSig=sig;
  // Stack: leaderboard tiene prioridad fullscreen, profile fullscreen, scoreboard/timer corners
  // Break timer también es fullscreen — gana sobre todo si está activo
  document.body.classList.toggle('tx-opaque', showLb||showProf||showBreak);
  let html='';
  if(showBreak){
    html+=_renderTxBreakTimer(bt);
  } else if(showLb){
    const cat=_txDirState.leaderboard.cat;
    const ref=cat?DATA.athletes.find(a=>a.cat===cat&&!a.bombed):cur;
    if(ref)html+='<div style="position:fixed;inset:0">'+renderTxLeaderboard(ref,false,{allFlights:true})+'</div>';
  } else if(showProf&&cur){
    html+='<div style="position:fixed;inset:0">'+renderTxProfile(cur)+'</div>';
  }
  if(showSb&&cur)html+=_renderTxCerScoreboardBL(cur);
  if(showTm)html+=_renderTxCerTimerCorner();
  if(showSlam)html+=_renderTxCerSlamCorner(_txDirState.slam.type||'g');
  c.innerHTML=html;
  _txDirScheduleHide();
  // Programar tick cada 1s para el break timer (re-update via signature skip)
  if(showBreak){
    setTimeout(()=>{if(typeof renderTxWidget==='function')renderTxWidget()},1000);
  }
}
function _renderTxBreakTimer(bt){
  const elapsed=bt.pausedAt?(bt.pausedAt-bt.startedAt):(Date.now()-bt.startedAt);
  const rem=Math.max(0,Math.ceil((bt.durationSec*1000-elapsed)/1000));
  const m=Math.floor(rem/60),s=rem%60;
  const txt=m+':'+(s<10?'0':'')+s;
  const color=rem<=10?'#ef4444':rem<=30?'#f59e0b':'#fff';
  const labelText=(bt.label||'DESCANSO').toUpperCase();
  const pausedBadge=bt.pausedAt?'<div style="margin-top:18px;display:inline-block;padding:6px 18px;background:rgba(245,158,11,.18);border:2px solid #f59e0b;border-radius:8px;font-family:Oswald;font-size:18px;letter-spacing:6px;color:#f59e0b">⏸ PAUSADO</div>':'';
  return '<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">'
    +'<div style="font-family:Oswald,sans-serif;font-size:clamp(28px,4vw,56px);letter-spacing:12px;color:#D4A843;margin-bottom:20px;animation:txFade .6s ease backwards">'+labelText+'</div>'

    +pausedBadge
  +'</div>';
}

// ─── SLAM (GOOD LIFT / NO LIFT flash) ──────────────────────────
let _txSlamSeen=null;          // Map<key, 'g'|'r'|null>
let _txSlamUntil=0;            // timestamp until which to show
let _txSlamType=null;          // 'g' | 'r'
let _txSlamLifterName='';
function _txSlamScan(){
  // Detecta nueva transición null → g/r en cualquier intento.
  // Primera pasada: solo poblar el set, no disparar nada.
  const isFirst=(_txSlamSeen===null);
  if(isFirst)_txSlamSeen={};
  let fired=null;
  DATA.athletes.forEach(a=>{
    LIFTS.forEach(l=>{
      (a.att&&a.att[l]||[]).forEach((att,i)=>{
        const k=a.id+'-'+l+'-'+i;
        const prev=_txSlamSeen[k];
        const now=att.r||null;
        if(!isFirst&&(prev==null||prev===undefined)&&(now==='g'||now==='r')){
          fired={type:now,name:a.name||'',lift:l,round:i};
        }
        _txSlamSeen[k]=now;
      });
    });
  });
  if(fired){
    _txSlamUntil=Date.now()+2200;
    _txSlamType=fired.type;
    _txSlamLifterName=fired.name;
    setTimeout(()=>{if(typeof renderTxWidget==='function')renderTxWidget()},2300);
  }
}
function renderTxSlam(){
  _txSlamScan();
  if(!_txSlamType||Date.now()>=_txSlamUntil){
    return '';
  }
  const isGood=_txSlamType==='g';
  const text=isGood?'GOOD LIFT':'NO LIFT';
  const color=isGood?'#22c55e':'#ef4444';
  const glow=isGood?'rgba(34,197,94,.85)':'rgba(239,68,68,.85)';
  return '<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:txSlamFlash 2.1s ease-in-out forwards">'
    +'<div style="font-family:Oswald,sans-serif;font-size:clamp(80px,14vw,200px);font-weight:900;letter-spacing:8px;color:'+color+';text-shadow:0 0 60px '+glow+',0 0 120px '+glow+',0 8px 30px rgba(0,0,0,.9);animation:txSlamIn .55s cubic-bezier(.2,.9,.2,1) backwards,txSlamOut .35s ease-in 1.75s forwards;-webkit-text-stroke:3px rgba(0,0,0,.4)">'+text+'</div>'
    +(_txSlamLifterName?'<div style="margin-top:18px;font-family:Oswald,sans-serif;font-size:clamp(18px,2vw,28px);letter-spacing:6px;color:#fff;text-shadow:0 4px 16px rgba(0,0,0,.9);animation:txFade .8s ease .35s backwards">'+_txSlamLifterName.toUpperCase()+'</div>':'')
    +'</div>';
}

function sortByCat(){DATA.athletes.sort((a,b)=>{const na=parseFloat(a.cat.replace(/[^0-9.]/g,''))||999;const nb=parseFloat(b.cat.replace(/[^0-9.]/g,''))||999;return na-nb});DATA.athletes.forEach((a,i)=>a.lot=i+1);save();R()}
function sortByFlight(){DATA.athletes.sort((a,b)=>{if(a.flight!==b.flight)return a.flight.localeCompare(b.flight);const na=parseFloat(a.cat.replace(/[^0-9.]/g,''))||999;const nb=parseFloat(b.cat.replace(/[^0-9.]/g,''))||999;return na-nb});DATA.athletes.forEach((a,i)=>a.lot=i+1);save();R()}
function generateLots(){
  const msg=DATA.lotsGenerated
    ? '⚠️ Los lotes YA fueron sorteados.\n\n¿Re-sortear y reemplazar todos los números actuales?\n\nLas ediciones manuales se perderán.'
    : '¿Generar números de lote aleatorios?';
  if(!confirm(msg))return;
  // Shuffle within each flight
  const flights=[...new Set(DATA.athletes.map(a=>a.flight))].sort();
  let lotNum=1;
  flights.forEach(fl=>{
    const group=DATA.athletes.filter(a=>a.flight===fl);
    // Fisher-Yates shuffle
    for(let i=group.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[group[i]._rnd,group[j]._rnd]=[group[j]._rnd||Math.random(),group[i]._rnd||Math.random()]}
    group.sort((a,b)=>(a._rnd||0)-(b._rnd||0));
    group.forEach(a=>{a.lot=lotNum++;delete a._rnd});
  });
  DATA.lotsGenerated=true;save();R();
}

// Re-sincroniza la nómina con el admin. Trae todos los atletas aprobados/pendientes
// desde Firestore y reconcilia: agrega nuevos, elimina los que ya no están (sin datos)
// y avisa de los borrados que tienen pesos/intentos cargados.
window.resyncFromAdmin=async function(){
  if(!fbReady||!window._fb){alert('Firebase no listo todavía. Esperá unos segundos y reintentá.');return}
  if(!DATA.event){alert('No hay competencia activa');return}
  if(!confirm('🔄 Re-sincronizar la nómina con el admin?\n\n• Trae atletas nuevos\n• Borra los que ya no están en admin (si NO tienen pesos/intentos cargados acá)\n• Te avisa de los borrados que sí tienen datos para revisar a mano\n\nLas tandas, lots y pesaje se conservan.'))return;
  const evId=Object.keys(LIVE_EVENTS).find(k=>LIVE_EVENTS[k]===DATA.event.name)||DATA.event.id||DATA.event.name;
  try{
    const q=window._fb.query(
      window._fb.collection(fbDB,'inscripciones'),
      window._fb.where('evento','==',evId),
      window._fb.where('status','in',['approved','pending'])
    );
    const snap=await window._fb.getDocs(q);
    const cronoKey='fechipo_crono_'+(DATA.event.name||'').replace(/\s+/g,'_');
    let flightMap=null;
    try{const saved=localStorage.getItem(cronoKey);if(saved){const d=JSON.parse(saved);if(d.map)flightMap=d.map}}catch(e){}
    const fbAthletes=snap.docs
      .map(d=>({...d.data(),id:d.id}))
      .sort((a,b)=>(a.timestamp?.seconds||0)-(b.timestamp?.seconds||0))
      .map((ins,j)=>_inscToAthlete(ins,j,flightMap));
    if(!fbAthletes.length){alert('No hay inscripciones aprobadas/pendientes en Firestore para este campeonato.');return}
    _mergeFirebaseAthletes(fbAthletes);
    // Forzar nuevo render para que los toasts se ordenen
    showToastLC('✓ Re-sincronización completa: '+fbAthletes.length+' atletas en Firestore');
  }catch(e){alert('Error sincronizando: '+(e.message||e));console.error(e)}
};

// Editar el lote a mano. Si el número nuevo ya lo tenía otro atleta,
// hace un swap (intercambia los lotes entre los dos).
window.setLot=function(id,val){
  const n=parseInt(val,10);
  const a=DATA.athletes.find(x=>x.id===id);if(!a)return;
  if(!Number.isFinite(n)||n<1){
    showToastLC('⚠️ Lote inválido — debe ser un número entero ≥ 1');
    R();return;
  }
  if(n===a.lot){R();return}
  const other=DATA.athletes.find(x=>x.lot===n&&x.id!==id);
  if(other){
    // Swap: el otro recibe el lote anterior
    other.lot=a.lot;
    a.lot=n;
  } else {
    a.lot=n;
  }
  save();R();
};

// ─── OBS WEBSOCKET (Stream Deck → OBS → Panel) ─────────────────
// Permite controlar el director con cualquier botón de Stream Deck que
// envíe un "Custom Event" a OBS via WebSocket. El panel escucha los
// CustomEvents y los mapea a las funciones dir* existentes.
let _obsWs=null, _obsWsConnected=false, _obsWsError='';
let _obsWsSettings=(()=>{try{return JSON.parse(localStorage.getItem('obs_ws_settings')||'')}catch(e){}return{host:'localhost',port:4455,password:'',autoConnect:false}})();
let _obsWsLog=[]; // últimos eventos recibidos para debug (max 10)
async function obsWsConnect(){
  if(!window.OBSWebSocket){_obsWsError='Librería obs-websocket-js no cargó (revisá conexión a internet)';if(DATA.phase==='director')R();return}
  if(_obsWs){try{await _obsWs.disconnect()}catch(e){}_obsWs=null}
  _obsWsError='';
  _obsWs=new window.OBSWebSocket();
  try{
    const url='ws://'+(_obsWsSettings.host||'localhost')+':'+(_obsWsSettings.port||4455);
    await _obsWs.connect(url,_obsWsSettings.password||'');
    _obsWsConnected=true;
    _obsWs.on('CustomEvent',(d)=>{
      _obsWsLog.unshift({ts:Date.now(),data:d});
      if(_obsWsLog.length>10)_obsWsLog.pop();
      handleObsCustomEvent(d);
      if(DATA.phase==='director')R();
    });
    _obsWs.on('ConnectionClosed',()=>{_obsWsConnected=false;if(DATA.phase==='director')R()});
    if(DATA.phase==='director')R();
  }catch(e){
    _obsWsError=e.message||String(e);
    _obsWs=null;_obsWsConnected=false;
    if(DATA.phase==='director')R();
  }
}
async function obsWsDisconnect(){
  if(_obsWs){try{await _obsWs.disconnect()}catch(e){}_obsWs=null}
  _obsWsConnected=false;
  if(DATA.phase==='director')R();
}
function handleObsCustomEvent(data){
  if(!data)return;
  const action=data.action||'';
  if(action==='toggle'){
    if(data.component==='leaderboard')return window.dirToggleLb();
    if(data.component==='breakTimer')return window.dirToggleBreak();
    if(data.component)return window.dirToggle(data.component);
  }
  if(action==='slam'&&data.type)return window.dirShowSlam(data.type);
  if(action==='hideAll')return window.dirHideAll();
  if(action==='breakStart')return window.dirBreakStart();
  if(action==='breakStop')return window.dirBreakHide();
  if(action==='breakAdd'&&typeof data.seconds==='number')return window.dirBreakAdd(data.seconds);
  if(action==='showLb'&&data.cat)return window.dirShowLb(data.cat,0);
}

// Atajos de teclado para Stream Deck
window._dirKeyHandler=function(e){
  if(DATA.phase!=='director')return;
  // Ignorar si hay foco en un input/textarea/select (no pisar la edición)
  const tag=(document.activeElement?.tagName||'').toUpperCase();
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
  const k=(e.key||'').toLowerCase();
  const map={p:'profile',s:'scoreboard',t:'timer'};
  if(map[k]){e.preventDefault();window.dirToggle(map[k]);return}
  if(k==='l'){e.preventDefault();window.dirToggleLb();return}
  if(k==='g'){e.preventDefault();window.dirShowSlam('g');return}
  if(k==='n'){e.preventDefault();window.dirShowSlam('n');return}
  if(k==='b'){e.preventDefault();window.dirToggleBreak();return}
  if(k==='0'||k==='escape'){e.preventDefault();window.dirHideAll();return}
};

window.dirBreakStart=async function(){

  const s=parseInt(document.getElementById('dirBreakSec')?.value||'0',10)||0;
  const label=(document.getElementById('dirBreakLabel')?.value||'').trim();
  const durationSec=m*60+s;
  if(durationSec<=0){alert('Ingresá al menos 1 segundo');return}
  if(!_dirState)_dirState={};
  _dirState.breakTimer={active:true,startedAt:Date.now(),durationSec,label,pausedAt:0};
  await _dirPush();R();
};
window.dirBreakPause=async function(){
  if(!_dirState?.breakTimer?.active)return;
  if(_dirState.breakTimer.pausedAt)return; // ya pausado
  _dirState.breakTimer.pausedAt=Date.now();
  await _dirPush();R();
};
window.dirBreakResume=async function(){
  const bt=_dirState?.breakTimer;
  if(!bt?.active||!bt.pausedAt)return;
  // Compensar el tiempo de pausa: empujar startedAt por el tiempo pausado
  bt.startedAt+=Date.now()-bt.pausedAt;
  bt.pausedAt=0;
  await _dirPush();R();
};
window.dirBreakHide=async function(){
  if(!_dirState)return;
  _dirState.breakTimer={active:false,startedAt:0,durationSec:0,label:'',pausedAt:0};

};

    h+='<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px"><input type="number" step="2.5" class="inp" value="'+(cw||'')+'" onchange="setAtt('+cur.id+',\''+DATA.lift+'\','+DATA.round+',this.value);R()" style="font-size:22px;font-weight:700;font-family:Oswald;text-align:center;letter-spacing:2px;border-color:'+LIFT_C[DATA.lift]+';padding:12px"><span class="os" style="color:var(--muted);font-size:15px">KG</span></div>';

    h+='</div>';
  }else{h+='<div class="card" style="text-align:center;padding:20px"><p class="os" style="font-size:15px;color:var(--gold);margin-bottom:10px">RONDA COMPLETADA</p><button class="btn btn-r" onclick="advanceLift()">Siguiente \u2192</button></div>'}
  // Active change timers

    });
    h+='</div>';

function subTotal(a,lift){
  const s=bestOf(a,'sq');
  if(lift==='sq')return s;
  const b=bestOf(a,'bp');
  if(lift==='bp')return s+b;
  return s+b+bestOf(a,'dl');
}
function catRankBySub(athlete){
  const sameCat=DATA.athletes.filter(a=>a.cat===athlete.cat&&a.flight===DATA.flight&&!a.bombed);
  const withSub=sameCat.map(a=>({id:a.id,sub:subTotal(a,DATA.lift)})).filter(x=>x.sub>0).sort((a,b)=>b.sub-a.sub);
  const idx=withSub.findIndex(x=>x.id===athlete.id);
  return{pos:idx>=0?idx+1:0,of:withSub.length};
}
let txView='envivo',txChroma='#000000',txScale=100;
// Widget positions/scales — survive R() re-renders
const TX_POS={
  lights:{x:null,y:null,scale:100},

};

function txScaleLightsDown(){txScaleWidget('lights',-10);}
function txScaleLightsUp(){txScaleWidget('lights',10);}
function txScaleMarcDown(){txScaleWidget('marc',-10);}
function txScaleMarcUp(){txScaleWidget('marc',10);}
function txScaleWidget(id,delta){

function initTxWidgets(){
  const ids=['txLightsWidget','txMarcWidget'];
  const keys=['lights','marc'];
  // Default positions if first time
  const defaults={
    txLightsWidget:{x:20,y:null,bottom:80},
    txMarcWidget:{x:null,right:20,y:null,bottom:20}
  };
  ids.forEach((wId,i)=>{
    const el=document.getElementById(wId);
    if(!el)return;
    const pos=TX_POS[keys[i]];
    // Set initial position if not yet set
    if(pos.x===null){
      const def=defaults[wId];
      if(def.right!=null){
        el.style.right=def.right+'px';el.style.left='auto';
        pos.x=window.innerWidth-el.offsetWidth-def.right;
      }else{el.style.left=def.x+'px';pos.x=def.x;}
      if(def.bottom!=null){
        el.style.bottom=def.bottom+'px';el.style.top='auto';
        pos.y=window.innerHeight-el.offsetHeight-def.bottom;
      }else{el.style.top=def.y+'px';pos.y=def.y;}
    }else{
      el.style.left=pos.x+'px';el.style.top=pos.y+'px';
      el.style.right='auto';el.style.bottom='auto';
    }
    el.style.transform='scale('+pos.scale/100+')';
    el.style.transformOrigin='top left';
    // Attach drag to handle
    const handle=el.querySelector('.tx-handle');
    if(!handle)return;
    handle.addEventListener('mousedown',function(e){
      if(e.target.tagName==='BUTTON')return;
      e.preventDefault();
      const startX=e.clientX-pos.x,startY=e.clientY-pos.y;
      // Normalize to top/left
      const rect=el.getBoundingClientRect();
      const ox=rect.left,oy=rect.top;
      el.style.left=ox+'px';el.style.top=oy+'px';
      el.style.right='auto';el.style.bottom='auto';
      pos.x=ox;pos.y=oy;
      const sc=pos.scale/100;
      const mx=e.clientX,my=e.clientY;
      const bx=ox,by=oy;
      function onMove(ev){
        pos.x=bx+(ev.clientX-mx);
        pos.y=by+(ev.clientY-my);
        el.style.left=pos.x+'px';el.style.top=pos.y+'px';
      }
      function onUp(){
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
        handle.style.cursor='grab';
      }
      handle.style.cursor='grabbing';
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
    // Touch support
    handle.addEventListener('touchstart',function(e){
      if(e.target.tagName==='BUTTON')return;
      e.preventDefault();
      const t=e.touches[0];
      const rect=el.getBoundingClientRect();
      el.style.left=rect.left+'px';el.style.top=rect.top+'px';
      el.style.right='auto';el.style.bottom='auto';
      pos.x=rect.left;pos.y=rect.top;
      const mx=t.clientX,my=t.clientY,bx=pos.x,by=pos.y;
      function onTMove(ev){
        const tt=ev.touches[0];
        pos.x=bx+(tt.clientX-mx);pos.y=by+(tt.clientY-my);
        el.style.left=pos.x+'px';el.style.top=pos.y+'px';
      }
      function onTEnd(){
        el.removeEventListener('touchmove',onTMove);
        el.removeEventListener('touchend',onTEnd);
      }
      el.addEventListener('touchmove',onTMove,{passive:false});
      el.addEventListener('touchend',onTEnd);
    },{passive:false});
  });
}

function forecastTotal(a){
  const s=bestOf(a,'sq'),b=bestOf(a,'bp'),d=bestOf(a,'dl');
  // For current lift, add the attempt weight if not yet judged
  let fs=s,fb=b,fd=d;
  if(!s){const best=a.att.sq.reduce((m,x)=>x.w>m?x.w:m,0);fs=best}
  if(!b){const best=a.att.bp.reduce((m,x)=>x.w>m?x.w:m,0);fb=best}
  if(!d){const best=a.att.dl.reduce((m,x)=>x.w>m?x.w:m,0);fd=best}
  return fs+fb+fd;
}

function nrm(s){return(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim()}
function findInDB(name,rut){

  const nn=nrm(name);const parts=nn.split(/\s+/);

// ── Accept ?evento=<id|name> URL param ──
// If the URL asks for a specific event and it differs from the saved session,
// force phase back to 'setup' so the user picks again (or auto-pick if match).
function applyEventURLParam(){
  try{
    const p=new URLSearchParams(location.search).get('evento');
    if(!p||!DATA.events?.length)return;
    const want=decodeURIComponent(p);
    const i=DATA.events.findIndex(e=>e.id===want||e.name===want);
    if(i<0)return;
    const wanted=DATA.events[i];
    // TX widget mode: read-only. Just set DATA.event and subscribe to livecast_sync.
    if(TX_MODE){
      DATA.event=wanted;
      // Subscribe to Firestore livecast_sync as soon as FB is ready.
      const tryStart=()=>{if(!fbReady){setTimeout(tryStart,300);return}startFBSync();R();};
      tryStart();
      return;
    }
    // If already on this event with an active session, keep it.
    if(DATA.event&&(DATA.event.id===wanted.id||DATA.event.name===wanted.name)){R();return}
    // If there is an active session for a different event, do NOT auto-wipe it.
    // Send the user to setup so they can explicitly pick and see the picker.
    if(DATA.phase!=='setup'&&DATA.athletes?.length){
      DATA.phase='setup';DATA.event=null;DATA.athletes=[];DATA.changeTimers={};
      try{localStorage.removeItem(SAVE_KEY)}catch(e){}
      R();return;
    }
    // Fresh state: pick requested event directly.
    pickEvent(i);
  }catch(e){console.warn('[LC] preselect err',e)}
}

    h+='<span style="position:absolute;bottom:2px;font-size:7px;color:var(--border);font-family:Oswald;letter-spacing:1px;opacity:.6">FOTO</span>';
    h+='</div>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+a.name+'</div>';
    if(codigo)h+='<div style="font-size:10px;color:var(--gold);font-family:Oswald;letter-spacing:.5px">'+codigo+'</div>';
    h+='<div style="font-size:11px;color:var(--muted);margin-top:2px">'+a.div+' · '+a.cat+'</div>';
    h+='<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)">'+(window.clubLogoImg?window.clubLogoImg(a.club,16,'background:rgba(10,22,40,.4);padding:1px;'):'')+'<span>'+a.club+(debut?' · Debut '+debut:'')+'</span></div>';
    h+='<span class="flight-badge" style="background:'+(FL_C[a.flight]||'#666')+';margin-top:4px;display:inline-block">Vuelo '+a.flight+'</span>';
    h+='</div></div>';
    
    // Career PR section (from DB)
    if(prSq||prBp||prDl){
      h+='<div style="margin-bottom:8px"><div style="font-size:9px;color:var(--muted);font-family:Oswald;letter-spacing:1px;margin-bottom:4px">MEJORES MARCAS (CARRERA)</div>';
      h+='<div style="display:flex;gap:6px">';
      if(prSq)h+='<div style="flex:1;text-align:center;padding:5px 4px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:6px"><div style="font-size:8px;color:#3b82f6;font-family:Oswald">SQ</div><div class="os" style="font-size:15px;font-weight:700">'+prSq+'</div></div>';
      if(prBp)h+='<div style="flex:1;text-align:center;padding:5px 4px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:6px"><div style="font-size:8px;color:#f59e0b;font-family:Oswald">BP</div><div class="os" style="font-size:15px;font-weight:700">'+prBp+'</div></div>';
      if(prDl)h+='<div style="flex:1;text-align:center;padding:5px 4px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:6px"><div style="font-size:8px;color:#ef4444;font-family:Oswald">DL</div><div class="os" style="font-size:15px;font-weight:700">'+prDl+'</div></div>';
      if(prTotal)h+='<div style="flex:1;text-align:center;padding:5px 4px;background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.2);border-radius:6px"><div style="font-size:8px;color:var(--gold);font-family:Oswald">TOTAL</div><div class="os" style="font-size:15px;font-weight:700">'+prTotal+'</div></div>';
      h+='</div></div>';
    }
    
    // Current competition lifts
    if(curSq||curBp||curDl){
      h+='<div style="margin-bottom:8px"><div style="font-size:9px;color:var(--muted);font-family:Oswald;letter-spacing:1px;margin-bottom:4px">HOY</div>';
      h+='<div style="display:flex;gap:6px">';
      if(curSq){const isPR=prSq&&curSq>=prSq;h+='<div style="flex:1;text-align:center;padding:5px 4px;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.4);border-radius:6px"><div style="font-size:8px;color:#3b82f6;font-family:Oswald">SQ'+(isPR?' ⭐':'')+'</div><div class="os" style="font-size:15px;font-weight:700">'+curSq+'</div></div>';}
      if(curBp){const isPR=prBp&&curBp>=prBp;h+='<div style="flex:1;text-align:center;padding:5px 4px;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);border-radius:6px"><div style="font-size:8px;color:#f59e0b;font-family:Oswald">BP'+(isPR?' ⭐':'')+'</div><div class="os" style="font-size:15px;font-weight:700">'+curBp+'</div></div>';}
      if(curDl){const isPR=prDl&&curDl>=prDl;h+='<div style="flex:1;text-align:center;padding:5px 4px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:6px"><div style="font-size:8px;color:#ef4444;font-family:Oswald">DL'+(isPR?' ⭐':'')+'</div><div class="os" style="font-size:15px;font-weight:700">'+curDl+'</div></div>';}
      if(curTotal)h+='<div style="flex:1;text-align:center;padding:5px 4px;background:rgba(212,168,67,.15);border:1px solid rgba(212,168,67,.4);border-radius:6px"><div style="font-size:8px;color:var(--gold);font-family:Oswald">TOTAL</div><div class="os" style="font-size:15px;font-weight:700">'+curTotal+'</div></div>';
      h+='</div></div>';
    }
    
    // Competition history from DB
    if(compCount>0){
      h+='<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px">';
      h+='<div style="font-size:9px;color:var(--muted);font-family:Oswald;letter-spacing:1px;margin-bottom:4px">HISTORIAL · '+compCount+' competencias</div>';
      const recent=comps.filter(c=>c.resultado).slice(-4).reverse();
      recent.forEach(c=>{
        const r=c.resultado||{};
        h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:10px">';
        h+='<span style="color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">'+(c.internacional?'🌎 ':'')+c.evento+'</span>';
        h+='<span class="os" style="color:var(--gold);font-weight:700;margin-left:8px;flex-shrink:0">'+(r.total?r.total+'kg':'—')+'</span>';
        h+='</div>';
      });
      if(compWithResults>4)h+='<div style="font-size:9px;color:var(--muted);text-align:center;margin-top:2px">+'+(compWithResults-4)+' más</div>';
      h+='</div>';
    }else if(!matched){
      h+='<div style="text-align:center;padding:8px;color:var(--muted);font-size:10px;font-style:italic;border-top:1px solid var(--border);margin-top:4px">Atleta nuevo — sin historial</div>';
    }
    
    h+='</div>';
  });
  h+='</div></div>';
  return h;
}
</script>
</body>
</html>
