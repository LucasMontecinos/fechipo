<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FECHIPO LiveCast</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1628;--card:#11223B;--border:#1E3A5F;--text:#D4E1F0;--muted:#7A8FA6;--accent:#C41E3A;--blue:#1E5BA8;--gold:#D4A843;--green:#22c55e;--red:#ef4444;--orange:#f59e0b}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,button{font-family:inherit;outline:none}
.os{font-family:'Oswald',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade{animation:fadeIn .3s ease}
.shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.side{background:#0d1b30;border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{padding:20px;overflow-y:auto}
.logo{font-family:'Oswald';font-size:20px;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.logo span{color:var(--accent)}
.side-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:20px 0 8px;font-family:'Oswald'}
.side-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;font-family:'DM Sans';margin-bottom:2px}
.side-btn:hover{background:rgba(196,30,58,.08);color:var(--text)}
.side-btn.active{background:var(--accent);color:#fff}
.side-btn .icon{font-size:16px;width:22px;text-align:center}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.inp{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px}
.inp:focus{border-color:var(--accent)}
.inp-sm{padding:6px 4px;font-size:12px;text-align:center;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);width:100%}
.inp-sm:focus{border-color:var(--accent)}
.inp-sm.expired{border-color:var(--red)!important;background:rgba(239,68,68,.1)!important}
.inp-sm.countdown{border-color:var(--orange)!important;background:rgba(245,158,11,.08)!important}
.btn{padding:10px 20px;border-radius:8px;border:none;font-weight:600;font-size:13px;cursor:pointer;font-family:'Oswald';letter-spacing:1px;text-transform:uppercase;transition:all .15s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-r{background:var(--accent);color:#fff}.btn-g{background:var(--green);color:#fff}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-o:hover{border-color:var(--accent);color:var(--text)}
.flight-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:'Oswald';color:#fff}
.att{text-align:center;padding:5px 3px;border-radius:5px;font-weight:700;font-family:'Oswald';font-size:12px;min-width:46px;cursor:pointer;display:inline-block}
.att-g{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.att-n{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);text-decoration:line-through}
.att-p{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.att-e{background:transparent;color:var(--muted);border:1px solid rgba(30,58,95,.3)}
.plate{display:inline-flex;align-items:center;justify-content:center;font-family:'Oswald';font-weight:700;border-radius:3px;margin:0 1px;color:#fff}
.sb-wrap{background:var(--bg);min-height:100vh}
.sb-top{display:flex;justify-content:space-between;align-items:center;padding:12px 30px;background:linear-gradient(90deg,var(--accent),#8B1525);color:#fff}
.sb-body{display:grid;grid-template-columns:1fr 380px;min-height:calc(100vh - 56px)}
@media(max-width:900px){.shell{grid-template-columns:1fr}.side{display:none}.sb-body{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="R"></div>
<script>

let DATA={phase:'setup',events:[],event:null,athletes:[],lift:'sq',round:0,flight:'A',timer:60,timerOn:false,changeTimers:{}};
const LIFTS=['sq','bp','dl'],LIFT_N={sq:'SQUAT',bp:'BENCH PRESS',dl:'DEADLIFT'},LIFT_S={sq:'SQ',bp:'BP',dl:'DL'},LIFT_C={sq:'#3b82f6',bp:'#f59e0b',dl:'#ef4444'};
const FL_C={A:'#3b82f6',B:'#f59e0b',C:'#22c55e',D:'#a855f7',E:'#ec4899',F:'#06b6d4'};
const SAVE_KEY='fechipo_lc3';
const PLATES=[25,20,15,10,5,2.5,1.25,0.5,0.25];
const PLATE_C={25:'#ef4444',20:'#3b82f6',15:'#f59e0b',10:'#22c55e',5:'#888','2.5':'#ef4444','1.25':'#f59e0b','0.5':'#7c3aed','0.25':'#ec4899'};
const BAR=20,COLLARS=5;

function calcGL(t,bw,sex){if(!t||!bw||t<=0)return 0;const s=(sex==='Hombre'||sex==='M')?'M':'F';const c=s==='M'?{a:1199.72839,b:1025.18162,c:0.00921}:{a:610.32796,b:560.22205,c:0.01289};const d=c.a-c.b*Math.exp(-c.c*bw);return d>0?Math.round(t*100/d*100)/100:0}
function bestOf(a,l){let b=0;a.att[l].forEach(x=>{if(x.r==='g'&&x.w>b)b=x.w});return b}
function totalOf(a){const s=bestOf(a,'sq'),b=bestOf(a,'bp'),d=bestOf(a,'dl');return(s&&b&&d)?s+b+d:0}
function rankings(){return DATA.athletes.map(a=>({...a,total:totalOf(a),gl:calcGL(totalOf(a),a.bw,a.sex)})).filter(a=>a.total>0).sort((a,b)=>b.gl-a.gl)}
function liftQueue(){return DATA.athletes.filter(a=>a.flight===DATA.flight&&!a.bombed).filter(a=>{const at=a.att[DATA.lift][DATA.round];return at.r===null&&at.w>0}).sort((a,b)=>{const wa=a.att[DATA.lift][DATA.round].w,wb=b.att[DATA.lift][DATA.round].w;return wa!==wb?wa-wb:a.lot-b.lot})}
function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({phase:DATA.phase,event:DATA.event,athletes:DATA.athletes,lift:DATA.lift,round:DATA.round,flight:DATA.flight,changeTimers:DATA.changeTimers}))}catch(e){}}
function load(){try{const s=localStorage.getItem(SAVE_KEY);if(s){const d=JSON.parse(s);if(d.phase&&d.phase!=='setup'){d.timerOn=false;d.timer=60;Object.assign(DATA,d);return true}}}catch(e){}return false}

function calcPlates(w){const ps=(w-BAR-COLLARS)/2;if(ps<=0)return[];let rem=ps;const r=[];for(const p of PLATES){while(rem>=p-0.001){r.push(p);rem-=p}}return r}
function renderPlates(w){
  const pl=calcPlates(w);
  if(!pl.length)return'<div style="display:flex;align-items:center;justify-content:center;gap:0"><div style="background:#777;height:14px;width:120px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:Oswald;font-size:11px;color:#fff;font-weight:700">BARRA 20kg</div></div>';
  const pH={25:80,20:72,15:64,10:54,5:46,'2.5':38,'1.25':32,'0.5':26,'0.25':22};
  const pW={25:16,20:14,15:14,10:11,5:10,'2.5':9,'1.25':8,'0.5':7,'0.25':7};
  function plateHTML(p){
    const h=pH[p]||30;const wd=pW[p]||8;const bg=PLATE_C[p]||'#888';const dk=p===5;
    return'<div style="display:flex;flex-direction:column;align-items:center;gap:1px"><div style="height:'+h+'px;width:'+wd+'px;background:'+bg+';border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:Oswald;font-weight:700;font-size:'+(p>=10?10:p>=2.5?8:7)+'px;color:'+(dk?'#000':'#fff')+';writing-mode:vertical-lr;text-orientation:mixed">'+p+'</div></div>';
  }
  const collar='<div style="height:30px;width:18px;background:var(--border);border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:Oswald;font-size:8px;color:var(--text);font-weight:700;writing-mode:vertical-lr">2.5</div>';
  const bar='<div style="height:14px;width:70px;background:#777;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:Oswald;font-size:10px;color:#fff;font-weight:700">20kg</div>';
  const rev=[...pl].reverse();
  let out='<div style="display:flex;align-items:center;justify-content:center;gap:1px">'+collar;
  rev.forEach(p=>{out+=plateHTML(p)});
  out+=bar;
  pl.forEach(p=>{out+=plateHTML(p)});
  out+=collar+'</div>';
  return out;
}

function go(p){DATA.phase=p;save();R()}
function pickEvent(i){
  const ev=DATA.events[i];
  if(ev.pin){const p=prompt('Clave para "'+( ev.short||ev.name)+'":');if(p!==ev.pin){alert('Clave incorrecta');return}}
  DATA.event=ev;
  // Load saved flight assignments from cronograma
  const cronoKey='fechipo_crono_'+(ev.name||'').replace(/\s+/g,'_');
  let flightMap=null;
  try{const saved=localStorage.getItem(cronoKey);if(saved){const d=JSON.parse(saved);if(d.map)flightMap=d.map}}catch(e){}
  
  DATA.athletes=ev.athletes.map((a,j)=>{
    const name=a.nombre||'';
    const fl=flightMap&&flightMap[name]?flightMap[name]:'A';
    return{id:j,lot:j+1,name,rut:a.rut||'',sex:a.sexo||a.sex||'',cat:a.categoria||'',div:a.division||'',club:a.club||'',uni:a.universidad||'',bw:0,flight:fl,rackSQ:'',rackBP:'',bombed:false,
    att:{sq:[{w:0,r:null},{w:0,r:null},{w:0,r:null}],bp:[{w:0,r:null},{w:0,r:null},{w:0,r:null}],dl:[{w:0,r:null},{w:0,r:null},{w:0,r:null}]}};
  });
  // Set active flight to first available
  const firstFlight=flightMap?[...new Set(Object.values(flightMap))].sort()[0]:'A';
  DATA.lift='sq';DATA.round=0;DATA.flight=firstFlight||'A';DATA.changeTimers={};go('manage');
}
function setAtt(id,l,r,val){const a=DATA.athletes.find(x=>x.id===id);if(!a)return;a.att[l][r].w=parseFloat(val)||0;const key=id+'_'+l+'_'+r;if(DATA.changeTimers[key]){delete DATA.changeTimers[key]}save()}
function setResult(id,l,r,res){
  const a=DATA.athletes.find(x=>x.id===id);if(!a)return;a.att[l][r].r=res;
  if(r<2){const key=id+'_'+l+'_'+(r+1);DATA.changeTimers[key]={remaining:60,expired:false};startCT(key)}
  if(a.att[l].every(x=>x.r==='n'))a.bombed=true;
  DATA.timer=60;DATA.timerOn=false;clearInterval(mainTI);save();R();
}
function updA(id,k,v){const a=DATA.athletes.find(x=>x.id===id);if(!a)return;if(k==='bw')a.bw=parseFloat(v)||0;else a[k]=v;save()}
function newComp(){localStorage.removeItem(SAVE_KEY);DATA.phase='setup';DATA.event=null;DATA.athletes=[];DATA.changeTimers={};R()}

const ctIntervals={};
function startCT(key){/* just mark it active, master tick handles updates */}

// Master tick: updates ALL change timers every second, no matter which tab
setInterval(()=>{
  let changed=false;
  Object.keys(DATA.changeTimers).forEach(k=>{
    const ct=DATA.changeTimers[k];if(!ct||ct.expired)return;
    ct.remaining--;
    if(ct.remaining<=0){ct.expired=true;changed=true}
    // Update manage tab element
    const el=document.getElementById('ct_'+k);
    if(el){
      if(ct.expired){el.textContent='\u23F0';el.className='inp-sm expired'}
      else{el.textContent=ct.remaining+'s';el.className='inp-sm countdown'}
    }
    // Update compete tab element
    const el2=document.getElementById('cct_'+k);
    if(el2){
      const parts=k.split('_');const aId=parseInt(parts[0]);const lift=parts[1];const rnd=parseInt(parts[2]);
      const a=DATA.athletes.find(x=>x.id===aId);const nm=a?a.name:'';
      if(ct.expired){el2.innerHTML='\u23F0 <strong>'+nm+'</strong> \u2014 '+LIFT_S[lift]+(rnd+1)+' \u2014 TIEMPO';el2.style.color='var(--red)'}
      else{el2.innerHTML='\u23F1 <strong>'+nm+'</strong> \u2014 '+LIFT_S[lift]+(rnd+1)+' \u2014 '+ct.remaining+'s para entregar intento';el2.style.color='var(--orange)'}
    }
  });
  if(changed)save();
},1000);

let mainTI=null;
function startTimer(){DATA.timerOn=true;mainTI=setInterval(()=>{DATA.timer--;const el=document.getElementById('mainTimer');if(el){const c=DATA.timer<=10?'var(--red)':DATA.timer<=30?'var(--orange)':'var(--green)';el.style.color=c;el.textContent=Math.floor(DATA.timer/60)+':'+String(DATA.timer%60).padStart(2,'0');el.style.animation=DATA.timer<=10?'pulse 1s infinite':'none'}if(DATA.timer<=0){DATA.timerOn=false;clearInterval(mainTI)}},1000)}
function pauseTimer(){DATA.timerOn=false;clearInterval(mainTI)}
function resetTimer(){DATA.timer=60;DATA.timerOn=false;clearInterval(mainTI);const el=document.getElementById('mainTimer');if(el){el.style.color='var(--green)';el.textContent='1:00';el.style.animation='none'}}
function advanceLift(){const li=LIFTS.indexOf(DATA.lift);if(DATA.round<2)DATA.round++;else if(li<2){DATA.lift=LIFTS[li+1];DATA.round=0}else go('results');save();R()}
function editAtt(id,l,r){const a=DATA.athletes.find(x=>x.id===id);if(!a)return;const v=prompt(a.name+' \u2014 '+LIFT_S[l]+' Int '+(r+1)+'\nPeso actual: '+(a.att[l][r].w||'\u2014')+'\nNuevo peso (kg):',a.att[l][r].w||'');if(v!==null){a.att[l][r].w=parseFloat(v)||0;save();R()}}
function exportJSON(){const r=rankings();const blob=new Blob([JSON.stringify(r.map((a,i)=>({rank:i+1,nombre:a.name,rut:a.rut,sexo:a.sex,division:a.div,categoria:a.cat,bw:a.bw,club:a.club,sq:bestOf(a,'sq'),bp:bestOf(a,'bp'),dl:bestOf(a,'dl'),total:a.total,gl:a.gl})),null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);const l=document.createElement('a');l.href=u;l.download='resultados.json';l.click()}

function R(){const el=document.getElementById('R');if(DATA.phase==='scoreboard'){el.innerHTML=renderSB();return}if(DATA.phase==='setup'){el.innerHTML=renderSetup();return}el.innerHTML=renderShell()}

function renderSetup(){
  let h='<div style="max-width:700px;margin:60px auto;padding:0 20px" class="fade"><div style="text-align:center;margin-bottom:40px"><div class="os" style="font-size:clamp(30px,6vw,48px);font-weight:700;letter-spacing:3px"><span style="color:var(--accent)">LIVE</span>CAST</div><p style="color:var(--muted);font-size:14px;margin-top:6px">Sistema de Gesti\u00f3n de Competencia</p><div style="width:60px;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold));margin:12px auto;border-radius:2px"></div><a href="index.html" style="display:inline-block;margin-top:10px;color:var(--muted);font-size:12px;text-decoration:none;padding:6px 16px;border:1px solid var(--border);border-radius:6px;transition:all .15s" onmouseenter="this.style.borderColor=\'var(--accent)\';this.style.color=\'var(--text)\'" onmouseleave="this.style.borderColor=\'var(--border)\';this.style.color=\'var(--muted)\'">← Volver a YourLift</a></div>';
  DATA.events.forEach((ev,i)=>{h+='<div class="card" style="cursor:pointer;transition:all .2s" onclick="pickEvent('+i+')" onmouseenter="this.style.borderColor=\'var(--accent)\'" onmouseleave="this.style.borderColor=\'var(--border)\'"><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="os" style="font-size:18px;font-weight:700">'+ev.name+(ev.pin?' \uD83D\uDD12':'')+'</div><p style="color:var(--muted);font-size:12px;margin-top:4px">'+(ev.organizer||'')+' \u00b7 '+(ev.location||'')+'</p></div><div style="text-align:right"><div style="background:var(--accent);color:#fff;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:700;font-family:Oswald">'+ev.athletes.length+'</div><div style="font-size:10px;color:var(--muted);margin-top:2px">atletas</div></div></div></div>'});
  h+='</div>';return h;
}

function renderShell(){
  const flights=[...new Set(DATA.athletes.map(a=>a.flight))].sort();const p=DATA.phase;
  let h='<div class="shell"><div class="side"><div class="logo"><span>FECHIPO</span> LC</div><div style="font-size:11px;color:var(--muted);margin-bottom:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(DATA.event?.short||DATA.event?.name||'')+'</div>';
  h+='<div class="side-label">Gesti\u00f3n</div><button class="side-btn '+(p==='manage'?'active':'')+'" onclick="go(\'manage\')"><span class="icon">\uD83D\uDCCB</span>Atletas & Pesaje</button>';
  h+='<div class="side-label">Competencia</div><button class="side-btn '+(p==='compete'?'active':'')+'" onclick="go(\'compete\')"><span class="icon">\uD83C\uDFCB\uFE0F</span>Control en Vivo</button>';
  h+='<button class="side-btn '+(p==='scoreboard'?'active':'')+'" onclick="go(\'scoreboard\')"><span class="icon">\uD83D\uDCFA</span>Scoreboard</button>';
  h+='<button class="side-btn '+(p==='results'?'active':'')+'" onclick="go(\'results\')"><span class="icon">\uD83C\uDFC6</span>Resultados</button>';
  h+='<div class="side-label">Vuelo Activo</div><div style="display:flex;gap:4px;flex-wrap:wrap">';
  flights.forEach(f=>{const n=DATA.athletes.filter(a=>a.flight===f&&!a.bombed).length;h+='<button onclick="DATA.flight=\''+f+'\';save();R()" style="flex:1;min-width:36px;padding:6px 0;border-radius:6px;border:2px solid '+(DATA.flight===f?FL_C[f]||'var(--muted)':'var(--border)')+';background:'+(DATA.flight===f?(FL_C[f]||'#666')+'22':'transparent')+';color:'+(DATA.flight===f?FL_C[f]||'#fff':'var(--muted)')+';font-family:Oswald;font-size:12px;font-weight:700;cursor:pointer">'+f+'<span style="font-size:9px;opacity:.6;display:block">'+n+'</span></button>'});
  h+='</div><div style="margin-top:auto;padding-top:16px;border-top:1px solid var(--border)"><button class="side-btn" onclick="newComp()"><span class="icon">\u21BA</span>Nueva Competencia</button><a href="index.html" class="side-btn" style="text-decoration:none;color:var(--muted)"><span class="icon">\u2190</span>Base de Datos</a></div></div><div class="main">';
  if(p==='manage')h+=renderManage();else if(p==='compete')h+=renderCompete();else if(p==='results')h+=renderResults();
  h+='</div></div>';return h;
}

function sortByCat(){DATA.athletes.sort((a,b)=>{const na=parseFloat(a.cat.replace(/[^0-9.]/g,''))||999;const nb=parseFloat(b.cat.replace(/[^0-9.]/g,''))||999;return na-nb});DATA.athletes.forEach((a,i)=>a.lot=i+1);save();R()}
function sortByFlight(){DATA.athletes.sort((a,b)=>{if(a.flight!==b.flight)return a.flight.localeCompare(b.flight);const na=parseFloat(a.cat.replace(/[^0-9.]/g,''))||999;const nb=parseFloat(b.cat.replace(/[^0-9.]/g,''))||999;return na-nb});DATA.athletes.forEach((a,i)=>a.lot=i+1);save();R()}

function renderManage(){
  const ath=DATA.athletes;let h='<div class="fade"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px"><div><h2 class="os" style="font-size:22px;letter-spacing:1px">ATLETAS & PESAJE</h2><p style="color:var(--muted);font-size:12px">'+ath.filter(a=>a.bw>0).length+'/'+ath.length+' pesados</p></div><div style="display:flex;gap:6px"><button class="btn btn-o" onclick="sortByFlight()">Ordenar por Vuelo ↑</button><button class="btn btn-o" onclick="sortByCat()">Ordenar por Categoría ↑</button><button class="btn btn-g" onclick="go(\'compete\')">Iniciar Competencia →</button></div></div>';
  h+='<div class="card" style="padding:0;overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="border-bottom:2px solid var(--border)">';
  h+='<th class="os" style="padding:8px 4px;text-align:center;color:var(--muted);font-size:9px;width:28px">#</th><th style="padding:8px 4px;text-align:left;color:var(--muted);font-size:9px">ATLETA</th><th style="padding:8px 3px;text-align:center;color:var(--muted);font-size:9px;width:38px">VLO</th><th style="padding:8px 3px;text-align:center;color:var(--muted);font-size:9px;width:56px">BW</th><th style="padding:8px 3px;text-align:center;color:var(--muted);font-size:9px;width:48px">RkSQ</th><th style="padding:8px 3px;text-align:center;color:var(--muted);font-size:9px;width:48px">RkBP</th>';
  ['sq','bp','dl'].forEach(l=>{[1,2,3].forEach(r=>{h+='<th style="padding:8px 2px;text-align:center;color:'+LIFT_C[l]+';font-size:9px;width:54px">'+LIFT_S[l]+r+'</th>'})});
  h+='</tr></thead><tbody>';
  ath.forEach(a=>{
    h+='<tr style="border-bottom:1px solid rgba(30,58,95,.3);'+(a.bombed?'opacity:.4':'')+'">';
    h+='<td class="os" style="padding:6px 4px;text-align:center;color:var(--gold);font-weight:700">'+a.lot+'</td>';

    h+='<td style="padding:3px 2px"><input type="text" class="inp-sm" value="'+(a.rackSQ||'')+'" placeholder="\u2014" onchange="updA('+a.id+',\'rackSQ\',this.value);save()"></td>';
    h+='<td style="padding:3px 2px"><input type="text" class="inp-sm" value="'+(a.rackBP||'')+'" placeholder="\u2014" onchange="updA('+a.id+',\'rackBP\',this.value);save()"></td>';
    ['sq','bp','dl'].forEach(l=>{a.att[l].forEach((at,r)=>{
      const ctKey=a.id+'_'+l+'_'+r;const ct=DATA.changeTimers[ctKey];
      let cls='inp-sm',ph='\u2014';
      if(ct&&!ct.expired&&ct.remaining>0){cls='inp-sm countdown';ph=ct.remaining+'s'}
      else if(ct&&ct.expired&&!at.w){cls='inp-sm expired';ph='\u23F0'}
      const bc=at.r==='g'?'var(--green)':at.r==='n'?'var(--red)':at.w>0?LIFT_C[l]:'var(--border)';
      h+='<td style="padding:3px 2px"><input type="number" step="2.5" class="'+cls+'" id="ct_'+ctKey+'" value="'+(at.w||'')+'" placeholder="'+ph+'" onchange="setAtt('+a.id+',\''+l+'\','+r+',this.value)" style="border-color:'+bc+';'+(at.r==='n'?'text-decoration:line-through':'')+'"></td>';

  });

}

function renderResults(){
  const all=DATA.athletes.filter(a=>a.flight===DATA.flight).map(a=>({...a,total:totalOf(a),gl:calcGL(totalOf(a),a.bw,a.sex)}));
  const withTotal=all.filter(a=>a.total>0);

  // Group by category (sex + cat) and rank within each
  const catGroups={};
  all.forEach(a=>{const k=(a.sex||'?')+' '+(a.cat||'?');if(!catGroups[k])catGroups[k]=[];catGroups[k].push(a)});
  Object.values(catGroups).forEach(arr=>arr.sort((a,b)=>b.total-a.total));
  const catPos={};
  Object.values(catGroups).forEach(arr=>{let p=1;arr.forEach(a=>{if(a.total>0){catPos[a.id]=p;p++}})});

  // Sort display: by sex then cat weight ascending, within cat by total desc
  const sorted=[];
  const catKeys=Object.keys(catGroups).sort((a,b)=>{
    const sa=a.startsWith('Hombre')||a.startsWith('Masculino')||a.startsWith('M')?1:0;
    const sb=b.startsWith('Hombre')||b.startsWith('Masculino')||b.startsWith('M')?1:0;
    if(sa!==sb)return sa-sb;
    const na=parseFloat(a.replace(/[^0-9.]/g,''))||999;
    const nb=parseFloat(b.replace(/[^0-9.]/g,''))||999;
    return na-nb;
  });
  catKeys.forEach(k=>catGroups[k].forEach(a=>sorted.push(a)));

  // Top 3 GL by division
  const divGroups={};
  withTotal.forEach(a=>{const d=a.div||'Sin División';if(!divGroups[d])divGroups[d]=[];divGroups[d].push(a)});
  Object.values(divGroups).forEach(arr=>arr.sort((a,b)=>b.gl-a.gl));

  let h='<div class="fade"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px"><div><h2 class="os" style="font-size:24px;letter-spacing:2px">RESULTADOS <span style="background:'+FL_C[DATA.flight]+';color:#fff;padding:2px 10px;border-radius:6px;font-size:14px;vertical-align:middle">VUELO '+DATA.flight+'</span></h2><p style="color:var(--muted);font-size:12px">'+(DATA.event?.name||'')+' \u00b7 '+withTotal.length+' clasificados</p></div><button class="btn btn-g" onclick="exportJSON()">\uD83D\uDCE5 Exportar</button></div>';

  // Stats
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">';
  [[DATA.athletes.length,'Total','var(--blue)'],[withTotal.length,'Clasificados','var(--green)'],[DATA.athletes.filter(a=>a.bombed).length,'Bomb Out','var(--red)'],[withTotal[0]?.gl||'\u2014','Mejor GL','var(--gold)']].forEach(([v,l,c])=>{h+='<div class="card" style="text-align:center;padding:12px"><div class="os" style="font-size:24px;font-weight:700;color:'+c+'">'+v+'</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px">'+l+'</div></div>'});
  h+='</div>';

  // Top 3 GL by Division
  const divKeys=Object.keys(divGroups).sort();
  if(divKeys.length>0){
    h+='<div class="card" style="margin-bottom:16px"><h3 class="os" style="font-size:14px;letter-spacing:1px;margin-bottom:12px;color:var(--gold)">\uD83C\uDFC5 TOP 3 GL POINTS POR DIVISI\u00D3N</h3>';
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">';
    divKeys.forEach(d=>{
      const top3=divGroups[d].slice(0,3);
      h+='<div style="background:var(--bg);border-radius:8px;padding:12px;border:1px solid var(--border)"><div class="os" style="font-size:13px;letter-spacing:1px;color:var(--accent);margin-bottom:8px">'+d+'</div>';
      const medals=['\uD83E\uDD47','\uD83E\uDD48','\uD83E\uDD49'];
      top3.forEach((a,i)=>{
        h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;'+(i<2?'border-bottom:1px solid rgba(30,58,95,.2)':'')+'"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:14px">'+medals[i]+'</span><div><span style="font-weight:600;font-size:12px">'+a.name+'</span><span style="font-size:9px;color:var(--muted);margin-left:4px">'+a.cat+'</span></div></div><div style="text-align:right"><span class="os" style="font-size:15px;font-weight:700;color:var(--gold)">'+a.gl+'</span><span style="font-size:9px;color:var(--muted);margin-left:4px">'+a.total+'kg</span></div></div>';
      });
      h+='</div>';
    });
    h+='</div></div>';
  }

  // Results table grouped by category
  h+='<div class="card" style="padding:0;overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="border-bottom:2px solid var(--border)"><th class="os" style="padding:8px 4px;text-align:center;color:var(--muted);font-size:9px;width:28px">Pos</th><th style="padding:8px 4px;text-align:left;color:var(--muted);font-size:9px">Atleta</th><th style="padding:8px 3px;text-align:center;color:var(--muted);font-size:9px;width:44px">BW</th><th style="padding:8px 3px;text-align:center;color:var(--muted);font-size:9px">Div</th><th style="padding:8px 3px;text-align:center;color:var(--muted);font-size:9px">Cat</th>';
  ['sq','bp','dl'].forEach(l=>{[1,2,3].forEach(r=>{h+='<th style="padding:8px 2px;text-align:center;color:'+LIFT_C[l]+';font-size:9px;width:46px">'+LIFT_S[l]+r+'</th>'});h+='<th style="padding:8px 2px;text-align:center;color:'+LIFT_C[l]+';font-size:9px;width:40px;font-weight:800">Best</th>'});
  h+='<th class="os" style="padding:8px 4px;text-align:center;color:var(--text);font-size:10px;width:46px">Total</th><th class="os" style="padding:8px 4px;text-align:center;color:var(--gold);font-size:10px;width:48px">GL</th></tr></thead><tbody>';

  let prevCat='';
  sorted.forEach(a=>{
    const catKey=(a.sex||'?')+' '+(a.cat||'?');
    if(catKey!==prevCat){
      h+='<tr><td colspan="18" style="padding:8px 6px;background:rgba(196,30,58,.1);border-bottom:2px solid var(--accent);font-family:Oswald;font-size:12px;font-weight:700;letter-spacing:1px;color:var(--accent)">'+(a.sex==='Femenino'||a.sex==='Mujer'||a.sex==='F'?'\u2640':'\u2642')+' '+a.cat+'</td></tr>';
      prevCat=catKey;
    }
    const pos=catPos[a.id]||'\u2014';
    h+='<tr style="border-bottom:1px solid rgba(30,58,95,.25);'+(a.bombed?'opacity:.4':'')+'">';
    h+='<td class="os" style="padding:6px 4px;text-align:center;color:'+(typeof pos==="number"&&pos<=3?'var(--gold)':'var(--muted)')+';font-weight:700;font-size:14px">'+pos+'</td>';
    h+='<td style="padding:6px 4px"><div style="font-weight:600;font-size:12px;white-space:nowrap">'+a.name+'</div><div style="font-size:9px;color:var(--muted)">'+a.club+'</div></td>';
    h+='<td style="padding:6px 3px;text-align:center;font-size:11px">'+(a.bw||'\u2014')+'</td>';
    h+='<td style="padding:6px 3px;text-align:center;font-size:10px">'+(a.div||'\u2014')+'</td>';
    h+='<td style="padding:6px 3px;text-align:center;font-size:10px">'+(a.cat||'\u2014')+'</td>';
    ['sq','bp','dl'].forEach(l=>{
      a.att[l].forEach((at,j)=>{let st='',tx=at.w||'\u2014';if(at.r==='g')st='background:rgba(34,197,94,.12);color:var(--green);font-weight:700';else if(at.r==='n')st='background:rgba(239,68,68,.1);color:var(--red);text-decoration:line-through';else if(at.w>0)st='color:var(--text)';else st='color:var(--border)';h+='<td style="padding:4px 2px;text-align:center;'+st+';font-family:Oswald;font-size:11px">'+tx+'</td>'});
      h+='<td style="padding:4px 2px;text-align:center;font-weight:700;font-family:Oswald;color:'+LIFT_C[l]+';font-size:12px">'+(bestOf(a,l)||'\u2014')+'</td>';
    });
    h+='<td class="os" style="padding:6px 4px;text-align:center;font-weight:700;font-size:14px">'+(a.total||'\u2014')+'</td><td class="os" style="padding:6px 4px;text-align:center;font-weight:700;font-size:14px;color:var(--gold)">'+(a.gl||'\u2014')+'</td></tr>';
  });
  h+='</tbody></table></div></div>';return h;
}

function renderSB(){
  const queue=liftQueue(),cur=queue[0],nxt=queue[1],rk=rankings();
  const rack=cur?(DATA.lift==='sq'?cur.rackSQ:DATA.lift==='bp'?cur.rackBP:''):'';
  const cw=cur?cur.att[DATA.lift][DATA.round].w:0;
  let h='<div class="sb-wrap"><div class="sb-top"><div class="os" style="font-size:22px;font-weight:700;letter-spacing:3px">FECHIPO LIVECAST</div><div class="os" style="font-size:15px">'+(DATA.event?.short||'')+'</div><div style="display:flex;gap:6px;align-items:center"><span class="os" style="font-size:13px;background:'+LIFT_C[DATA.lift]+';padding:3px 14px;border-radius:5px;font-weight:700">VLO '+DATA.flight+' \u2014 '+LIFT_N[DATA.lift]+' \u2014 INT '+(DATA.round+1)+'</span><button onclick="go(\'compete\')" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:10px;font-family:Oswald">\u2699</button></div></div><div class="sb-body"><div style="display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px">';
  if(cur){
    h+='<div id="sbTimer" class="os" style="font-size:60px;font-weight:700;color:var(--green);margin-bottom:16px">'+(DATA.timerOn?Math.floor(DATA.timer/60)+':'+String(DATA.timer%60).padStart(2,'0'):'')+'</div>';
    h+='<div class="os" style="font-size:clamp(28px,5vw,48px);font-weight:700;letter-spacing:2px;text-align:center;margin-bottom:6px">'+cur.name+'</div>';
    h+='<div style="color:var(--muted);font-size:14px;margin-bottom:20px">'+cur.club+' \u00b7 '+cur.bw+'kg \u00b7 '+cur.div+' \u00b7 '+cur.cat+(rack?' \u00b7 \uD83D\uDD27 '+rack:'')+'</div>';
    h+='<div class="os" style="font-size:70px;font-weight:700;color:'+LIFT_C[DATA.lift]+';letter-spacing:4px">'+(cw||'\u2014')+' <span style="font-size:30px;color:var(--muted)">KG</span></div>';
    if(cw)h+='<div style="margin-top:24px;padding:20px 24px;background:rgba(17,34,59,.6);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center">'+renderPlates(cw)+'</div>';
    h+='<div style="display:flex;gap:14px;margin-top:24px">';
    cur.att[DATA.lift].forEach((at,j)=>{h+='<div style="text-align:center;opacity:'+(j===DATA.round?1:.5)+'"><div style="font-size:9px;color:var(--muted);margin-bottom:3px;font-family:Oswald;letter-spacing:1px">INT '+(j+1)+'</div><div class="os" style="font-size:26px;font-weight:700;color:'+(at.r==='g'?'var(--green)':at.r==='n'?'var(--red)':'var(--muted)')+';text-decoration:'+(at.r==='n'?'line-through':'none')+'">'+(at.w||'\u2014')+'</div></div>'});
    h+='</div>';
    if(nxt)h+='<div style="margin-top:30px;color:var(--muted);font-size:12px">Siguiente: <strong style="color:var(--text)">'+nxt.name+'</strong> \u2014 '+nxt.att[DATA.lift][DATA.round].w+'kg</div>';
  }else{h+='<div class="os" style="font-size:26px;color:var(--gold);letter-spacing:2px">RONDA COMPLETADA</div>'}
  h+='</div><div style="background:rgba(17,34,59,.8);border-left:1px solid var(--border);padding:16px;overflow-y:auto"><h3 class="os" style="font-size:14px;letter-spacing:2px;color:var(--gold);margin-bottom:10px;text-align:center">RANKING GL</h3>';
  rk.forEach((a,i)=>{h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-bottom:1px solid rgba(30,58,95,.3);background:'+(cur&&a.id===cur.id?LIFT_C[DATA.lift]+'15':'transparent')+';border-radius:3px"><div style="display:flex;align-items:center;gap:8px"><span class="os" style="color:'+(i<3?'var(--gold)':'var(--muted)')+';font-weight:700;font-size:16px;width:24px">'+(i+1)+'</span><div><div style="font-weight:600;font-size:13px">'+a.name+'</div><div style="font-size:10px;color:var(--muted)">SQ '+bestOf(a,'sq')+' \u00b7 BP '+bestOf(a,'bp')+' \u00b7 DL '+bestOf(a,'dl')+'</div></div></div><div style="text-align:right"><div class="os" style="font-size:18px;font-weight:700;color:var(--gold)">'+a.gl+'</div><div style="font-size:10px;color:var(--muted)">'+a.total+'kg</div></div></div>'});
  if(!rk.length)h+='<p style="color:var(--muted);font-size:11px;text-align:center;padding:20px">Sin totales</p>';
  h+='</div></div></div>';return h;
}

// INIT
// Auto-clean old localStorage keys
try{localStorage.removeItem('fechipo_lc2');localStorage.removeItem('fechipo_livecast')}catch(e){}

const loaded=load();
fetch('nominas.json').then(r=>r.json()).then(n=>{DATA.events=n.events||[];if(!loaded)R()}).catch(()=>{});
if(loaded){R()}
else if(!DATA.events.length)R();
