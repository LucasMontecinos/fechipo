<title>YourLift LiveCast</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1628;--card:#11223B;--border:#1E3A5F;--text:#D4E1F0;--muted:#7A8FA6;--accent:#C41E3A;--blue:#1E5BA8;--gold:#D4A843;--green:#22c55e;--red:#ef4444;--orange:#f59e0b}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,button{font-family:inherit;outline:none}
.os{font-family:'Oswald',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade{animation:fadeIn .3s ease}
.shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.side{background:#0d1b30;border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{padding:20px;overflow-y:auto}
.logo{font-family:'Oswald';font-size:20px;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.logo span{color:var(--accent)}
.side-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:20px 0 8px;font-family:'Oswald'}
.side-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;font-family:'DM Sans';margin-bottom:2px}
.side-btn:hover{background:rgba(196,30,58,.08);color:var(--text)}
.side-btn.active{background:var(--accent);color:#fff}
.side-btn .icon{font-size:16px;width:22px;text-align:center}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.inp{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px}
.inp:focus{border-color:var(--accent)}
.inp-sm{padding:6px 4px;font-size:12px;text-align:center;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);width:100%}
.inp-sm:focus{border-color:var(--accent)}
.inp-sm.expired{border-color:var(--red)!important;background:rgba(239,68,68,.1)!important}
.inp-sm.countdown{border-color:var(--orange)!important;background:rgba(245,158,11,.08)!important}
.btn{padding:10px 20px;border-radius:8px;border:none;font-weight:600;font-size:13px;cursor:pointer;font-family:'Oswald';letter-spacing:1px;text-transform:uppercase;transition:all .15s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-r{background:var(--accent);color:#fff}.btn-g{background:var(--green);color:#fff}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-o:hover{border-color:var(--accent);color:var(--text)}
.flight-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:'Oswald';color:#fff}
.att{text-align:center;padding:5px 3px;border-radius:5px;font-weight:700;font-family:'Oswald';font-size:12px;min-width:46px;cursor:pointer;display:inline-block}
.att-g{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.att-n{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);text-decoration:line-through}
.att-p{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.att-e{background:transparent;color:var(--muted);border:1px solid rgba(30,58,95,.3)}
.plate{display:inline-flex;align-items:center;justify-content:center;font-family:'Oswald';font-weight:700;border-radius:3px;margin:0 1px;color:#fff}
.sb-wrap{background:var(--bg);min-height:100vh}
.sb-top{display:flex;justify-content:space-between;align-items:center;padding:12px 30px;background:linear-gradient(90deg,var(--accent),#8B1525);color:#fff}
.sb-body{display:grid;grid-template-columns:1fr 380px;min-height:calc(100vh - 56px)}
@media(max-width:900px){.shell{grid-template-columns:1fr}.side{display:none}.sb-body{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="R"></div>
<script>

let DATA={phase:'setup',events:[],event:null,athletes:[],lift:'sq',round:0,flight:'A',timer:60,timerOn:false,changeTimers:{},lotsGenerated:false};

// ══════════════════════════════════════════════
// ADMIN CREDENTIALS — Editar aquí para cambiar accesos
// ══════════════════════════════════════════════
// Admin credentials managed via Firebase Auth (admin.html → Firebase Console)
// ══════════════════════════════════════════════

let isAdmin=false;
// ══════════════════════════════════════════════
// FIREBASE REAL-TIME SYNC
// ══════════════════════════════════════════════
const FB_CFG={apiKey:"AIzaSyA21IHMus2bklPLJm7ExRrVJJL9bzLhyp4",authDomain:"fechipo-db-13148.firebaseapp.com",projectId:"fechipo-db-13148",storageBucket:"fechipo-db-13148.firebasestorage.app",messagingSenderId:"551573388751",appId:"1:551573388751:web:5fcc377a8d595378ab26ba"};
let fbDB=null,fbReady=false,fbUnsub=null,_fbSyncing=false,_fbLastWrite=0,fbAuth=null;
async function initFB(){
  try{
    const{initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const fb=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const authMod=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    const app=initializeApp(FB_CFG);fbDB=fb.getFirestore(app);
    fbAuth=authMod.getAuth(app);
    window._fb=fb;window._fbAuth=authMod;fbReady=true;
    // Check if already logged in (session persists)
    authMod.onAuthStateChanged(fbAuth,(u)=>{
      if(u&&!isAdmin){isAdmin=true;console.log('[FB] Auto-logged in as',u.email);R()}
    });
    console.log('[FB] Firebase ready');
    if(DATA.event)startFBSync();
  }catch(e){console.warn('[FB] Init failed',e)}
}
function fbDocId(){
  if(!DATA.event)return null;
  return(DATA.event.name||'comp').replace(/[^a-zA-Z0-9]/g,'_').substring(0,60);
}
async function syncToFB(){
  if(!fbReady||!isAdmin||_fbSyncing)return;
  const id=fbDocId();if(!id)return;
  _fbLastWrite=Date.now();
  try{
    const ref=window._fb.doc(fbDB,'livecast_sync',id);
    await window._fb.setDoc(ref,{
      event:DATA.event,athletes:JSON.stringify(DATA.athletes),
      lift:DATA.lift,round:DATA.round,flight:DATA.flight,
      changeTimers:JSON.stringify(DATA.changeTimers),lotsGenerated:DATA.lotsGenerated||false,
      timer:DATA.timer,timerOn:DATA.timerOn,
      ts:Date.now()
    });
  }catch(e){console.warn('[FB] Sync write error',e)}
}
function startFBSync(){
  if(!fbReady)return;
  if(fbUnsub){fbUnsub();fbUnsub=null}
  const id=fbDocId();if(!id)return;
  const ref=window._fb.doc(fbDB,'livecast_sync',id);
  fbUnsub=window._fb.onSnapshot(ref,(snap)=>{
    if(!snap.exists())return;
    // Admin que acaba de escribir: ignorar eco de su propio cambio
    if(isAdmin&&Date.now()-_fbLastWrite<5000)return;
    // Si hay un input enfocado, no re-renderizar (el usuario está editando)
    const focused=document.activeElement;
    if(focused&&(focused.tagName==='INPUT'||focused.tagName==='SELECT'||focused.tagName==='TEXTAREA'))return;
    const d=snap.data();
    _fbSyncing=true;
    try{
      DATA.event=d.event||DATA.event;
      DATA.athletes=JSON.parse(d.athletes||'[]');
      DATA.lift=d.lift||DATA.lift;
      DATA.round=typeof d.round==='number'?d.round:DATA.round;
      DATA.flight=d.flight||DATA.flight;
      DATA.changeTimers=JSON.parse(d.changeTimers||'{}');
      DATA.lotsGenerated=d.lotsGenerated||false;
      if(typeof d.timer==='number'){DATA.timer=d.timer;DATA.timerOn=d.timerOn||false;if(DATA.timerOn&&!mainTI)startTimer();if(!DATA.timerOn&&mainTI){clearInterval(mainTI);mainTI=null}}
      R();
    }catch(e){console.warn('[FB] Sync read error',e)}
    _fbSyncing=false;
  });
  console.log('[FB] Listener started for',id);
}
initFB();
async function doLogin(){
  const em=(document.getElementById('adminEmail')?.value||'').trim().toLowerCase();
  const pw=document.getElementById('adminPass')?.value||'';
  if(!em||!pw){alert('Completa email y contraseña');return}
  if(!fbReady||!fbAuth){alert('Firebase no está listo, espera unos segundos');return}
  try{
    await window._fbAuth.signInWithEmailAndPassword(fbAuth,em,pw);
    isAdmin=true;R();
  }catch(e){
    console.error('[FB] Login error',e);
    let msg='Correo o clave incorrecta';
    if(e.code==='auth/too-many-requests')msg='Demasiados intentos. Espera unos minutos.';
    alert(msg);
  }
}
async function doLogout(){
  isAdmin=false;DATA.phase='results';save();
  try{if(fbAuth)await window._fbAuth.signOut(fbAuth)}catch(e){}
  R();
}
const LIFTS=['sq','bp','dl'],LIFT_N={sq:'SQUAT',bp:'BENCH PRESS',dl:'DEADLIFT'},LIFT_S={sq:'SQ',bp:'BP',dl:'DL'},LIFT_C={sq:'#3b82f6',bp:'#f59e0b',dl:'#ef4444'};
const FL_C={A:'#3b82f6',B:'#f59e0b',C:'#22c55e',D:'#a855f7',E:'#ec4899',F:'#06b6d4'};
const SAVE_KEY='fechipo_lc3';
const PLATES=[25,20,15,10,5,2.5,1.25,0.5,0.25];
const PLATE_C={25:'#ef4444',20:'#3b82f6',15:'#f59e0b',10:'#22c55e',5:'#888','2.5':'#ef4444','1.25':'#f59e0b','0.5':'#7c3aed','0.25':'#ec4899'};
const BAR=20,COLLARS=5;

function calcGL(t,bw,sex){if(!t||!bw||t<=0)return 0;const s=(sex==='Hombre'||sex==='M')?'M':'F';const c=s==='M'?{a:1199.72839,b:1025.18162,c:0.00921}:{a:610.32796,b:560.22205,c:0.01289};const d=c.a-c.b*Math.exp(-c.c*bw);return d>0?Math.round(t*100/d*100)/100:0}
function bestOf(a,l){let b=0;a.att[l].forEach(x=>{if(x.r==='g'&&x.w>b)b=x.w});return b}
function totalOf(a){const s=bestOf(a,'sq'),b=bestOf(a,'bp'),d=bestOf(a,'dl');return(s&&b&&d)?s+b+d:0}
function rankings(){return DATA.athletes.map(a=>({...a,total:totalOf(a),gl:calcGL(totalOf(a),a.bw,a.sex)})).filter(a=>a.total>0).sort((a,b)=>b.gl-a.gl)}
function liftQueue(){return DATA.athletes.filter(a=>a.flight===DATA.flight&&!a.bombed).filter(a=>{const at=a.att[DATA.lift][DATA.round];return at.r===null&&at.w>0}).sort((a,b)=>{const wa=a.att[DATA.lift][DATA.round].w,wb=b.att[DATA.lift][DATA.round].w;return wa!==wb?wa-wb:a.lot-b.lot})}
function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({phase:DATA.phase,event:DATA.event,athletes:DATA.athletes,lift:DATA.lift,round:DATA.round,flight:DATA.flight,changeTimers:DATA.changeTimers,lotsGenerated:DATA.lotsGenerated}))}catch(e){}if(!_fbSyncing)debouncedSync()}
let _syncTimer=null;
function debouncedSync(){if(_syncTimer)clearTimeout(_syncTimer);_syncTimer=setTimeout(()=>{syncToFB();_syncTimer=null},800)}
function saveNow(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({phase:DATA.phase,event:DATA.event,athletes:DATA.athletes,lift:DATA.lift,round:DATA.round,flight:DATA.flight,changeTimers:DATA.changeTimers,lotsGenerated:DATA.lotsGenerated}))}catch(e){}syncToFB()}
function load(){try{const s=localStorage.getItem(SAVE_KEY);if(s){const d=JSON.parse(s);if(d.phase&&d.phase!=='setup'){d.timerOn=false;d.timer=60;Object.assign(DATA,d);return true}}}catch(e){}return false}

function calcPlates(w){const ps=(w-BAR-COLLARS)/2;if(ps<=0)return[];let rem=ps;const r=[];for(const p of PLATES){while(rem>=p-0.001){r.push(p);rem-=p}}return r}
function renderPlates(w){
  const pl=calcPlates(w);
  if(!pl.length)return'<div style="display:flex;align-items:center;justify-content:center;gap:0"><div style="background:#777;height:14px;width:120px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:Oswald;font-size:11px;color:#fff;font-weight:700">BARRA 20kg</div></div>';
  const pH={25:80,20:72,15:64,10:54,5:46,'2.5':38,'1.25':32,'0.5':26,'0.25':22};
  const pW={25:16,20:14,15:14,10:11,5:10,'2.5':9,'1.25':8,'0.5':7,'0.25':7};
  function plateHTML(p){
    const h=pH[p]||30;const wd=pW[p]||8;const bg=PLATE_C[p]||'#888';const dk=p===5;
    return'<div style="display:flex;flex-direction:column;align-items:center;gap:1px"><div style="height:'+h+'px;width:'+wd+'px;background:'+bg+';border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:Oswald;font-weight:700;font-size:'+(p>=10?10:p>=2.5?8:7)+'px;color:'+(dk?'#000':'#fff')+';writing-mode:vertical-lr;text-orientation:mixed">'+p+'</div></div>';
  }

function _normCat(s){const m=(s||'').match(/(\d+\+?)/);return m?m[1]:s;}
function _normDiv(d){
  const v=(d||'').toLowerCase().replace(/[\s\-_]/g,'');
  if(v.startsWith('sub'))return 'Sub-Junior';
  if(v.startsWith('junior'))return 'Junior';
  if(v.startsWith('open'))return 'Open';
  if(v.includes('master4')||v.includes('masteriv'))return 'Master IV';
  if(v.includes('master3')||v.includes('masteriii'))return 'Master III';
  if(v.includes('master2')||(v.includes('masterii')&&!v.includes('iii')))return 'Master II';
  if(v.includes('master1')||(v.includes('masteri')&&!v.includes('ii')))return 'Master I';
  return d;
}
function checkRecord(athlete,lift,round){

}

function setAtt(id,l,r,val){

  if(r>0&&w>0){

function setResult(id,l,r,res){

function startJudgeListener(){
  if(!fbReady)return;
  if(judgeUnsub){judgeUnsub();judgeUnsub=null}
  // Also listen for timer-start signals from judge panel
  window._fb.onSnapshot(window._fb.doc(fbDB,'timer_control','current'),(snap)=>{
    if(!snap.exists())return;
    const d=snap.data();
    if(d.action==='start'&&d.ts&&d.ts>(_lastTimerSignal||0)){
      _lastTimerSignal=d.ts;
      if(!DATA.timerOn)startTimer();
    }
  });
  judgeUnsub=window._fb.onSnapshot(window._fb.doc(fbDB,'judge_decisions','current'),(snap)=>{
    if(!snap.exists())return;
    const d=snap.data();
    judgeLights={izq:d.izq||null,central:d.central||null,der:d.der||null};
    // Check if all 3 judges voted
    if(judgeLights.izq&&judgeLights.central&&judgeLights.der){
      // Determine result by majority
      const votes=[judgeLights.izq,judgeLights.central,judgeLights.der];
      const goods=votes.filter(v=>v==='white').length;
      const result=goods>=2?'g':'n';
      // Auto-apply result to current athlete
      const queue=liftQueue();
      if(queue.length>0){
        const cur=queue[0];
        setTimeout(()=>{
          setResult(cur.id,DATA.lift,DATA.round,result);
        },2000); // 2s delay to show lights before advancing
      }
    }
    R();
  });
}

function sortByCat(){DATA.athletes.sort((a,b)=>{const na=parseFloat(a.cat.replace(/[^0-9.]/g,''))||999;const nb=parseFloat(b.cat.replace(/[^0-9.]/g,''))||999;return na-nb});DATA.athletes.forEach((a,i)=>a.lot=i+1);save();R()}
function sortByFlight(){DATA.athletes.sort((a,b)=>{if(a.flight!==b.flight)return a.flight.localeCompare(b.flight);const na=parseFloat(a.cat.replace(/[^0-9.]/g,''))||999;const nb=parseFloat(b.cat.replace(/[^0-9.]/g,''))||999;return na-nb});DATA.athletes.forEach((a,i)=>a.lot=i+1);save();R()}
function generateLots(){
  if(DATA.lotsGenerated){alert('Los lotes ya fueron generados para esta competencia');return}
  if(!confirm('¿Generar números de lote aleatorios? Esta acción solo se puede hacer una vez.'))return;
  // Shuffle within each flight
  const flights=[...new Set(DATA.athletes.map(a=>a.flight))].sort();
  let lotNum=1;
  flights.forEach(fl=>{
    const group=DATA.athletes.filter(a=>a.flight===fl);
    // Fisher-Yates shuffle
    for(let i=group.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[group[i]._rnd,group[j]._rnd]=[group[j]._rnd||Math.random(),group[i]._rnd||Math.random()]}
    group.sort((a,b)=>(a._rnd||0)-(b._rnd||0));
    group.forEach(a=>{a.lot=lotNum++;delete a._rnd});
  });
  DATA.lotsGenerated=true;save();R();
}

  h+='</tbody></table></div></div>';return h;

function renderResults(){

  all.forEach(a=>{const k=(a.sex||'?')+' '+(a.cat||'?');if(!catGroups[k])catGroups[k]=[];catGroups[k].push(a)});
  Object.values(catGroups).forEach(arr=>arr.sort((a,b)=>b.total-a.total));

  Object.values(catGroups).forEach(arr=>{let p=1;arr.forEach(a=>{if(a.total>0){catPos[a.id]=p;p++}})});

  });
  h+='</tbody></table></div></div>';return h;

function subTotal(a,lift){
  const s=bestOf(a,'sq');
  if(lift==='sq')return s;
  const b=bestOf(a,'bp');
  if(lift==='bp')return s+b;
  return s+b+bestOf(a,'dl');
}
function catRankBySub(athlete){
  const sameCat=DATA.athletes.filter(a=>a.cat===athlete.cat&&a.flight===DATA.flight&&!a.bombed);
  const withSub=sameCat.map(a=>({id:a.id,sub:subTotal(a,DATA.lift)})).filter(x=>x.sub>0).sort((a,b)=>b.sub-a.sub);
  const idx=withSub.findIndex(x=>x.id===athlete.id);
  return{pos:idx>=0?idx+1:0,of:withSub.length};
}
let txView='envivo',txChroma='#000000',txScale=100;
function forecastTotal(a){
  const s=bestOf(a,'sq'),b=bestOf(a,'bp'),d=bestOf(a,'dl');
  // For current lift, add the attempt weight if not yet judged
  let fs=s,fb=b,fd=d;
  if(!s){const best=a.att.sq.reduce((m,x)=>x.w>m?x.w:m,0);fs=best}
  if(!b){const best=a.att.bp.reduce((m,x)=>x.w>m?x.w:m,0);fb=best}
  if(!d){const best=a.att.dl.reduce((m,x)=>x.w>m?x.w:m,0);fd=best}
  return fs+fb+fd;
}

// ── SI LO LEVANTA ──
function txSiLevanta(cur,evName){
  let h='<div style="flex:1;display:flex;align-items:center;justify-content:center">';
  if(!cur){h+='<div style="font-family:Oswald;font-size:26px;color:#d4a843">RONDA COMPLETADA</div></div>';return h}
  const cw=cur.att[DATA.lift][DATA.round].w;
  if(!cw){h+='<div style="font-family:Oswald;font-size:22px;color:rgba(160,180,210,.5)">Sin peso cargado</div></div>';return h}
  // Current rank by subtotal
  const curRk=catRankBySub(cur);
  // Simulate successful lift
  const simSub=subTotal(cur,DATA.lift)>0?subTotal(cur,DATA.lift):0;
  const simBest=bestOf(cur,DATA.lift);
  const newBest=Math.max(simBest,cw);
  let newSub;
  if(DATA.lift==='sq')newSub=newBest;
  else if(DATA.lift==='bp')newSub=bestOf(cur,'sq')+newBest;
  else newSub=bestOf(cur,'sq')+bestOf(cur,'bp')+newBest;
  // Rank with the simulated sub
  const sameCat=DATA.athletes.filter(a=>a.cat===cur.cat&&a.flight===DATA.flight&&!a.bombed);
  const simRanked=sameCat.map(a=>{
    if(a.id===cur.id)return{id:a.id,sub:newSub};
    return{id:a.id,sub:subTotal(a,DATA.lift)};
  }).filter(x=>x.sub>0).sort((a,b)=>b.sub-a.sub);
  const simPos=simRanked.findIndex(x=>x.id===cur.id)+1;
  const parts=cur.name.split(' ');
  const lastName=parts.length>2?parts.slice(-2).join(' '):parts[parts.length-1];

  h+='<div style="max-width:480px;width:90%">';
  h+='<div style="text-align:center;margin-bottom:24px"><div style="font-family:Oswald;font-size:clamp(28px,5vw,42px);font-weight:700;color:#fff;letter-spacing:3px">SI LO LEVANTA</div></div>';
  h+='<div style="background:linear-gradient(135deg,rgba(22,38,68,.96),rgba(28,44,76,.96));border-radius:12px;border:1px solid rgba(60,90,140,.3);overflow:hidden">';

  h+='<div style="padding:14px 22px;background:rgba(196,30,58,.2);border-bottom:1px solid rgba(100,140,200,.2);text-align:center"><div style="font-family:Oswald;font-size:clamp(20px,4vw,28px);font-weight:700;color:#fff;letter-spacing:1px;text-transform:uppercase">'+lastName+'</div><div style="font-size:11px;color:rgba(180,200,230,.6)">'+cur.cat+' · '+(cur.div||'')+'</div></div>';
  // Rank row
  h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:16px 28px;border-bottom:1px solid rgba(50,80,120,.3)">';
  h+='<div style="font-family:Oswald;font-size:14px;color:rgba(180,200,230,.6);letter-spacing:1px">POSICIÓN</div>';
  h+='<div style="display:flex;align-items:center;gap:14px"><span style="font-family:Oswald;font-size:32px;font-weight:700;color:rgba(200,215,240,.5)">'+(curRk.pos||'—')+'°</span><span style="font-family:Oswald;font-size:28px;color:#d4a843">▸</span><span style="font-family:Oswald;font-size:32px;font-weight:700;color:#d4a843">'+simPos+'°</span></div></div>';
  // Subtotal row
  h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:16px 28px">';
  h+='<div style="font-family:Oswald;font-size:14px;color:rgba(180,200,230,.6);letter-spacing:1px">SUBTOTAL</div>';
  h+='<div style="display:flex;align-items:center;gap:14px"><span style="font-family:Oswald;font-size:28px;font-weight:700;color:rgba(200,215,240,.5)">'+(simSub||'—')+' kg</span><span style="font-family:Oswald;font-size:28px;color:#d4a843">▸</span><span style="font-family:Oswald;font-size:28px;font-weight:700;color:#d4a843">'+newSub.toFixed(1)+' kg</span></div></div>';
  h+='</div>';
  h+=txFooter(evName)+'</div></div>';
  return h;
}

// ── PREMIACIÓN ──
function txPremiacion(evName){
  const all=DATA.athletes.filter(a=>!a.bombed).map(a=>({...a,total:totalOf(a)})).filter(a=>a.total>0);
  const groups={};
  all.forEach(a=>{const k=(a.div||'Sin Div')+' · '+a.cat;if(!groups[k])groups[k]=[];groups[k].push(a)});
  Object.values(groups).forEach(arr=>arr.sort((a,b)=>b.total-a.total));
  const keys=Object.keys(groups).sort();
  let h='<div style="flex:1;overflow-y:auto;padding:60px 30px 30px">';
  h+='<div style="text-align:center;margin-bottom:24px"><div style="font-family:Oswald;font-size:clamp(24px,4vw,36px);font-weight:700;color:#d4a843;letter-spacing:3px">🏆 PREMIACIÓN</div><div style="font-family:Oswald;font-size:13px;color:rgba(160,180,210,.5);letter-spacing:1px;margin-top:4px">'+evName+'</div></div>';
  if(!keys.length){h+='<div style="text-align:center;color:rgba(160,180,210,.5);font-size:14px;padding:40px">Sin resultados todavía</div></div>';return h}
  keys.forEach(k=>{
    const top3=groups[k].slice(0,3);
    const medals=['🥇','🥈','🥉'];
    const colors=['#d4a843','#94a3b8','#b45309'];
    h+='<div style="background:linear-gradient(135deg,rgba(20,35,62,.96),rgba(26,42,72,.96));border:1px solid rgba(60,90,140,.3);border-radius:12px;margin-bottom:16px;overflow:hidden">';
    h+='<div style="padding:10px 20px;background:rgba(196,30,58,.15);border-bottom:1px solid rgba(80,120,180,.2)"><div style="font-family:Oswald;font-size:15px;font-weight:700;color:#fff;letter-spacing:1px">'+k+'</div></div>';
    // Podium
    h+='<div style="display:flex;justify-content:center;align-items:flex-end;gap:12px;padding:24px 20px 16px">';
    const order=[1,0,2];
    const heights=[90,120,70];
    order.forEach(idx=>{
      const a=top3[idx];
      if(!a){h+='<div style="flex:1;max-width:200px"></div>';return}
      const pts2=a.name.split(' ');
      const ln=pts2.length>2?pts2.slice(-2).join(' '):pts2[pts2.length-1];
      const fn=pts2.length>2?pts2.slice(0,-2).join(' '):'';
      h+='<div style="flex:1;max-width:200px;text-align:center">';
      if(fn)h+='<div style="font-size:10px;color:rgba(180,200,230,.5);margin-bottom:2px">'+fn+'</div>';
      h+='<div style="font-family:Oswald;font-size:clamp(14px,2vw,18px);font-weight:700;color:#fff;text-transform:uppercase;margin-bottom:4px">'+ln+'</div>';
      h+='<div style="font-family:Oswald;font-size:20px;font-weight:700;color:'+colors[idx]+'">'+a.total+' kg</div>';
      h+='<div style="background:'+colors[idx]+'22;border:2px solid '+colors[idx]+';border-radius:8px 8px 0 0;height:'+heights[idx]+'px;display:flex;align-items:center;justify-content:center;margin-top:8px"><span style="font-size:32px">'+medals[idx]+'</span></div>';
      h+='</div>';
    });
    h+='</div>';
    h+=txFooter(evName)+'</div>';
  });
  h+='</div>';
  return h;
}

function nrm(s){return(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim()}
function findInDB(name,rut){
  if(rut){const rc=rut.replace(/[^0-9kK]/g,'').toUpperCase();const m=DB_FULL.find(a=>{const dr=(a.rut||'').replace(/[^0-9kK]/g,'').toUpperCase();return dr&&dr===rc});if(m)return m}
  const nn=nrm(name);const parts=nn.split(/\s+/);
  return DB_FULL.find(a=>{const dn=nrm(a.nombre);return dn===nn})||DB_FULL.find(a=>{const dn=nrm(a.nombre);return parts.length>=2&&parts.every(p=>dn.includes(p))})||null;
}

      h+='</div>';
    }else if(!matched){
      h+='<div style="text-align:center;padding:8px;color:var(--muted);font-size:10px;font-style:italic;border-top:1px solid var(--border);margin-top:4px">Atleta nuevo — sin historial</div>';
    }
    
    h+='</div>';
  });
  h+='</div></div>';
  return h;
}
</script>
</body>
</html>
