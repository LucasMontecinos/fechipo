<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FECHIPO — Cronograma</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1628;--card:#11223B;--border:#1E3A5F;--text:#D4E1F0;--muted:#7A8FA6;--accent:#C41E3A;--gold:#D4A843;--green:#22c55e;--red:#ef4444;--blue:#3b82f6}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.os{font-family:'Oswald',sans-serif}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.btn{padding:10px 20px;border-radius:8px;border:none;font-weight:600;font-size:13px;cursor:pointer;font-family:'Oswald';letter-spacing:1px;text-transform:uppercase;transition:all .15s}
.btn-r{background:var(--accent);color:#fff}.btn-g{background:var(--green);color:#fff}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-o:hover{border-color:var(--accent);color:var(--text)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .3s ease}
</style>
</head>
<body>
<div id="app" style="max-width:1100px;margin:0 auto;padding:20px">
  <div style="text-align:center;margin-bottom:30px">
    <div class="os" style="font-size:clamp(24px,5vw,36px);font-weight:700;letter-spacing:3px"><span style="color:var(--accent)">FECHIPO</span> CRONOGRAMA</div>
    <p style="color:var(--muted);font-size:13px;margin-top:4px">Distribución de Vuelos y Horarios</p>
    <div style="margin-top:8px"><a href="index.html" style="color:var(--muted);font-size:12px;text-decoration:none">← Volver a Base de Datos</a></div>
  </div>
  <div id="content"><div style="text-align:center;padding:40px;color:var(--muted)">Cargando...</div></div>
</div>
<script>
const FL_C=['#3b82f6','#f59e0b','#22c55e','#a855f7','#ec4899','#06b6d4','#ef4444','#84cc16','#f97316','#6366f1'];
const FL_L='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const MIN_FLIGHT=8, MAX_FLIGHT=14;

let NM={events:[]}, DB=[], selectedEvent=null, flights=[], startTime='09:00', liftTime=12;

// Load data
Promise.all([
  fetch('nominas.json').then(r=>r.json()).catch(()=>({events:[]})),
  fetch('data.json').then(r=>r.json()).catch(()=>[])
]).then(([n,d])=>{NM=n;DB=d;render()});

function render(){
  if(!selectedEvent){renderEventList();return}
  renderCronograma();
}

function renderEventList(){
  let h='<div class="fade">';
  h+='<h2 class="os" style="font-size:20px;letter-spacing:1px;margin-bottom:16px">Selecciona un Campeonato</h2>';
  if(!NM.events||!NM.events.length){h+='<div class="card" style="text-align:center;padding:30px;color:var(--muted)">No hay eventos con nóminas</div>';h+='</div>';document.getElementById('content').innerHTML=h;return}
  NM.events.forEach((ev,i)=>{
    h+=`<div class="card" style="cursor:pointer;transition:all .2s" onclick="selectEvent(${i})" onmouseenter="this.style.borderColor='var(--accent)'" onmouseleave="this.style.borderColor='var(--border)'">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="os" style="font-size:18px;font-weight:700">${ev.name}</div>
          <p style="color:var(--muted);font-size:12px;margin-top:4px">${ev.organizer||ev.org||''} · ${ev.location||''} · ${ev.days||ev.date||''}</p>
        </div>
        <div style="background:var(--accent);color:#fff;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:700;font-family:Oswald">${ev.athletes.length}</div>
      </div>
    </div>`;
  });
  h+='</div>';
  document.getElementById('content').innerHTML=h;
}

function selectEvent(i){
  selectedEvent=NM.events[i];
  generateFlights();
  render();
}

function catWeight(cat){
  if(!cat)return 999;
  const m=cat.match(/(\d+)/);
  return m?parseInt(m[1]):999;
}

function generateFlights(){
  const athletes=selectedEvent.athletes.map((a,i)=>({...a,idx:i}));
  
  // Separate by sex
  const women=athletes.filter(a=>(a.sexo||'').match(/fem|mujer/i));
  const men=athletes.filter(a=>!(a.sexo||'').match(/fem|mujer/i));
  
  flights=[];
  [women,men].forEach(group=>{
    if(!group.length)return;
    // Group by division+categoria
    const groups={};
    group.forEach(a=>{
      const div=a.division||'Open';
      const cat=a.categoria||'?';
      const key=div+'|'+cat;
      if(!groups[key])groups[key]={div,cat,athletes:[],catW:catWeight(cat),sex:a.sexo||''};
      groups[key].athletes.push(a);
    });
    
    // Sort by category weight ascending
    const sorted=Object.values(groups).sort((a,b)=>a.catW-b.catW);
    
    // Pack into flights
    let current=[];
    let currentGroups=[];
    
    sorted.forEach(g=>{
      // If adding this group exceeds MAX and current is valid, close current
      if(current.length+g.athletes.length>MAX_FLIGHT && current.length>=MIN_FLIGHT){
        flights.push({athletes:[...current],groups:[...currentGroups]});
        current=[];
        currentGroups=[];
      }
      // If group alone exceeds MAX, give it its own flight
      if(current.length===0 && g.athletes.length>MAX_FLIGHT){
        flights.push({athletes:[...g.athletes],groups:[{...g}]});
        return;
      }
      current.push(...g.athletes);
      currentGroups.push(g);
    });
    
    // Handle remaining
    if(current.length>0){
      if(current.length<MIN_FLIGHT && flights.length>0){
        // Try to merge with previous flight if combined ≤ MAX
        const prev=flights[flights.length-1];
        if(prev.athletes[0]?.sexo===current[0]?.sexo && prev.athletes.length+current.length<=MAX_FLIGHT+2){
          prev.athletes.push(...current);
          prev.groups.push(...currentGroups);
        }else{
          flights.push({athletes:current,groups:currentGroups});
        }
      }else{
        flights.push({athletes:current,groups:currentGroups});
      }
    }
  });
  
  // Assign letters
  flights.forEach((f,i)=>{f.letter=FL_L[i]||'?';f.color=FL_C[i%FL_C.length]});
}

function renderCronograma(){
  const ev=selectedEvent;
  const totalAthletes=ev.athletes.length;
  
  let h='<div class="fade">';
  // Header
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <div>
      <h2 class="os" style="font-size:22px;letter-spacing:1px">${ev.name}</h2>
      <p style="color:var(--muted);font-size:12px">${ev.organizer||ev.org||''} · ${ev.location||''} · ${ev.days||ev.date||''}</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn btn-o" onclick="selectedEvent=null;render()">← Volver</button>
      <button class="btn btn-g" onclick="generateFlights();render()">↺ Regenerar</button>
    </div>
  </div>`;
  
  // Config
  h+=`<div class="card" style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;padding:12px 16px">
    <div style="display:flex;align-items:center;gap:6px">
      <label style="font-size:12px;color:var(--muted)">Hora inicio:</label>
      <input type="time" value="${startTime}" onchange="startTime=this.value;render()" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-family:Oswald;font-size:14px">
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <label style="font-size:12px;color:var(--muted)">Min/atleta:</label>
      <input type="number" value="${liftTime}" min="8" max="20" onchange="liftTime=parseInt(this.value);render()" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-family:Oswald;font-size:14px;width:60px;text-align:center">
    </div>
    <div style="font-size:12px;color:var(--muted)">
      ${totalAthletes} atletas · ${flights.length} vuelos · ~${Math.round(totalAthletes*liftTime/60)}h total estimado
    </div>
  </div>`;
  
  // Stats bar
  h+=`<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">`;
  flights.forEach(f=>{
    const sex=(f.athletes[0]?.sexo||'').match(/fem|mujer/i)?'♀':'♂';
    const cats=[...new Set(f.groups.map(g=>g.cat))].join(', ');
    h+=`<div style="flex:1;min-width:80px;background:${f.color}15;border:2px solid ${f.color};border-radius:8px;padding:8px 10px;text-align:center">
      <div class="os" style="font-size:20px;font-weight:700;color:${f.color}">${f.letter}</div>
      <div style="font-size:11px;color:var(--muted)">${sex} ${f.athletes.length} atl.</div>
    </div>`;
  });
  h+=`</div>`;
  
  // Flight details
  let timeAccum=0;
  const [startH,startM]=(startTime||'09:00').split(':').map(Number);
  
  flights.forEach((f,fi)=>{
    const flightMin=f.athletes.length*liftTime;
    const totalMin=startH*60+startM+timeAccum;
    const hh=String(Math.floor(totalMin/60)%24).padStart(2,'0');
    const mm=String(totalMin%60).padStart(2,'0');
    const endMin=totalMin+flightMin;
    const ehh=String(Math.floor(endMin/60)%24).padStart(2,'0');
    const emm=String(endMin%60).padStart(2,'0');
    
    const sex=(f.athletes[0]?.sexo||'').match(/fem|mujer/i)?'♀ Femenino':'♂ Masculino';
    const divs=[...new Set(f.groups.map(g=>g.div))].join(', ');
    const cats=[...new Set(f.groups.map(g=>g.cat))].join(', ');
    
    h+=`<div class="card" style="border-left:4px solid ${f.color}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="os" style="font-size:28px;font-weight:700;color:${f.color};min-width:36px">${f.letter}</span>
          <div>
            <div class="os" style="font-size:15px;letter-spacing:1px">${sex} · ${cats}</div>
            <div style="font-size:11px;color:var(--muted)">${divs}</div>
          </div>
        </div>
        <div style="display:flex;gap:12px;align-items:center">
          <div style="text-align:center">
            <div class="os" style="font-size:18px;font-weight:700;color:var(--text)">${hh}:${mm}</div>
            <div style="font-size:9px;color:var(--muted)">INICIO</div>
          </div>
          <span style="color:var(--border)">→</span>
          <div style="text-align:center">
            <div class="os" style="font-size:18px;font-weight:700;color:var(--muted)">${ehh}:${emm}</div>
            <div style="font-size:9px;color:var(--muted)">~FIN</div>
          </div>
          <div style="background:${f.color}20;border:1px solid ${f.color};padding:4px 12px;border-radius:6px">
            <span class="os" style="font-size:16px;font-weight:700;color:${f.color}">${f.athletes.length}</span>
            <span style="font-size:10px;color:var(--muted);margin-left:2px">atl.</span>
          </div>
        </div>
      </div>
      
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="border-bottom:2px solid var(--border)">
          <th style="padding:6px 4px;text-align:center;color:var(--muted);font-size:9px;width:28px;font-family:Oswald">#</th>
          <th style="padding:6px 4px;text-align:left;color:var(--muted);font-size:9px;font-family:Oswald">ATLETA</th>
          <th style="padding:6px 4px;text-align:center;color:var(--muted);font-size:9px;font-family:Oswald">DIVISIÓN</th>
          <th style="padding:6px 4px;text-align:center;color:var(--muted);font-size:9px;font-family:Oswald">CATEGORÍA</th>
          <th style="padding:6px 4px;text-align:left;color:var(--muted);font-size:9px;font-family:Oswald">CLUB</th>
        </tr></thead>
        <tbody>`;
    
    f.athletes.forEach((a,ai)=>{
      h+=`<tr style="border-bottom:1px solid rgba(30,58,95,.25)">
        <td class="os" style="padding:5px 4px;text-align:center;color:var(--gold);font-weight:700">${ai+1}</td>
        <td style="padding:5px 4px;font-weight:600">${a.nombre||''}</td>
        <td style="padding:5px 4px;text-align:center;font-size:11px">${a.division||''}</td>
        <td style="padding:5px 4px;text-align:center;font-size:11px">${a.categoria||''}</td>
        <td style="padding:5px 4px;font-size:11px;color:var(--muted)">${a.club||''}</td>
      </tr>`;
    });
    
    h+=`</tbody></table></div>`;
    timeAccum+=flightMin+15; // 15 min break between flights
  });
  
  h+='</div>';
  document.getElementById('content').innerHTML=h;
}
</script>
</body>
</html>
