<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1628;--card:#11223B;--border:#1E3A5F;--text:#D4E1F0;--muted:#7A8FA6;--accent:#C41E3A;--gold:#D4A843;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--orange:#f59e0b}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.os{font-family:'Oswald',sans-serif}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.btn{padding:8px 16px;border-radius:8px;border:none;font-weight:600;font-size:12px;cursor:pointer;font-family:'Oswald';letter-spacing:1px;text-transform:uppercase;transition:all .15s}
.btn-r{background:var(--accent);color:#fff}.btn-g{background:var(--green);color:#fff}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-o:hover{border-color:var(--accent);color:var(--text)}
.inp-t{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-family:Oswald;font-size:14px;text-align:center}
.inp-t:focus{border-color:var(--accent)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .3s ease}
.lock{cursor:pointer;opacity:.5;transition:opacity .15s}.lock:hover{opacity:1}
.session-hdr{padding:12px 16px;border-radius:10px;font-family:Oswald;font-size:16px;font-weight:700;letter-spacing:2px;text-align:center;margin:20px 0 12px}
</style>

const FB_CFG={apiKey:"AIzaSyA21IHMus2bklPLJm7ExRrVJJL9bzLhyp4",authDomain:"fechipo-db-13148.firebaseapp.com",projectId:"fechipo-db-13148",storageBucket:"fechipo-db-13148.firebasestorage.app",messagingSenderId:"551573388751",appId:"1:551573388751:web:5fcc377a8d595378ab26ba"};
let fbDB=null,fbReady=false,fbInscripciones=[];
async function initCronoFB(){
  try{
    const{initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const fb=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const authMod=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    const app=initializeApp(FB_CFG);fbDB=fb.getFirestore(app);
    fbAuthMod=authMod;fbAuthInst=authMod.getAuth(app);
    window._fb=fb;window._fbAuth=authMod;window._fb.getDoc=fb.getDoc;window._fb.where=fb.where;window._fb.query=fb.query;
    // Auth state listener
    authMod.onAuthStateChanged(fbAuthInst,user=>{
      if(user){
        // Verify admin in Firestore
        fb.getDoc(fb.doc(fbDB,'admins',user.uid)).then(snap=>{
          fbAuthUser=snap.exists()?user:null;
          config.adminUnlocked=snap.exists();
          render();
        }).catch(()=>{fbAuthUser=user;config.adminUnlocked=true;render();});
      } else {
        fbAuthUser=null;
        config.adminUnlocked=false;
        render();
      }
    });
    // Load inscripciones once (for flight sync lookups)
    const snap=await fb.getDocs(fb.collection(fbDB,'inscripciones'));
    fbInscripciones=[];snap.forEach(d=>fbInscripciones.push({id:d.id,...d.data()}));
    fbReady=true;
    // Sync NOM_EVENTS from Firestore eventos collection
    fb.onSnapshot(fb.collection(fbDB,'eventos'),(snap)=>{
      const evs=snap.docs.map(d=>({...d.data(),id:d.id}))
        .filter(e=>e.status!=='archived'&&e.status!=='draft')
        .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
      if(evs.length){NOM_EVENTS=evs;render();}
    });
    console.log('[CronoFB] Ready,',fbInscripciones.length,'inscripciones loaded');
  }catch(e){console.warn('[CronoFB] Init failed',e)}
}
async function syncFlightsToFB(){
  if(!fbReady||!selectedEvent)return;
  const map={};
  flights.forEach(f=>{f.athletes.forEach(a=>{map[a.nombre||a.name||'']=f.letter})});
  let updated=0;
  for(const[nombre,flight] of Object.entries(map)){
    // Find matching inscripcion by name + event
    const ins=fbInscripciones.find(i=>i.nombre===nombre&&i.evento===selectedEvent.id);
    if(ins&&ins.flight!==flight){
      try{
        await window._fb.updateDoc(window._fb.doc(fbDB,'inscripciones',ins.id),{flight});
        ins.flight=flight;
        updated++;
      }catch(e){console.warn('Flight update failed for',nombre,e)}
    }
  }
  if(updated>0)console.log('[CronoFB] Updated',updated,'flight assignments');
}

function showCoachLogin(){
  const ex=document.getElementById('coachModal');if(ex)ex.remove();
  const m=document.createElement('div');m.id='coachModal';
  m.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:9999';
  m.innerHTML=`<div style="background:#0D1F38;border:2px solid var(--gold);border-radius:16px;padding:32px;width:min(380px,90vw);text-align:center">

}

async function doCoachLogin(){
  const email=(document.getElementById('coachEmail').value||'').trim().toLowerCase();
  const pass=(document.getElementById('coachPass').value||'').trim();
  const err=document.getElementById('coachErr');
  err.style.display='none';
  if(!email||!pass){err.style.display='block';err.textContent='Completa ambos campos';return;}
  if(!fbReady){err.style.display='block';err.textContent='Sin conexión a Firebase';return;}
  try{
    const id=email.replace(/[.@]/g,'_');
    const snap=await window._fb.getDoc(window._fb.doc(fbDB,'coaches',id));
    if(!snap.exists()){err.style.display='block';err.textContent='Correo no registrado como entrenador acreditado';return;}
    const data=snap.data();
    if(data.password!==pass){err.style.display='block';err.textContent='Contraseña incorrecta — usa tu RUT sin puntos ni guión';return;}
    coachUser={email:data.email,nombre:data.nombre,grado:data.grado,rut:data.rut};
    document.getElementById('coachModal')?.remove();
    if(selectedEvent)await loadAccreditations();
    render();
  }catch(e){err.style.display='block';err.textContent='Error: '+e.message;console.error(e);}
}

function doCoachLogout(){coachUser=null;render();}

// ── ACREDITACIONES ────────────────────────────────────────
async function loadAccreditations(){
  if(!fbReady||!selectedEvent)return;
  try{
    const evId=selectedEvent.id||selectedEvent.name;
    const snap=await window._fb.getDocs(
      window._fb.query(window._fb.collection(fbDB,'acreditaciones'),window._fb.where('eventoId','==',evId))
    );
    ACCRED={};
    snap.forEach(d=>{const dat=d.data();if(dat.atletaNombre)ACCRED[dat.atletaNombre]=dat;});
  }catch(e){console.warn('[Crono] Accred load error',e);}
}

async function saveAccredField(atletaNombre,field,value){
  if(!fbReady||!selectedEvent)return;
  const evId=selectedEvent.id||selectedEvent.name;
  if(!ACCRED[atletaNombre])ACCRED[atletaNombre]={atletaNombre,eventoId:evId};
  ACCRED[atletaNombre][field]=value;
  ACCRED[atletaNombre].updatedBy=coachUser?.nombre||fbAuthUser?.email||'admin';
  ACCRED[atletaNombre].updatedAt=new Date().toISOString();
  try{
    const docId=(evId+'_'+atletaNombre).replace(/[^a-zA-Z0-9_-]/g,'_').substring(0,150);
    await window._fb.setDoc(window._fb.doc(fbDB,'acreditaciones',docId),ACCRED[atletaNombre],{merge:true});
  }catch(e){console.warn('[Crono] Save accred error',e);}
}

function _canEditAccred(){return coachUser!==null||config.adminUnlocked;}

function renderAccredCell(nombre,field,borderColor,textColor){
  const val=(ACCRED[nombre]||{})[field]||'';
  const safeName=nombre.replace(/\\/g,'\\\\').replace(/'/g,'\\\'');
  if(_canEditAccred()){
    return '<input type="text" value="'+val.replace(/"/g,'&quot;')+'" placeholder="—" '
      +'style="width:100%;background:var(--bg);border:1px solid '+borderColor+';color:var(--text);'
      +'padding:4px 6px;border-radius:5px;font-size:11px;" '
      +'onchange="saveAccredField(\''+safeName+'\',\''+field+'\',this.value)">';
  }
  return val
    ?'<span style="font-size:11px;color:'+textColor+'">'+val+'</span>'
    :'<span style="font-size:11px;opacity:.3">—</span>';
}


function _cronoApplyNominas(all){
  const visible=all.filter(i=>i.status==='approved'||i.status==='pending');
  const byEvent={};
  visible.forEach(i=>{if(!byEvent[i.evento])byEvent[i.evento]=[];byEvent[i.evento].push(i)});
  const fbEvents=NOM_EVENTS.map(ev=>{
    const athletes=(byEvent[ev.id]||[])
      .sort((a,b)=>(a.timestamp?.seconds||0)-(b.timestamp?.seconds||0))
      .map(i=>({
        nombre:i.nombre,rut:i.rut||'',sexo:i.sexo||'',
        dob:i.fechaNac||'',division:i.division||'',categoria:i.categoria||'',
        modalidad:i.modalidad||'',club:i.club==='Otro'?i.clubOtro:i.club||'',
        universidad:i.universidad||'',status:i.status,id:i.id,flight:i.flight||''
      }));
    return{...ev,athletes,fromFirebase:true};
  }).filter(ev=>ev.athletes.length>0);
  // Merge with static nominas.json (Firestore wins for matching event names)
  if(fbEvents.length>0){
    const fbNames=new Set(fbEvents.map(e=>e.name));
    NM.events=[...(NM.events||[]).filter(e=>!fbNames.has(e.name)),...fbEvents];
    // If current event updated, refresh flights from new athlete list
    if(selectedEvent){
      const updated=NM.events.find(e=>e.name===selectedEvent.name);
      if(updated){
        selectedEvent=updated;
        // Reload flight assignments preserving manual overrides
        loadOrGenerateFlights();
      }
    }
    render();
  }
}

initCronoFB().then(()=>{
  if(fbReady&&window._fb){
    // Real-time listener for inscripciones
    window._fb.onSnapshot(window._fb.collection(fbDB,'inscripciones'),(snap)=>{
      const all=[];snap.forEach(d=>all.push({id:d.id,...d.data()}));
      _cronoApplyNominas(all);
    });
  }
});

Promise.all([
  fetch('nominas.json').then(r=>r.json()).catch(()=>({events:[]})),
  fetch('data.json').then(r=>r.json()).catch(()=>[])
]).then(([n,d])=>{
  NM=n;DB=d;
  render();
});

function render(){
  if(!selectedEvent){renderEventList();return}
  renderCronograma();
}

function checkAdmin(){
  if(config.adminUnlocked)return true;
  // Already logged in via Firebase?
  if(fbAuthUser){config.adminUnlocked=true;return true;}
  // Show login modal
  showLoginModal();
  return false;
}

function showLoginModal(){
  // Admin login centralized in admin.html
  if(confirm('Para acceder al modo Admin del Cronograma debes iniciar sesión en el panel de administración.\n\n¿Ir a admin.html?')){
    sessionStorage.setItem('cronograma_return','1');
    window.location.href='admin.html';
  }
}
async function doLogin(){showLoginModal();}
