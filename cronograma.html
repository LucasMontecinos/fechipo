<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FECHIPO — Cronograma</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1628;--card:#11223B;--border:#1E3A5F;--text:#D4E1F0;--muted:#7A8FA6;--accent:#C41E3A;--gold:#D4A843;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--orange:#f59e0b}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.os{font-family:'Oswald',sans-serif}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.btn{padding:8px 16px;border-radius:8px;border:none;font-weight:600;font-size:12px;cursor:pointer;font-family:'Oswald';letter-spacing:1px;text-transform:uppercase;transition:all .15s}
.btn-r{background:var(--accent);color:#fff}.btn-g{background:var(--green);color:#fff}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-o:hover{border-color:var(--accent);color:var(--text)}
.inp-t{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-family:Oswald;font-size:14px;text-align:center}
.inp-t:focus{border-color:var(--accent)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .3s ease}
.lock{cursor:pointer;opacity:.5;transition:opacity .15s}.lock:hover{opacity:1}
.session-hdr{padding:12px 16px;border-radius:10px;font-family:Oswald;font-size:16px;font-weight:700;letter-spacing:2px;text-align:center;margin:20px 0 12px}
</style>
</head>
<body>
<div id="app" style="max-width:1100px;margin:0 auto;padding:20px">
  <div style="text-align:center;margin-bottom:30px">
    <div class="os" style="font-size:clamp(24px,5vw,36px);font-weight:700;letter-spacing:3px"><span style="color:var(--accent)">FECHIPO</span> CRONOGRAMA</div>
    <p style="color:var(--muted);font-size:13px;margin-top:4px">Distribución de Vuelos y Horarios</p>
    <div style="margin-top:8px"><a href="index.html" style="color:var(--muted);font-size:12px;text-decoration:none">← Volver a YourLift</a></div>
  </div>
  <div id="content"><div style="text-align:center;padding:40px;color:var(--muted)">Cargando...</div></div>
</div>
<script>
const FL_C=['#3b82f6','#f59e0b','#22c55e','#a855f7','#ec4899','#06b6d4','#ef4444','#84cc16','#f97316','#6366f1'];
const FL_L='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const MIN_FLIGHT=8, MAX_FLIGHT=14;
const ADMIN_PIN='2026';
const LIFTS_NAMES=['SQUAT','BENCH PRESS','DEADLIFT'];

let NM={events:[]}, DB=[], selectedEvent=null, flights=[];
let config={morningStart:'09:00',afternoonStart:'14:30',minPerAthlete:3,breakBetweenLifts:10,breakMorningAfternoon:60,adminUnlocked:false};

Promise.all([
  fetch('nominas.json').then(r=>r.json()).catch(()=>({events:[]})),
  fetch('data.json').then(r=>r.json()).catch(()=>[])
]).then(([n,d])=>{NM=n;DB=d;render()});

function render(){
  if(!selectedEvent){renderEventList();return}
  renderCronograma();
}

function checkAdmin(){
  if(config.adminUnlocked)return true;
  const p=prompt('Clave de administrador:');
  if(p===ADMIN_PIN){config.adminUnlocked=true;return true}
  alert('Clave incorrecta');return false;
}

function updateConfig(key,val){
  if(!checkAdmin())return;
  config[key]=val;render();
}

function renderEventList(){
  let h='<div class="fade"><h2 class="os" style="font-size:20px;letter-spacing:1px;margin-bottom:16px">Selecciona un Campeonato</h2>';
  if(!NM.events||!NM.events.length){h+='<div class="card" style="text-align:center;padding:30px;color:var(--muted)">No hay eventos</div></div>';document.getElementById('content').innerHTML=h;return}
  NM.events.forEach((ev,i)=>{
    h+=`<div class="card" style="cursor:pointer;transition:all .2s" onclick="selectEvent(${i})" onmouseenter="this.style.borderColor='var(--accent)'" onmouseleave="this.style.borderColor='var(--border)'">
      <div style="display:flex;justify-content:space-between;align-items:center"><div>
        <div class="os" style="font-size:18px;font-weight:700">${ev.name}</div>
        <p style="color:var(--muted);font-size:12px;margin-top:4px">${ev.organizer||ev.org||''} · ${ev.location||''} · ${ev.days||ev.date||''}</p>
      </div><div style="background:var(--accent);color:#fff;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:700;font-family:Oswald">${ev.athletes.length}</div></div>
    </div>`;
  });
  h+='</div>';document.getElementById('content').innerHTML=h;
}

function selectEvent(i){selectedEvent=NM.events[i];loadOrGenerateFlights();render()}

function flightKey(){return 'fechipo_crono_'+(selectedEvent?.name||'').replace(/\s+/g,'_')}

function saveFlights(){
  // Save flight assignments as name→letter map + flight letters array
  const map={};
  flights.forEach(f=>{f.athletes.forEach(a=>{map[a.nombre||a.name||'']=f.letter})});
  const letters=flights.map(f=>f.letter);
  localStorage.setItem(flightKey(),JSON.stringify({map,letters,ts:Date.now()}));
}

function loadOrGenerateFlights(){
  const saved=localStorage.getItem(flightKey());
  if(saved){
    try{
      const d=JSON.parse(saved);
      if(d.map&&d.letters){
        // Rebuild flights from saved map
        generateFlights();// first generate to get groups structure
        const newFlights=d.letters.map((l,i)=>({letter:l,color:FL_C[i%FL_C.length],athletes:[],groups:[]}));
        const allAthletes=selectedEvent.athletes.map((a,i)=>({...a,idx:i}));
        allAthletes.forEach(a=>{
          const assignedLetter=d.map[a.nombre||''];
          const fi=newFlights.findIndex(f=>f.letter===assignedLetter);
          if(fi>=0)newFlights[fi].athletes.push(a);
          else if(newFlights.length>0)newFlights[newFlights.length-1].athletes.push(a);
        });
        // Remove empty flights
        flights=newFlights.filter(f=>f.athletes.length>0);
        flights.forEach((f,i)=>{f.color=FL_C[i%FL_C.length]});
        return;
      }
    }catch(e){}
  }
  generateFlights();
  saveFlights();
}

function moveAthlete(fIdx,aIdx,toLetter){
  if(!config.adminUnlocked)return;
  const fromF=flights[fIdx];
  const toF=flights.find(f=>f.letter===toLetter);
  if(!fromF||!toF||fromF.letter===toLetter)return;
  const athlete=fromF.athletes.splice(aIdx,1)[0];
  toF.athletes.push(athlete);
  flights=flights.filter(f=>f.athletes.length>0);
  flights.forEach((f,i)=>{f.color=FL_C[i%FL_C.length]});
  saveFlights();render();
}

function addFlight(){
  if(!config.adminUnlocked){checkAdmin();if(!config.adminUnlocked)return}
  const nextLetter=FL_L[flights.length]||'?';
  flights.push({letter:nextLetter,color:FL_C[flights.length%FL_C.length],athletes:[],groups:[]});
  saveFlights();render();
}

function resetFlights(){
  if(!config.adminUnlocked){checkAdmin();if(!config.adminUnlocked)return}
  if(!confirm('¿Regenerar vuelos? Se perderán los cambios manuales.'))return;
  localStorage.removeItem(flightKey());
  generateFlights();saveFlights();render();
}

function catWeight(cat){const m=(cat||'').match(/(\d+)/);return m?parseInt(m[1]):999}

function generateFlights(){
  const athletes=selectedEvent.athletes.map((a,i)=>({...a,idx:i}));
  const women=athletes.filter(a=>(a.sexo||'').match(/fem|mujer/i));
  const men=athletes.filter(a=>!(a.sexo||'').match(/fem|mujer/i));
  
  flights=[];
  [women,men].forEach(group=>{
    if(!group.length)return;
    const groups={};
    group.forEach(a=>{
      const div=a.division||'Open';const cat=a.categoria||'?';const key=div+'|'+cat;
      if(!groups[key])groups[key]={div,cat,athletes:[],catW:catWeight(cat),sex:a.sexo||''};
      groups[key].athletes.push(a);
    });
    const sorted=Object.values(groups).sort((a,b)=>a.catW-b.catW);
    const remFrom=gi=>sorted.slice(gi).reduce((s,x)=>s+x.athletes.length,0);
    
    let cur=[],curG=[];
    for(let gi=0;gi<sorted.length;gi++){
      const g=sorted[gi];const wouldBe=cur.length+g.athletes.length;const rem=remFrom(gi+1);
      
      if(wouldBe>MAX_FLIGHT){
        if(cur.length>=MIN_FLIGHT){
          flights.push({athletes:[...cur],groups:[...curG]});
          cur=[...g.athletes];curG=[g];
        }else{
          if(flights.length>0){
            flights[flights.length-1].athletes.push(...cur);
            flights[flights.length-1].groups.push(...curG);
          }else if(cur.length>0){
            flights.push({athletes:[...cur],groups:[...curG]});
          }
          cur=[...g.athletes];curG=[g];
        }
      }else{
        cur.push(...g.athletes);curG.push(g);
      }
      
      if(cur.length>=MIN_FLIGHT&&cur.length<=MAX_FLIGHT&&rem>=MIN_FLIGHT){
        flights.push({athletes:[...cur],groups:[...curG]});
        cur=[];curG=[];
      }
    }
    if(cur.length>0){
      if(cur.length<MIN_FLIGHT&&flights.length>0&&flights[flights.length-1].athletes[0]?.sexo===cur[0]?.sexo){
        flights[flights.length-1].athletes.push(...cur);
        flights[flights.length-1].groups.push(...curG);
      }else{
        flights.push({athletes:cur,groups:curG});
      }
    }
  });
  flights.forEach((f,i)=>{f.letter=FL_L[i]||'?';f.color=FL_C[i%FL_C.length]});
}

function renderCronograma(){
  const ev=selectedEvent;const total=ev.athletes.length;
  const nFlights=flights.length;
  
  // Split morning/afternoon: max 3 morning, rest afternoon. If 4 → 2+2
  let morningCount;
  if(nFlights<=3)morningCount=nFlights;
  else if(nFlights===4)morningCount=2;
  else morningCount=3;
  const afternoonCount=nFlights-morningCount;
  
  const morningFlights=flights.slice(0,morningCount);
  const afternoonFlights=flights.slice(morningCount);
  
  let h='<div class="fade">';
  // Header
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <div><h2 class="os" style="font-size:22px;letter-spacing:1px">${ev.name}</h2>
    <p style="color:var(--muted);font-size:12px">${ev.organizer||ev.org||''} · ${ev.location||''} · ${ev.days||ev.date||''}</p></div>
    <div style="display:flex;gap:8px"><button class="btn btn-o" onclick="selectedEvent=null;config.adminUnlocked=false;render()">← Volver</button>
    <button class="btn btn-o" onclick="resetFlights()">↺ Regenerar</button>
    <button class="btn btn-o" onclick="addFlight()">+ Vuelo</button>
    <button class="btn ${config.adminUnlocked?'btn-g':'btn-r'}" onclick="checkAdmin();render()">${config.adminUnlocked?'🔓 Admin':'🔒 Admin'}</button></div>
  </div>`;
  
  // Config (password protected)
  h+=`<div class="card" style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;padding:12px 16px">
    <div style="display:flex;align-items:center;gap:6px">
      <label style="font-size:11px;color:var(--muted)">🌅 Mañana:</label>
      <input type="time" class="inp-t" value="${config.morningStart}" onchange="updateConfig('morningStart',this.value)" ${config.adminUnlocked?'':'disabled'} style="width:90px;${config.adminUnlocked?'':'opacity:.5'}">
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <label style="font-size:11px;color:var(--muted)">🌆 Tarde:</label>
      <input type="time" class="inp-t" value="${config.afternoonStart}" onchange="updateConfig('afternoonStart',this.value)" ${config.adminUnlocked?'':'disabled'} style="width:90px;${config.adminUnlocked?'':'opacity:.5'}">
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <label style="font-size:11px;color:var(--muted)">⏱ Min/atleta:</label>
      <input type="number" class="inp-t" value="${config.minPerAthlete}" min="8" max="20" onchange="updateConfig('minPerAthlete',parseInt(this.value))" ${config.adminUnlocked?'':'disabled'} style="width:55px;${config.adminUnlocked?'':'opacity:.5'}">
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <label style="font-size:11px;color:var(--muted)">☕ Receso lifts (min):</label>
      <input type="number" class="inp-t" value="${config.breakBetweenLifts}" min="0" max="30" onchange="updateConfig('breakBetweenLifts',parseInt(this.value))" ${config.adminUnlocked?'':'disabled'} style="width:55px;${config.adminUnlocked?'':'opacity:.5'}">
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <label style="font-size:11px;color:var(--muted)">🍽 Receso mañana/tarde (min):</label>
      <input type="number" class="inp-t" value="${config.breakMorningAfternoon}" min="0" max="120" onchange="updateConfig('breakMorningAfternoon',parseInt(this.value))" ${config.adminUnlocked?'':'disabled'} style="width:55px;${config.adminUnlocked?'':'opacity:.5'}">
    </div>
    <div style="font-size:11px;color:var(--muted);margin-left:auto">${total} atletas · ${nFlights} vuelos · ${morningCount} mañana + ${afternoonCount} tarde</div>
  </div>`;
  
  // Flight overview
  h+=`<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">`;
  flights.forEach((f,i)=>{
    const sex=(f.athletes[0]?.sexo||'').match(/fem|mujer/i)?'♀':'♂';
    const session=i<morningCount?'AM':'PM';
    const warn=f.athletes.length<MIN_FLIGHT?'⚠️ ':'';
    h+=`<div style="flex:1;min-width:75px;background:${f.color}15;border:2px solid ${f.color};border-radius:8px;padding:8px 10px;text-align:center">
      <div class="os" style="font-size:20px;font-weight:700;color:${f.color}">${warn}${f.letter}</div>
      <div style="font-size:10px;color:var(--muted)">${sex} ${f.athletes.length} · ${session}</div>
    </div>`;
  });
  h+=`</div>`;
  
  // Render sessions
  function renderSession(sessionFlights,startTime,label,emoji){
    const [startH,startM]=startTime.split(':').map(Number);
    
    h+=`<div class="session-hdr" style="background:${label==='MAÑANA'?'rgba(245,158,11,.1);border:2px solid var(--orange)':'rgba(99,102,241,.1);border:2px solid #6366f1'}">${emoji} SESIÓN ${label} — ${startTime}</div>`;
    
    // For each lift (SQ, BP, DL), all flights do it in sequence
    let timeAccum=0;
    
    LIFTS_NAMES.forEach((liftName,li)=>{
      const liftColor=li===0?'#3b82f6':li===1?'#f59e0b':'#ef4444';
      h+=`<div style="margin:12px 0 8px;display:flex;align-items:center;gap:8px">
        <span style="background:${liftColor};color:#fff;padding:4px 12px;border-radius:6px;font-family:Oswald;font-size:13px;font-weight:700;letter-spacing:1px">${liftName}</span>
        <div style="flex:1;height:1px;background:${liftColor}40"></div>
      </div>`;
      
      sessionFlights.forEach((f,fi)=>{
        const flightMin=f.athletes.length*config.minPerAthlete;
        const totalMin=startH*60+startM+timeAccum;
        const hh=String(Math.floor(totalMin/60)%24).padStart(2,'0');
        const mm=String(totalMin%60).padStart(2,'0');
        const endMin=totalMin+flightMin;
        const ehh=String(Math.floor(endMin/60)%24).padStart(2,'0');
        const emm=String(endMin%60).padStart(2,'0');
        
        const sex=(f.athletes[0]?.sexo||'').match(/fem|mujer/i)?'♀':'♂';
        const cats=[...new Set(f.groups.map(g=>g.cat))].join(', ');
        const divs=[...new Set(f.groups.map(g=>g.div))].join(', ');
        const warn=f.athletes.length<MIN_FLIGHT?`<span style="color:var(--orange);font-size:10px;margin-left:4px">⚠️ ${f.athletes.length} atletas (mín ${MIN_FLIGHT})</span>`:f.athletes.length>MAX_FLIGHT?`<span style="color:var(--orange);font-size:10px;margin-left:4px">⚠️ ${f.athletes.length} atletas (máx ${MAX_FLIGHT})</span>`:'';
        
        h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:${f.color}08;border-left:3px solid ${f.color};border-radius:0 8px 8px 0;margin-bottom:4px">
          <span class="os" style="font-size:22px;font-weight:700;color:${f.color};min-width:28px">${f.letter}</span>
          <div style="flex:1">
            <span style="font-size:13px;font-weight:600">${sex} ${cats}</span>
            <span style="font-size:10px;color:var(--muted);margin-left:6px">(${divs})</span>${warn}
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="os" style="font-size:15px;font-weight:700">${hh}:${mm}</span>
            <span style="color:var(--border)">→</span>
            <span class="os" style="font-size:15px;color:var(--muted)">${ehh}:${emm}</span>
            <span style="background:${f.color}20;border:1px solid ${f.color};padding:3px 8px;border-radius:5px;font-family:Oswald;font-size:12px;font-weight:700;color:${f.color}">${f.athletes.length}</span>
          </div>
        </div>`;
        
        timeAccum+=flightMin;
      });
      
      // Break between lifts (except after last lift)
      if(li<2){
        timeAccum+=config.breakBetweenLifts;
        const breakEnd=startH*60+startM+timeAccum;
        const bh=String(Math.floor(breakEnd/60)%24).padStart(2,'0');
        const bm=String(breakEnd%60).padStart(2,'0');
        h+=`<div style="text-align:center;padding:6px;color:var(--muted);font-size:11px;font-style:italic">☕ Receso ${config.breakBetweenLifts} min — reinicio ${bh}:${bm}</div>`;
      }
    });
    
    const endTotal=startH*60+startM+timeAccum;
    const fh=String(Math.floor(endTotal/60)%24).padStart(2,'0');
    const fm=String(endTotal%60).padStart(2,'0');
    h+=`<div style="text-align:center;padding:10px;font-family:Oswald;font-size:14px;color:var(--green);letter-spacing:1px">✓ FIN SESIÓN ${label}: ~${fh}:${fm}</div>`;
  }
  
  // Morning session
  if(morningFlights.length) renderSession(morningFlights,config.morningStart,'MAÑANA','🌅');
  
  // Break
  if(morningFlights.length&&afternoonFlights.length){
    h+=`<div style="text-align:center;padding:16px;margin:8px 0">
      <div style="display:inline-block;background:rgba(99,102,241,.1);border:2px dashed #6366f1;border-radius:10px;padding:12px 24px">
        <span style="font-size:14px">🍽</span>
        <span class="os" style="font-size:14px;color:#6366f1;letter-spacing:1px"> RECESO ${config.breakMorningAfternoon} MIN</span>
      </div>
    </div>`;
  }
  
  // Afternoon session
  if(afternoonFlights.length) renderSession(afternoonFlights,config.afternoonStart,'TARDE','🌆');
  
  // Detailed roster per flight
  h+=`<h2 class="os" style="font-size:18px;letter-spacing:1px;margin:24px 0 12px;color:var(--gold)">📋 NÓMINA POR VUELO</h2>`;
  flights.forEach((f,fi)=>{
    const sex=(f.athletes[0]?.sexo||'').match(/fem|mujer/i)?'♀ Femenino':'♂ Masculino';
    const cats=[...new Set(f.groups.map(g=>g.cat))].join(', ');
    const divs=[...new Set(f.groups.map(g=>g.div))].join(', ');
    const session=fi<morningCount?'Mañana':'Tarde';
    
    h+=`<div class="card" style="border-left:4px solid ${f.color}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="os" style="font-size:26px;font-weight:700;color:${f.color}">${f.letter}</span>
          <div><div class="os" style="font-size:14px">${sex} · ${cats}</div>
          <div style="font-size:10px;color:var(--muted)">${divs} · ${session}</div></div>
        </div>
        <span style="background:${f.color}20;border:1px solid ${f.color};padding:4px 12px;border-radius:6px;font-family:Oswald;font-size:16px;font-weight:700;color:${f.color}">${f.athletes.length}</span>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="border-bottom:2px solid var(--border)">
          <th class="os" style="padding:6px 4px;text-align:center;color:var(--muted);font-size:9px;width:28px">#</th>
          <th style="padding:6px 4px;text-align:left;color:var(--muted);font-size:9px">ATLETA</th>
          <th style="padding:6px 4px;text-align:center;color:var(--muted);font-size:9px">DIVISIÓN</th>
          <th style="padding:6px 4px;text-align:center;color:var(--muted);font-size:9px">CATEGORÍA</th>
          <th style="padding:6px 4px;text-align:left;color:var(--muted);font-size:9px">CLUB</th>
          ${config.adminUnlocked?'<th style="padding:6px 4px;text-align:center;color:var(--muted);font-size:9px">MOVER</th>':''}
        </tr></thead><tbody>`;
    f.athletes.forEach((a,ai)=>{
      const flightOptions=config.adminUnlocked?flights.map(ff=>`<option value="${ff.letter}" ${ff.letter===f.letter?'selected':''}>${ff.letter}</option>`).join(''):'';
      h+=`<tr style="border-bottom:1px solid rgba(30,58,95,.25)">
        <td class="os" style="padding:5px 4px;text-align:center;color:var(--gold);font-weight:700">${ai+1}</td>
        <td style="padding:5px 4px;font-weight:600">${a.nombre||''}</td>
        <td style="padding:5px 4px;text-align:center;font-size:11px">${a.division||''}</td>
        <td style="padding:5px 4px;text-align:center;font-size:11px">${a.categoria||''}</td>
        <td style="padding:5px 4px;font-size:11px;color:var(--muted)">${a.club||''}</td>
        ${config.adminUnlocked?`<td style="padding:5px 4px;text-align:center"><select style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:4px;font-family:Oswald;font-size:11px;cursor:pointer" onchange="moveAthlete(${fi},${ai},this.value)">${flightOptions}</select></td>`:''}
      </tr>`;
    });
    h+=`</tbody></table></div>`;
  });
  
  h+='</div>';
  document.getElementById('content').innerHTML=h;
}
</script>
</body>
</html>
